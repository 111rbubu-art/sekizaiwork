<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>外注管理 — GaiLists</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; color: #1a2535; background: #f0f2f5; }
  body { display: flex; flex-direction: column; }
  .tabbar { display: flex; gap: 0; background: #1a2535; flex-shrink: 0; }
  .tabbar button { flex: 1; padding: 12px 8px; background: transparent; color: rgba(255,255,255,0.6); border: none; border-bottom: 3px solid transparent; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .tabbar button.active { color: #fff; border-bottom-color: #d97706; background: rgba(255,255,255,0.06); }
  .pane { flex: 1; overflow: auto; display: none; }
  .pane.active { display: block; }
  /* Tab1 Excel */
  #pane-excel { display: none; flex-direction: column; }
  #pane-excel.active { display: flex; }
  .excel-bar { padding: 8px 12px; background: #fff; border-bottom: 1px solid #e5e5e5; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .excel-bar a, .excel-bar button { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; text-decoration: none; border: none; cursor: pointer; font-family: inherit; }
  .btn-green { background: #0a6a3a; color: #fff; }
  .btn-blue { background: #1a5fb4; color: #fff; }
  .btn-gray { background: #e5e7eb; color: #333; }
  #excel-frame { flex: 1; width: 100%; border: none; background: #fff; }
  /* Tab2 GaiLists */
  #pane-gai { padding: 0; }
  .gai-bar { position: sticky; top: 0; z-index: 5; padding: 10px 12px; background: #fff; border-bottom: 1px solid #e5e5e5; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .gai-bar .title { font-size: 14px; font-weight: 700; margin-right: auto; }
  .gai-bar button { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
  .btn-add { background: #d97706; color: #fff; }
  .btn-reload { background: #e5e7eb; color: #333; }
  .tbl-wrap { overflow-x: auto; padding: 12px; }
  table.gai { border-collapse: collapse; width: 100%; font-size: 13px; background: #fff; }
  table.gai th, table.gai td { border: 1px solid #e2e5ea; padding: 7px 10px; text-align: left; white-space: nowrap; vertical-align: top; }
  table.gai th { background: #f5f6f8; font-weight: 700; position: sticky; top: 0; }
  table.gai tr:nth-child(even) td { background: #fafbfc; }
  .row-act { display: flex; gap: 6px; }
  .row-act button { padding: 5px 10px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; }
  .act-edit { background: #1a5fb4; color: #fff; }
  .act-del { background: #c0322b; color: #fff; }
  .msg { padding: 20px; text-align: center; color: #666; font-size: 14px; }
  .msg.err { color: #c0322b; white-space: pre-wrap; text-align: left; }
  /* Modal */
  #modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.45); align-items: center; justify-content: center; padding: 16px; }
  #modal.show { display: flex; }
  .modal-box { background: #fff; border-radius: 12px; width: 100%; max-width: 520px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,.3); }
  .modal-hd { padding: 12px 16px; background: #1a2535; color: #fff; font-size: 15px; font-weight: 700; display: flex; align-items: center; }
  .modal-hd button { margin-left: auto; background: rgba(255,255,255,.2); color: #fff; border: none; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 16px; }
  .modal-body { padding: 14px 16px; overflow-y: auto; }
  .fld { margin-bottom: 12px; }
  .fld label { display: block; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 4px; }
  .fld input { width: 100%; padding: 9px 10px; border: 1px solid #ccc; border-radius: 7px; font-size: 14px; font-family: inherit; }
  .modal-ft { padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 8px; }
  .modal-ft button { flex: 1; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
  .btn-cancel { background: #eee; color: #555; }
  .btn-save { background: #1a5a1a; color: #fff; flex: 2; }
  .toast { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); background: #1a2535; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.err { background: #c0322b; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,.2); border-top-color: #333; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="tabbar">
    <button id="tab-excel" class="active" onclick="switchTab('excel')">📊 Excel</button>
    <button id="tab-gai" onclick="switchTab('gai')">📝 GaiLists 登録・編集</button>
  </div>

  <!-- Tab 1: Excel -->
  <div id="pane-excel" class="pane active">
    <div class="excel-bar">
      <a id="open-edit" class="btn-green" target="_blank" rel="noopener">✏️ Excelを開いて編集</a>
      <button class="btn-blue" onclick="loadExcelPreview()">🔄 表示を更新</button>
      <span id="excel-msg" style="font-size:11px;color:#888"></span>
    </div>
    <iframe id="excel-frame" title="Excel" allowfullscreen></iframe>
  </div>

  <!-- Tab 2: GaiLists -->
  <div id="pane-gai" class="pane">
    <div class="gai-bar">
      <span class="title">🏭 外注リスト（GaiLists）</span>
      <button class="btn-reload" onclick="loadGai()">🔄 更新</button>
      <button class="btn-add" onclick="openForm(-1)">➕ 新規追加</button>
    </div>
    <div id="gai-content"><div class="msg"><span class="spinner"></span> 読み込み中…</div></div>
  </div>

  <!-- Add/Edit modal -->
  <div id="modal">
    <div class="modal-box">
      <div class="modal-hd"><span id="modal-title">新規追加</span><button onclick="closeForm()">✕</button></div>
      <div class="modal-body" id="modal-fields"></div>
      <div class="modal-ft">
        <button class="btn-cancel" onclick="closeForm()">キャンセル</button>
        <button class="btn-save" id="modal-save" onclick="saveForm()">✅ 保存</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
var TABLE = (window.opener && window.opener.GAICHU_TABLE_NAME) || 'GaiLists';
var SHARE_URL = (window.opener && window.opener.GAICHU_XLSX_URL) ||
  'https://shojisekizai.sharepoint.com/:x:/s/stoneworks/ER4MrknFBfRJq-Ia7AEhDVQBVQ5I23c3eHbE9hyS1oKw-A?e=FZoeAs';

var COLUMNS = [];   // 列名（順序）
var ROWS = [];      // [{ index, values: [] }]
var WB = null;      // { base, webUrl }
var editingIndex = -1; // -1: 新規, それ以外: 既存行のindex

// ---------- 共通 ----------
function toast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(t._tm); t._tm = setTimeout(function(){ t.className = 'toast'; }, isErr ? 4500 : 2500);
}
function getToken() {
  if (!window.opener || !window.opener.getGaichuGraphToken) {
    return Promise.reject(new Error('アプリ本体（親ウィンドウ）との接続がありません。\nアプリのタブを開いたまま、トップの「外注管理」ボタンから開いてください。'));
  }
  return window.opener.getGaichuGraphToken();
}
function gfetch(url, opts) {
  opts = opts || {};
  return getToken().then(function (token) {
    var headers = { 'Authorization': 'Bearer ' + token };
    for (var k in (opts.headers || {})) headers[k] = opts.headers[k];
    var body = opts.body;
    if (body && typeof body !== 'string') { body = JSON.stringify(body); headers['Content-Type'] = 'application/json'; }
    return fetch(url, { method: opts.method || 'GET', headers: headers, body: body });
  }).then(function (res) {
    if (!res.ok) {
      return res.text().then(function (t) {
        var detail = t;
        try { var j = JSON.parse(t); if (j.error && j.error.message) detail = j.error.message; } catch (e) {}
        throw new Error('Graph ' + res.status + ': ' + detail);
      });
    }
    if (res.status === 204) return null;
    var ct = res.headers.get('content-type') || '';
    return ct.indexOf('application/json') >= 0 ? res.json() : res.text();
  });
}
function encodeSharingUrl(u) {
  var b64 = btoa(unescape(encodeURIComponent(u)));
  return 'u!' + b64.replace(/=+$/, '').replace(/\//g, '_').replace(/\+/g, '-');
}
function resolveWorkbook() {
  if (WB) return Promise.resolve(WB);
  var enc = encodeSharingUrl(SHARE_URL);
  return gfetch('https://graph.microsoft.com/v1.0/shares/' + enc + '/driveItem?$select=id,parentReference,webUrl')
    .then(function (di) {
      if (!di || !di.parentReference || !di.parentReference.driveId) throw new Error('Excelファイルを特定できませんでした（共有リンクの解決に失敗）');
      WB = {
        base: 'https://graph.microsoft.com/v1.0/drives/' + di.parentReference.driveId + '/items/' + di.id + '/workbook',
        webUrl: di.webUrl
      };
      return WB;
    });
}

// ---------- タブ ----------
function switchTab(name) {
  document.getElementById('tab-excel').classList.toggle('active', name === 'excel');
  document.getElementById('tab-gai').classList.toggle('active', name === 'gai');
  document.getElementById('pane-excel').classList.toggle('active', name === 'excel');
  document.getElementById('pane-gai').classList.toggle('active', name === 'gai');
  if (name === 'gai' && !COLUMNS.length) loadGai();
}

// ---------- Tab1: Excel ----------
function initExcel() {
  document.getElementById('open-edit').href = SHARE_URL;
  loadExcelPreview();
}
// SharePoint(企業テナント)は共有リンクの直接iframe埋め込みを拒否するため、
// Graphの /preview で「埋め込み専用の短命URL」を取得してiframeに表示する
function loadExcelPreview() {
  var frame = document.getElementById('excel-frame');
  var msg = document.getElementById('excel-msg');
  try { frame.removeAttribute('src'); } catch (e) {}
  msg.style.color = '#888';
  msg.textContent = 'プレビューを準備中…';
  resolveWorkbook()
    .then(function (wb) {
      var itemBase = wb.base.replace(/\/workbook$/, ''); // .../items/{itemId}
      return gfetch(itemBase + '/preview', { method: 'POST', body: {} });
    })
    .then(function (p) {
      var u = p && p.getUrl;
      if (!u) throw new Error('プレビューURLを取得できませんでした');
      u += (u.indexOf('?') >= 0 ? '&' : '?') + 'nb=true'; // ナビバー非表示
      frame.src = u;
      msg.textContent = '';
    })
    .catch(function (e) {
      msg.style.color = '#c0322b';
      msg.textContent = '埋め込み表示ができませんでした（' + e.message + '）。「✏️ Excelを開いて編集」から別タブで開いてください。';
    });
}

// ---------- Tab2: GaiLists ----------
function loadGai() {
  var c = document.getElementById('gai-content');
  c.innerHTML = '<div class="msg"><span class="spinner"></span> 読み込み中…</div>';
  resolveWorkbook()
    .then(function (wb) {
      return Promise.all([
        gfetch(wb.base + '/tables/' + encodeURIComponent(TABLE) + '/columns?$select=name,index&$top=200'),
        gfetch(wb.base + '/tables/' + encodeURIComponent(TABLE) + '/rows?$top=2000')
      ]);
    })
    .then(function (r) {
      var cols = (r[0].value || []).slice().sort(function (a, b) { return a.index - b.index; });
      COLUMNS = cols.map(function (c) { return c.name; });
      ROWS = (r[1].value || []).map(function (row) {
        return { index: row.index, values: (row.values && row.values[0]) || [] };
      });
      renderGai();
    })
    .catch(function (e) {
      document.getElementById('gai-content').innerHTML =
        '<div class="msg err">読み込みエラー:\n' + escapeHtml(e.message) + '</div>';
    });
}
function escapeHtml(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

function renderGai() {
  var c = document.getElementById('gai-content');
  if (!COLUMNS.length) { c.innerHTML = '<div class="msg">列が取得できませんでした。テーブル「' + escapeHtml(TABLE) + '」を確認してください。</div>'; return; }
  var h = '<div class="tbl-wrap"><table class="gai"><thead><tr>';
  COLUMNS.forEach(function (col) { h += '<th>' + escapeHtml(col) + '</th>'; });
  h += '<th style="position:sticky;right:0">操作</th></tr></thead><tbody>';
  if (!ROWS.length) {
    h += '<tr><td colspan="' + (COLUMNS.length + 1) + '" style="text-align:center;color:#888;padding:20px">データがありません。「➕ 新規追加」から登録できます。</td></tr>';
  } else {
    ROWS.forEach(function (row, ri) {
      h += '<tr>';
      COLUMNS.forEach(function (col, ci) { h += '<td>' + escapeHtml(row.values[ci]) + '</td>'; });
      h += '<td><div class="row-act">' +
        '<button class="act-edit" onclick="openForm(' + ri + ')">✏️</button>' +
        '<button class="act-del" onclick="deleteRow(' + ri + ')">🗑️</button>' +
        '</div></td></tr>';
    });
  }
  h += '</tbody></table></div>';
  c.innerHTML = h;
}

// ---------- 追加・編集フォーム ----------
function openForm(ri) {
  editingIndex = ri;
  var vals = (ri >= 0 && ROWS[ri]) ? ROWS[ri].values : [];
  document.getElementById('modal-title').textContent = (ri >= 0) ? '編集' : '新規追加';
  var f = '';
  COLUMNS.forEach(function (col, ci) {
    var v = (vals[ci] == null) ? '' : String(vals[ci]);
    f += '<div class="fld"><label>' + escapeHtml(col) + '</label>' +
      '<input type="text" data-ci="' + ci + '" value="' + escapeHtml(v) + '"></div>';
  });
  document.getElementById('modal-fields').innerHTML = f;
  document.getElementById('modal').classList.add('show');
}
function closeForm() { document.getElementById('modal').classList.remove('show'); }

function collectForm() {
  var inputs = document.querySelectorAll('#modal-fields input');
  var arr = new Array(COLUMNS.length).fill('');
  inputs.forEach(function (inp) { arr[parseInt(inp.getAttribute('data-ci'), 10)] = inp.value; });
  return arr;
}
function saveForm() {
  var arr = collectForm();
  var btn = document.getElementById('modal-save');
  btn.disabled = true; btn.textContent = '保存中…';
  var op;
  if (editingIndex >= 0) {
    var idx = ROWS[editingIndex].index;
    op = resolveWorkbook().then(function (wb) {
      return gfetch(wb.base + '/tables/' + encodeURIComponent(TABLE) + '/rows/itemAt(index=' + idx + ')',
        { method: 'PATCH', body: { values: [arr] } });
    });
  } else {
    op = resolveWorkbook().then(function (wb) {
      return gfetch(wb.base + '/tables/' + encodeURIComponent(TABLE) + '/rows',
        { method: 'POST', body: { index: null, values: [arr] } });
    });
  }
  op.then(function () {
    closeForm();
    toast(editingIndex >= 0 ? '更新しました' : '追加しました');
    loadGai();
  }).catch(function (e) {
    toast('保存エラー: ' + e.message, true);
  }).then(function () {
    btn.disabled = false; btn.textContent = '✅ 保存';
  });
}

// ---------- 削除 ----------
function deleteRow(ri) {
  var row = ROWS[ri];
  if (!row) return;
  var label = row.values[0] || ('行 ' + (ri + 1));
  if (!confirm('この行を削除します。よろしいですか？\n\n' + label)) return;
  resolveWorkbook()
    .then(function (wb) {
      // 行の範囲アドレスを取得してから、行ごと上詰めで削除（テーブル行削除）
      return gfetch(wb.base + '/tables/' + encodeURIComponent(TABLE) + '/rows/itemAt(index=' + row.index + ')/range?$select=address')
        .then(function (rng) {
          var addr = rng.address || '';
          var bang = addr.lastIndexOf('!');
          var sheet = bang >= 0 ? addr.substring(0, bang) : '';
          var local = bang >= 0 ? addr.substring(bang + 1) : addr;
          if (sheet.charAt(0) === "'" && sheet.charAt(sheet.length - 1) === "'") sheet = sheet.substring(1, sheet.length - 1).replace(/''/g, "'");
          var sheetEsc = encodeURIComponent(sheet.replace(/'/g, "''"));
          return gfetch(wb.base + "/worksheets('" + sheetEsc + "')/range(address='" + local + "')/delete",
            { method: 'POST', body: { shift: 'Up' } });
        });
    })
    .then(function () { toast('削除しました'); loadGai(); })
    .catch(function (e) { toast('削除エラー: ' + e.message, true); });
}

// ---------- 初期化 ----------
document.getElementById('modal').addEventListener('click', function (e) { if (e.target === this) closeForm(); });
initExcel();
</script>
</body>
</html>
