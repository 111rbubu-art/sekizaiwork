<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>封筒印刷 - カスタム版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#d8d8d8}

/* フォント定義用クラス */
.f-serif { font-family: 'Noto Serif JP', serif !important; }
.f-sans  { font-family: 'Noto Sans JP', sans-serif !important; }

/* ===== コントロールバー ===== */
.ctrl{
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  padding:9px 14px;background:#1a2535;color:#fff;
  position:fixed;top:0;left:0;right:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
}
.ct{font-size:14px;font-weight:500;white-space:nowrap}
.sep{width:1px;height:22px;background:rgba(255,255,255,0.2);flex-shrink:0}
.btn{
  font-family:'Noto Sans JP',sans-serif;font-size:11px;padding:5px 11px;
  border:1px solid rgba(255,255,255,0.28);background:rgba(255,255,255,0.08);
  color:#fff;cursor:pointer;border-radius:3px;white-space:nowrap
}
.btn:hover{background:rgba(255,255,255,0.2)}
.btn.pr{background:#1a5a9a;border-color:#1a5a9a}
.lbl{font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap}
.kw{display:flex;gap:3px}
.kb{
  font-family:'Noto Sans JP',sans-serif;font-size:11px;padding:4px 9px;
  border:1px solid rgba(255,255,255,0.22);background:transparent;
  color:rgba(255,255,255,0.55);cursor:pointer;border-radius:3px
}
.kb.on{background:#1a5a9a;border-color:#1a5a9a;color:#fff}

/* ===== プレビューエリア ===== */
.pv{
  padding:64px 24px 40px;
  display:flex;justify-content:center;gap:18px;align-items:flex-start;
  min-height:100vh;
}

/* 封筒本体 */
.env{
  width:360px;height:705px;
  background:#fff;position:relative;flex-shrink:0;
  box-shadow:1px 2px 16px rgba(0,0,0,0.22),0 0 0 0.5px #bbb;
}

/* 郵便番号 */
.zr{ position:absolute; top:39px; right:24px; display:flex; align-items:center; gap:2px; }
.zb{
  width:21px;height:21px; border:1.5px solid #c00;
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif JP',serif; font-size:13px; color:#111;
}
.zs{ color:#c00;font-weight:700;font-size:13px; margin:0 1px; line-height:1; }

/* 住所1（右端・読み順1列目） */
.aw1{ position:absolute; top:50px; right:14px; }
/* 住所2（住所1の左隣・読み順2列目） */
.aw2{ position:absolute; top:50px; right:34px; }
.ac{
  writing-mode:vertical-rl; font-size:14px; line-height:1.85;
  color:#111; white-space:nowrap; letter-spacing:0.06em;
  text-orientation:upright;
}

/* 宛名 — DOM順: 敬称(左)→名前(右) で縦書き右→左読みが正しくなる */
.nb{ position:absolute; top:75px; left:143px; display:flex; gap:0; align-items:flex-end; }
.n-name{
  writing-mode:vertical-rl; font-size:30px; font-weight:700;
  line-height:1.45; color:#111; letter-spacing:0.12em; white-space:nowrap;
  text-orientation:upright;
}
.n-sama{
  writing-mode:vertical-rl; font-size:22px; font-weight:400;
  line-height:1.4; color:#111; padding-bottom:4px; white-space:nowrap;
  text-orientation:upright;
}

/* 差出人 */
.sb{ position:absolute; bottom:12px; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:2px; }
.sc{ font-size:13px; color:#111; letter-spacing:0.2em; white-space:nowrap; }
.si{ font-size:8.5px; color:#333; letter-spacing:0.04em; white-space:nowrap; }

.dr{cursor:move}
.dr.sel{outline:2px dashed #1a5a9a;outline-offset:4px}

/* 調整パネル */
.ap{
  width:220px; flex-shrink:0; background:#fff; border-radius:8px; padding:14px;
  box-shadow:0 2px 12px rgba(0,0,0,0.12); display:none;
}
.ap.vis{display:block}
.ah{font-size:12px;font-weight:500;color:#1a2535;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee}
.ar{display:flex;align-items:center;gap:5px;margin-bottom:7px;font-size:11px}
.al{color:#666;width:35px;flex-shrink:0}
.ab{width:24px;height:24px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center}
.ai{width:60px;font-size:11px;padding:3px;border:1px solid #ddd;border-radius:2px;text-align:center}

/* 自社情報パネル */
.sp{
  width:232px; background:#fff; border-radius:8px; padding:14px;
  box-shadow:0 2px 12px rgba(0,0,0,0.12); display:none;
}
.sp.vis{display:block}
.spi{width:100%;font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:3px;}
.spb{width:100%;margin-top:8px;font-size:12px;padding:7px;background:#1a2535;color:#fff;border:none;cursor:pointer;border-radius:4px}

@media print{
  body{background:#fff}
  .ctrl,.ap,.sp{display:none!important}
  .pv{padding:0;background:#fff;display:block}
  .env{width:120mm;height:235mm;box-shadow:none;border:none}
  .zr{top:13mm;right:8mm}
  .zb{width:7mm;height:7mm;border:none;font-size:4.5mm}
  .zs{display:none}
  .aw1{top:17mm;right:4.5mm}
  .aw2{top:17mm;right:11mm}
  .nb{top:25mm;left:45mm}
  .sb{bottom:4mm}
  @page{size:120mm 235mm;margin:0}
}
</style>
</head>
<body>

<div class="ctrl">
  <span class="ct">✉️ 封筒印刷</span>
  <div class="sep"></div>
  <span class="lbl">フォント：</span>
  <div class="kw">
    <button class="kb on" id="btnSerif" onclick="setFont('f-serif',this)">明朝</button>
    <button class="kb" id="btnSans" onclick="setFont('f-sans',this)">ゴシック</button>
  </div>
  <div class="sep"></div>
  <span class="lbl">敬称：</span>
  <div class="kw">
    <button class="kb on" onclick="setK('様',this)">様</button>
    <button class="kb" onclick="setK('御中',this)">御中</button>
    <button class="kb" onclick="setK('先生',this)">先生</button>
  </div>
  <div class="sep"></div>
  <button class="btn" onclick="tgSP()">🏢 自社情報</button>
  <button class="btn" onclick="tgAP()">⚙ 位置調整</button>
  <button class="btn pr" onclick="window.print()">🖨 印刷</button>
</div>

<div class="pv">
  <div class="env f-serif" id="env">
    <div class="zr dr" id="zB">
      <div class="zb" id="z0"></div><div class="zb" id="z1"></div><div class="zb" id="z2"></div>
      <div class="zs">-</div>
      <div class="zb" id="z3"></div><div class="zb" id="z4"></div><div class="zb" id="z5"></div><div class="zb" id="z6"></div>
    </div>
    <div class="aw1 dr" id="aB1">
      <div class="ac" id="a1"></div>
    </div>
    <div class="aw2 dr" id="aB2">
      <div class="ac" id="a2"></div>
    </div>
    <div class="nb dr" id="nB">
      <div class="n-sama" id="kT">様</div>
      <div class="n-name" id="nT"></div>
    </div>
    <div class="sb dr" id="sB">
      <div class="sc" id="sC"></div>
      <div id="sLines"></div>
    </div>
  </div>

  <div class="ap" id="aPanel">
    <div class="ah" id="aH">⚙ 位置調整</div>
    <div id="aBody">要素を選択してください</div>
  </div>

  <div class="sp" id="spPanel">
    <div class="sph">🏢 自社情報登録</div>
    <input class="spi" id="spC" placeholder="会社名" style="margin-bottom:8px">
    <textarea class="spi" id="spI" rows="4" placeholder="住所・連絡先"></textarea>
    <button class="spb" onclick="saveSender()">登録・反映</button>
  </div>
</div>

<script>
var D = {};
try { D = JSON.parse(sessionStorage.getItem('envelopeData') || '{"zip":"1234567","addr1":"東京都杉並区サンプル1-2-3","addr2":"マンション名101","name":"山田 太郎"}'); } catch(e){}

function setZip(z) {
  var d = (z || '').replace(/[^0-9]/g, '');
  for (var i = 0; i < 7; i++) {
    var e = document.getElementById('z' + i);
    if (e) e.textContent = d[i] || '';
  }
}

/* ハイフンを縦棒に、半角数字を全角に変換して縦書きで正しく表示 */
function toTate(s) {
  return (s || '')
    .replace(/[0-9]/g, function(m) { return String.fromCharCode(m.charCodeAt(0) + 0xFEE0); })
    .replace(/-/g, '｜').replace(/－/g, '｜').replace(/−/g, '｜');
}

function init() {
  setZip(D.zip || '');
  document.getElementById('a1').textContent = toTate(D.addr1 || '');
  document.getElementById('a2').textContent = toTate(D.addr2 || '');
  document.getElementById('nT').textContent = D.name || '';
  loadSender();
}

function loadSender() {
  var s = JSON.parse(localStorage.getItem('envSender') || '{}');
  renderSender(s.company || '', s.info || '');
  document.getElementById('spC').value = s.company || '';
  document.getElementById('spI').value = s.info || '';
}

function renderSender(company, info) {
  document.getElementById('sC').textContent = company;
  var sl = document.getElementById('sLines');
  sl.innerHTML = '';
  (info || '').split('\n').forEach(function(line) {
    var d = document.createElement('div');
    d.className = 'si';
    d.textContent = line;
    sl.appendChild(d);
  });
}

function saveSender() {
  var c = document.getElementById('spC').value;
  var i = document.getElementById('spI').value;
  localStorage.setItem('envSender', JSON.stringify({ company: c, info: i }));
  renderSender(c, i);
  tgSP();
}

function tgSP() { document.getElementById('spPanel').classList.toggle('vis'); }
function tgAP() { document.getElementById('aPanel').classList.toggle('vis'); }

function setFont(cls, btn) {
  var env = document.getElementById('env');
  env.classList.remove('f-serif', 'f-sans');
  env.classList.add(cls);
  document.querySelectorAll('.ctrl .kb').forEach(function(b) {
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes('setFont')) b.classList.remove('on');
  });
  btn.classList.add('on');
}

function setK(k, btn) {
  document.getElementById('kT').textContent = k;
  btn.parentNode.querySelectorAll('.kb').forEach(function(b) { b.classList.toggle('on', b === btn); });
}

/* ドラッグ＆調整ロジック */
var dg = null, sel = null, sx, sy, ox, oy;
document.querySelectorAll('.dr').forEach(function(el) {
  el.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    if (sel) sel.classList.remove('sel');
    sel = el; el.classList.add('sel');
    showAdj(el);
    dg = el; sx = e.clientX; sy = e.clientY;
    var er = document.getElementById('env').getBoundingClientRect();
    var lr = el.getBoundingClientRect();
    ox = lr.left - er.left; oy = lr.top - er.top;
    el.style.position = 'absolute';
    el.style.left = ox + 'px'; el.style.top = oy + 'px';
    e.preventDefault();
  });
});

document.addEventListener('mousemove', function(e) {
  if (!dg) return;
  dg.style.left = (ox + e.clientX - sx) + 'px';
  dg.style.top = (oy + e.clientY - sy) + 'px';
  updAdj();
});
document.addEventListener('mouseup', function() { dg = null; });

function showAdj(el) {
  document.getElementById('aPanel').classList.add('vis');
  var NM = { zB: '郵便番号', aB1: '住所１', aB2: '住所２', nB: '宛名', sB: '差出人' };
  document.getElementById('aH').textContent = '⚙ ' + (NM[el.id] || '');
  updAdj();
}

function updAdj() {
  if (!sel) return;
  var l = parseInt(sel.style.left) || 0;
  var t = parseInt(sel.style.top) || 0;

  var h = '<div class="ar"><span class="al">左(px)</span>' +
          '<input class="ai" type="number" value="'+l+'" oninput="sp(\'left\',this.value)"></div>' +
          '<div class="ar"><span class="al">上(px)</span>' +
          '<input class="ai" type="number" value="'+t+'" oninput="sp(\'top\',this.value)"></div>';

  if (sel.id === 'zB') {
    var zb0 = sel.querySelector('.zb');
    var zs = zb0 ? (parseInt(zb0.style.width) || 21) : 21;
    h += '<div class="ar"><span class="al">サイズ</span>' +
         '<input class="ai" type="number" value="'+zs+'" oninput="szv(this.value)"></div>';
  } else {
    var inner = sel.querySelector('.ac, .n-name, .sc, .si');
    var fs = inner ? Math.round(parseFloat(window.getComputedStyle(inner).fontSize)) : 0;
    if (fs > 0) {
      h += '<div class="ar"><span class="al">サイズ</span>' +
           '<input class="ai" type="number" value="'+fs+'" oninput="sfv(this.value)"></div>';
    }
  }

  document.getElementById('aBody').innerHTML = h;
}

function sp(axis, v) { if (sel) sel.style[axis] = v + 'px'; }

/* 郵便番号ボックスのサイズ変更 */
function szv(v) {
  if (!sel) return;
  var s = parseInt(v) || 21;
  sel.querySelectorAll('.zb').forEach(function(b) {
    b.style.width = s + 'px';
    b.style.height = s + 'px';
    b.style.fontSize = Math.round(s * 0.62) + 'px';
  });
  sel.querySelectorAll('.zs').forEach(function(b) {
    b.style.fontSize = Math.round(s * 0.62) + 'px';
  });
}

function sfv(v) {
  if (!sel) return;
  sel.querySelectorAll('.ac, .n-name, .n-sama, .sc, .si').forEach(function(c) {
    c.style.fontSize = v + 'px';
  });
}

init();
</script>
</body>
</html>
