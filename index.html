<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>石材業務ビューアー</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="石材ビューアー">
<meta name="theme-color" content="#1a2535">
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px;overscroll-behavior:none}
.hidden{display:none!important}

/* ログイン画面 */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#1a2535}
.login-logo{font-size:48px;margin-bottom:16px}
.login-title{color:#fff;font-size:22px;font-weight:500;margin-bottom:8px;text-align:center}
.login-sub{color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:40px;text-align:center}
.login-btn{background:#fff;color:#1a2535;border:none;padding:14px 40px;border-radius:28px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit}
.login-btn:active{opacity:0.85}
.login-err{color:#ff8a80;font-size:13px;margin-top:16px;text-align:center}

/* アプリ本体 */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative}

/* ヘッダー */
.hdr{background:#1a2535;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;min-height:52px;flex-shrink:0}
.hdr-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0 8px 0 0;line-height:1}
.hdr-title{font-size:16px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-user{background:rgba(255,255,255,0.15);border:none;color:#fff;padding:5px 12px;border-radius:14px;font-size:12px;cursor:pointer;font-family:inherit}

/* フィルター */
.filter-bar{background:#fff;padding:10px 12px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid #e8e8e8;flex-shrink:0}
.filter-bar::-webkit-scrollbar{display:none}
.fpill{padding:7px 16px;border-radius:20px;border:1px solid #ddd;background:#f5f5f5;font-size:13px;cursor:pointer;white-space:nowrap;color:#555;font-family:inherit}
.fpill.on{background:#1a2535;color:#fff;border-color:#1a2535}

/* 検索 */
.search-wrap{padding:10px 12px;background:#fff;border-bottom:1px solid #e8e8e8;flex-shrink:0}
.srch{width:100%;padding:9px 14px;border:1px solid #ddd;border-radius:22px;font-size:14px;background:#f8f8f8;color:#1a1a1a;font-family:inherit}

/* リスト */
.list-area{flex:1;overflow-y:auto;padding:10px 12px 80px}
.cards{display:flex;flex-direction:column;gap:10px}

/* カード */
.card{background:#fff;border:1px solid #e8e8e8;border-radius:14px;overflow:hidden;cursor:pointer}
.card:active{opacity:0.85}
.card-inner{display:flex}
.star-mark{color:#f0a500;font-size:16px;padding:10px 0 0 10px;flex-shrink:0}
.card-left{flex:1;padding:12px 14px;min-width:0}
.c-fam{font-size:15px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-tem{font-size:12px;color:#777;margin-bottom:6px}
.c-sta{font-size:13px;font-weight:500}
.red{color:#c0392b}.green{color:#27ae60}.blue{color:#1565c0}.gray{color:#888}
.card-right{width:150px;padding:8px;display:flex;flex-direction:column;gap:5px;border-left:1px solid #f0f0f0;flex-shrink:0}
.stag{border-radius:6px;padding:6px 8px;font-size:11px;line-height:1.5}
.sy{background:#fff9e6;border-left:3px solid #f0a500}
.sg{background:#edfaf2;border-left:3px solid #27ae60}
.slbl{font-size:10px;color:#888;margin-bottom:1px}
.sval{color:#333;word-break:break-all}

/* ローディング・空 */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:#888}
.spinner{width:32px;height:32px;border:3px solid #e8e8e8;border-top-color:#1a2535;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:#aaa;font-size:14px}

/* 詳細画面 */
#det-screen{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative}
.tabs{background:#fff;display:flex;overflow-x:auto;border-bottom:1px solid #e8e8e8;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 14px;font-size:13px;white-space:nowrap;cursor:pointer;color:#888;border-bottom:2px solid transparent;font-family:inherit;background:none;border-left:none;border-right:none;border-top:none}
.tab.on{color:#1a2535;border-bottom-color:#1a2535;font-weight:500}
.det-body{flex:1;overflow-y:auto;padding:12px 14px 90px;background:#f0f2f5}

/* 詳細セクション */
.sec{margin-bottom:16px}
.sec-hdr{display:inline-block;font-size:11px;font-weight:500;color:#fff;padding:4px 12px;border-radius:5px;margin-bottom:10px}
.bg1{background:#1a2535}.bg2{background:#c0392b}.bg3{background:#1565c0}.bg4{background:#0f6e56}.bg5{background:#8a5c00}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fi{background:#fff;border-radius:10px;padding:9px 12px}
.fi.w{grid-column:1/-1}
.fi label{font-size:10px;color:#888;display:block;margin-bottom:3px}
.fv{font-size:14px;font-weight:500;color:#1a1a1a;word-break:break-all}
.fv.em{color:#ccc;font-style:italic;font-weight:400;font-size:13px}
.fv.pre{white-space:pre-line;font-size:13px;font-weight:400;line-height:1.6}
.pill{display:inline-block;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:500}
.pg{background:#d4edda;color:#155724}
.py{background:#fff3cd;color:#856404}
.memo-area{background:#fff;border-radius:10px;padding:12px;font-size:13px;line-height:1.7;white-space:pre-wrap;color:#333}

/* ボトムナビ */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e8e8e8;display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0;cursor:pointer;gap:2px}
.bni-ic{font-size:20px;line-height:1}
.bni-lb{font-size:10px;color:#999}
.bni.on .bni-lb{color:#1a2535;font-weight:500}

/* エラー */
.err-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;margin:12px;font-size:13px;color:#856404}
.attach-folder{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#e6f1fb;border-radius:10px;margin-bottom:8px;cursor:pointer;border:1px solid #b5d4f4}
.attach-folder:active{opacity:0.8}
.attach-folder .attach-icon{font-size:24px;flex-shrink:0}
.attach-folder .attach-name{flex:1;font-size:14px;font-weight:500;color:#1565c0}
.attach-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:10px;margin-bottom:6px;cursor:pointer;border:1px solid #e8e8e8}
.attach-row:active{opacity:0.8}
.attach-icon-sm{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:500;flex-shrink:0}
.attach-name{flex:1;font-size:13px;color:#1a1a1a;word-break:break-all}
.attach-arrow{font-size:14px;color:#888;flex-shrink:0}
.attach-empty{font-size:13px;color:#aaa;padding:10px;text-align:center}
.attach-loading{font-size:13px;color:#888;padding:10px;text-align:center}
.attach-list{display:flex;flex-direction:column}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-logo">🪨</div>
  <div class="login-title">石材業務ビューアー</div>
  <div class="login-sub">Microsoft 365アカウントでログイン</div>
  <button class="login-btn" id="login-btn">ログイン</button>
  <div class="login-err hidden" id="login-err"></div>
</div>

<!-- メイン画面 -->
<div id="app" class="hidden">
  <!-- 一覧画面 -->
  <div id="list-screen">
    <div class="hdr">
      <span class="hdr-title" id="list-title">納骨・戒切</span>
      <button class="hdr-user" id="logout-btn">ログアウト</button>
    </div>
    <div class="filter-bar" id="filter-bar">
      <button class="fpill on" data-f="all">すべて</button>
      <button class="fpill" data-f="micom">未完了</button>
      <button class="fpill" data-f="follow">フォロー★</button>
      <button class="fpill" data-f="nyukin">入金待ち</button>
    </div>
    <div class="search-wrap">
      <input class="srch" id="srch" placeholder="顧客名・お寺で検索...">
    </div>
    <div class="list-area">
      <div id="list-content">
        <div class="loading"><div class="spinner"></div><span>データを読み込み中...</span></div>
      </div>
    </div>
    <div class="bnav">
      <div class="bni on"><div class="bni-ic">📋</div><div class="bni-lb">納骨戒切</div></div>
      <div class="bni"><div class="bni-ic">🏗</div><div class="bni-lb">工事</div></div>
      <div class="bni"><div class="bni-ic">👥</div><div class="bni-lb">顧客</div></div>
      <div class="bni"><div class="bni-ic">📦</div><div class="bni-lb">在庫</div></div>
    </div>
  </div>

  <!-- 詳細画面 -->
  <div id="det-screen" class="hidden">
    <div class="hdr">
      <button class="hdr-back" id="back-btn">←</button>
      <span class="hdr-title" id="det-title"></span>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab on" data-i="0">基本情報</button>
      <button class="tab" data-i="1">依頼・彫刻</button>
      <button class="tab" data-i="2">納骨</button>
      <button class="tab" data-i="3">代金・メモ</button>
    </div>
    <div class="det-body" id="det-body"></div>
    <div class="bnav">
      <div class="bni on"><div class="bni-ic">📋</div><div class="bni-lb">納骨戒切</div></div>
      <div class="bni"><div class="bni-ic">🏗</div><div class="bni-lb">工事</div></div>
      <div class="bni"><div class="bni-ic">👥</div><div class="bni-lb">顧客</div></div>
      <div class="bni"><div class="bni-ic">📦</div><div class="bni-lb">在庫</div></div>
    </div>
  </div>
</div>

<script>
// ===== Service Worker登録 =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

// ===== 設定 =====
var TENANT_ID = 'c78b3598-1933-4363-91f1-744a380bd9c9';
var CLIENT_ID = 'd0a0acaa-fa54-4afa-988e-7cc24db300b2';
var SP_HOST   = 'shojisekizai.sharepoint.com';
var SP_SITE   = 'stoneworks';
var LIST_NAME = '納骨・戒切';

// ===== MSAL =====
var msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: 'https://login.microsoftonline.com/' + TENANT_ID,
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: { cacheLocation: 'sessionStorage' }
};
var msal = new msal.PublicClientApplication(msalConfig);
var SCOPES = ['https://graph.microsoft.com/Sites.Read.All'];

var allItems = [];
var currentFilter = 'all';
var currentItem = null;
var currentTab = 0;

// ===== ログイン =====
document.getElementById('login-btn').addEventListener('click', function() {
  msal.loginRedirect({ scopes: SCOPES });
});

// ページ読み込み時にリダイレクト結果を処理
msal.handleRedirectPromise().then(function(resp) {
  if (resp) {
    msal.setActiveAccount(resp.account);
  }
  var accounts = msal.getAllAccounts();
  if (accounts.length > 0) {
    msal.setActiveAccount(accounts[0]);
    startApp();
  }
}).catch(function(e) {
  var el = document.getElementById('login-err');
  el.textContent = 'ログインエラー: ' + e.message;
  el.classList.remove('hidden');
});

function startApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadItems();
}

document.getElementById('logout-btn').addEventListener('click', function() {
  msal.logoutRedirect();
});

// ===== トークン取得 =====
function getToken() {
  return msal.acquireTokenSilent({ scopes: SCOPES, account: msal.getActiveAccount() })
    .catch(function() {
      return msal.acquireTokenRedirect({ scopes: SCOPES });
    });
}

// ===== データ取得 =====
function loadItems() {
  document.getElementById('list-content').innerHTML =
    '<div class="loading"><div class="spinner"></div><span>データを読み込み中...</span></div>';

  getToken().then(function(resp) {
    var token = resp.accessToken;
    var siteUrl = 'https://graph.microsoft.com/v1.0/sites/' + SP_HOST + ':/sites/' + SP_SITE;

    return fetch(siteUrl, { headers: { Authorization: 'Bearer ' + token } })
      .then(function(r) { return r.json(); })
      .then(function(site) {
        var listUrl = 'https://graph.microsoft.com/v1.0/sites/' + site.id +
          '/lists/' + encodeURIComponent(LIST_NAME) +
          '/items?expand=fields&$top=500';
        return fetch(listUrl, { headers: { Authorization: 'Bearer ' + token } });
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) throw new Error(data.error.message);
        allItems = (data.value || []).map(function(item) { return item.fields || {}; });
        renderList();
      });
  }).catch(function(e) {
    document.getElementById('list-content').innerHTML =
      '<div class="err-banner">データ取得エラー: ' + e.message + '</div>';
  });
}

// ===== フィールドマッピング =====
function G(d,k){var M={'顧客名':'_x9867__x5ba2__x540d_','お寺':'_x304a__x5bfa_','分類':'_x5206__x985e_','フリガナ':'_x30d5__x30ea__x30ac__x30ca_','電話番号':'_x96fb__x8a71__x756a__x53f7_','顧客No':'_x9867_No','状況':'situation','郵便番号':'_x90f5__x4fbf__x756a__x53f7_','住所1':'_x4f4f__x6240_1','住所2':'_x4f4f__x6240_2','宛名':'addressee','注意事項メモ':'_x6ce8__x610f__x4e8b__x9805__x30','納骨時間':'_x7d0d__x9aa8__x6642__x9593_','納骨担当':'personincharge','戒切納期':'_x7d0d__x671f__xff08__x7d0d__x9a','依頼日':'RequestDate','依頼情報提供者':'Informer','請求書郵送日':'DateInvoice','入金日':'PaymentDate','社内連絡':'InternalCommunication','納骨備考':'noukotu_kaisi_jyoutai','資料':'_x8cc7__x6599_','フォルダー':'_x8cc7__x6599_'};return d[M[k]!==undefined?M[k]:k];}

// ===== 一覧描画 =====
function renderList() {
  var q = document.getElementById('srch').value || '';
  var items = allItems.filter(function(d) {
    var status = G(d,'状況') || d['Title'] || '';
    var nokOk = d['DelRedText'] === true || d['FinDelRedText'] === true;
    if (currentFilter === 'micom' && nokOk) return false;
    if (currentFilter === 'follow' && !d['check']) return false;
    if (currentFilter === 'nyukin' && !(status.includes('入金'))) return false;
    if (q) {
      var name = (d['顧客名'] || d['Title'] || '');
      var temple = (d['お寺'] || '');
      if (!name.includes(q) && !temple.includes(q)) return false;
    }
    return true;
  });

  if (items.length === 0) {
    document.getElementById('list-content').innerHTML =
      '<div class="empty">該当するレコードがありません</div>';
    return;
  }

  var html = '<div class="cards">' + items.map(function(d, idx) {
    var title = d['Title'] || '';
    var name = G(d,'顧客名') || '';
    var temple = G(d,'お寺') || '';
    var num = G(d,'顧客No') || '';
    var status = G(d,'状況') || '';
    var nokTanto = G(d,'納骨担当') || '';
    var nokOk = d['DelRedText'] === true || d['FinDelRedText'] === true;
    var chkOk = d['check'] === true;
    var follow = d['check'] === true;
    var sc = status && status !== '-----' ? (status.includes('完了') ? 'green' : status.includes('入金') ? 'blue' : 'red') : 'gray';
    var star = follow ? '<div class="star-mark">★</div>' : '';
    var ntag = nokOk
      ? '<div class="stag sg"><div class="slbl">納骨</div><div class="sval">完了</div></div>'
      : '<div class="stag sy"><div class="slbl">納骨</div><div class="sval">担当:' + (nokTanto || '未定') + '</div></div>';
    var ctag = chkOk
      ? '<div class="stag sg"><div class="slbl">チェック</div><div class="sval">済</div></div>'
      : '<div class="stag sy"><div class="slbl">チェック</div><div class="sval">未</div></div>';
    var displayName = name || title;
    return '<div class="card" data-idx="' + idx + '">' +
      '<div class="card-inner">' + star +
      '<div class="card-left">' +
      '<div class="c-fam">' + displayName + '</div>' +
      '<div class="c-tem">' + temple + (num ? '　' + num : '') + '</div>' +
      '<div class="c-sta ' + sc + '">' + (status || '（状況未設定）') + '</div>' +
      '</div>' +
      '<div class="card-right">' + ntag + ctag + '</div>' +
      '</div></div>';
  }).join('') + '</div>';

  document.getElementById('list-content').innerHTML = html;

  // カードクリックイベント（フィルタ後のitemsを使う）
  document.querySelectorAll('.card').forEach(function(el) {
    el.addEventListener('click', function() {
      var idx = parseInt(this.getAttribute('data-idx'));
      openDetail(items[idx]);
    });
  });
}

// ===== フィルター =====
document.getElementById('filter-bar').addEventListener('click', function(e) {
  var btn = e.target.closest('.fpill');
  if (!btn) return;
  currentFilter = btn.getAttribute('data-f');
  document.querySelectorAll('.fpill').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  renderList();
});

document.getElementById('srch').addEventListener('input', renderList);

// ===== 詳細画面 =====
function openDetail(d) {
  currentItem = d;
  currentTab = 0;
  var title = d['Title'] || d['顧客名'] || '';
  document.getElementById('det-title').textContent = title;
  document.getElementById('list-screen').classList.add('hidden');
  document.getElementById('det-screen').classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('on', t.getAttribute('data-i') === '0');
  });
  showTab(0, d);
}

document.getElementById('back-btn').addEventListener('click', function() {
  document.getElementById('det-screen').classList.add('hidden');
  document.getElementById('list-screen').classList.remove('hidden');
});

document.getElementById('tabs').addEventListener('click', function(e) {
  var t = e.target.closest('.tab');
  if (!t) return;
  document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('on'); });
  t.classList.add('on');
  showTab(parseInt(t.getAttribute('data-i')), currentItem);
});

function fld(label, val, wide, pre) {
  var cls = 'fi' + (wide ? ' w' : '');
  var vcls = 'fv' + (pre ? ' pre' : '') + (val ? '' : ' em');
  return '<div class="' + cls + '"><label>' + label + '</label><div class="' + vcls + '">' + (val || '未入力') + '</div></div>';
}

function showTab(i, d) {
  var b = document.getElementById('det-body');
  var nokOk = d['DelRedText'] === true || d['FinDelRedText'] === true;
  var chkOk = d['check'] === true;

  if (i === 0) {
    b.innerHTML =
      '<div class="sec"><span class="sec-hdr bg1">基本情報</span>' +
      '<div class="fgrid">' +
      fld('顧客名', G(d,'顧客名')) +
      fld('フリガナ', G(d,'フリガナ')) +
      fld('電話番号', G(d,'電話番号')) +
      fld('お寺', G(d,'お寺')) +
      fld('顧客No', G(d,'顧客No')) +
      fld('状況', G(d,'状況')) +
      '</div></div>' +
      '<div class="sec"><span class="sec-hdr bg2">資料郵送先</span>' +
      '<div class="fgrid">' +
      fld('郵便番号', G(d,'郵便番号')) +
      fld('宛名', G(d,'宛名')) +
      fld('住所', (G(d,'住所1') || '') + (G(d,'住所2') ? ' ' + G(d,'住所2') : ''), true) +
      '</div></div>';
  } else if (i === 1) {
    b.innerHTML =
      '<div class="sec"><span class="sec-hdr bg3">依頼内容</span>' +
      '<div class="fgrid">' +
      fld('内容', G(d,'分類')) +
      fld('依頼日（受付日）', G(d,'依頼日')) +
      fld('提供者', G(d,'依頼情報提供者')) +
      '</div></div>' +
      '<div class="sec"><span class="sec-hdr bg4">彫刻</span>' +
      '<div class="fgrid">' +
      fld('戒切納期', G(d,'戒切納期')) +
      fld('担当', G(d,'納骨担当')) +
      '</div></div>';
  } else if (i === 2) {
    b.innerHTML =
      '<div class="sec"><span class="sec-hdr bg4">納骨</span>' +
      '<div class="fgrid">' +
      fld('納骨時間', G(d,'納骨時間')) +
      fld('担当', G(d,'納骨担当')) +
      '<div class="fi"><label>完了</label><span class="pill ' + (nokOk ? 'pg' : 'py') + '">' + (nokOk ? '完了' : '未完了') + '</span></div>' +
      fld('お寺', G(d,'お寺')) +
      fld('納骨備考', G(d,'納骨備考'), true) +
      '</div></div>' +
      '<div class="sec"><span class="sec-hdr bg5">注意事項メモ</span>' +
      '<div class="memo-area">' + (G(d,'注意事項メモ') || 'なし') + '</div></div>';
  } else {
    var hasAttach = d['Attachments'] === true;
    var attachHtml = '';
    if (hasAttach) {
      attachHtml = '<div class="sec"><span class="sec-hdr bg1">添付ファイル</span>' +
        '<div class="attach-loading" id="attach-area"><div class="loading"><div class="spinner"></div><span>読み込み中...</span></div></div>' +
        '</div>';
    }
    b.innerHTML =
      '<div class="sec"><span class="sec-hdr bg2">代金処理</span>' +
      '<div class="fgrid">' +
      fld('請求書郵送日', G(d,'請求書郵送日')) +
      fld('入金日', G(d,'入金日')) +
      fld('社内連絡', G(d,'社内連絡'), true, true) +
      '</div></div>' + attachHtml;
    if (hasAttach) {
      loadAttachments(d['id']);
    }
  }
}

function loadAttachments(itemId) {
  var area = document.getElementById('attach-list-' + itemId);
  if (!area) return;
  msal.acquireTokenSilent({
    scopes: ['https://shojisekizai.sharepoint.com/AllSites.Read'],
    account: msal.getActiveAccount()
  }).then(function(resp) {
    var token = resp.accessToken;
    var url = 'https://shojisekizai.sharepoint.com/sites/stoneworks/_api/web/lists/getbytitle(\'納骨・戒切\')/items(' + itemId + ')/AttachmentFiles';
    return fetch(url, { headers: { Authorization: 'Bearer ' + token, Accept: 'application/json;odata=verbose' } });
  }).then(function(r) { return r.json(); })
  .then(function(data) {
    var files = (data.d && data.d.results) ? data.d.results : [];
    if (files.length === 0) {
      area.innerHTML = '<div class="attach-empty">添付ファイルなし</div>';
      return;
    }
    area.innerHTML = files.map(function(f) {
      var ext = (f.FileName || '').split('.').pop().toUpperCase() || 'FILE';
      var isImg = /^(JPG|JPEG|PNG|GIF|WEBP|BMP)$/.test(ext);
      var color = isImg ? '#0f6e56' : ext === 'PDF' ? '#c0392b' : '#1565c0';
      var fullUrl = 'https://shojisekizai.sharepoint.com' + f.ServerRelativeUrl;
      return '<a href="' + fullUrl + '" target="_blank" class="attach-row" style="text-decoration:none">' +
        '<div class="attach-icon-sm" style="background:' + color + '">' + ext.substring(0,4) + '</div>' +
        '<span class="attach-name">' + f.FileName + '</span>' +
        '<span class="attach-arrow">›</span>' +
        '</a>';
    }).join('');
  }).catch(function(e) {
    area.innerHTML = '<div class="attach-empty" style="color:#c0392b">取得エラー: ' + e.message + '</div>';
  });
}

    var area = document.getElementById('attach-area');
    if (!area) return;
    var files = (data.d && data.d.results) ? data.d.results : [];
    if (files.length === 0) {
      area.innerHTML = '<div style="color:var(--color-text-tertiary,#aaa);font-size:13px;padding:8px 0">添付ファイルなし</div>';
      return;
    }
    area.innerHTML = files.map(function(f) {
      var ext = (f.FileName || '').split('.').pop().toUpperCase() || 'FILE';
      var isImg = /^(jpg|jpeg|png|gif|webp|bmp)$/i.test(ext);
      return '<a href="' + f.ServerRelativeUrl + '" target="_blank" style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:10px;margin-bottom:6px;text-decoration:none;color:#1a1a1a">' +
        '<div style="width:36px;height:36px;border-radius:6px;background:' + (isImg ? '#0f6e56' : '#1565c0') + ';display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:500;flex-shrink:0">' + ext.substring(0,4) + '</div>' +
        '<span style="font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + f.FileName + '</span>' +
        '<span style="color:#1565c0;font-size:18px">›</span>' +
        '</a>';
    }).join('');
  }).catch(function(e) {
    var area = document.getElementById('attach-area');
    if (area) area.innerHTML = '<div style="color:#c0392b;font-size:12px">取得エラー: ' + e.message + '</div>';
  });
}
