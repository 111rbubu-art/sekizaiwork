<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>封筒印刷 - カスタム版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=BIZ+UDPMincho:wght@400;700&family=Hina+Mincho&family=Klee+One:wght@400;600&family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@400;700&family=Yuji+Syuku&family=Zen+Old+Mincho:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif JP',sans-serif;background:#d8d8d8}

.f-noto     { font-family: 'Noto Serif JP', serif !important; }
.f-shippori { font-family: 'Shippori Mincho', serif !important; }
.f-yuji     { font-family: 'Yuji Syuku', serif !important; }
.f-biz      { font-family: 'BIZ UDPMincho', serif !important; }
.f-zen      { font-family: 'Zen Old Mincho', serif !important; }
.f-klee     { font-family: 'Klee One', cursive !important; }
.f-hina     { font-family: 'Hina Mincho', serif !important; }

/* コントロールバー */
.ctrl{
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  padding:9px 14px;background:#1a2535;color:#fff;
  position:fixed;top:0;left:0;right:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
}
.ct{font-size:14px;font-weight:500;white-space:nowrap}
.sep{width:1px;height:22px;background:rgba(255,255,255,0.2);flex-shrink:0}
.btn{
  font-family:'Noto Sans JP',sans-serif;font-size:11px;padding:5px 11px;
  border:1px solid rgba(255,255,255,0.28);background:rgba(255,255,255,0.08);
  color:#fff;cursor:pointer;border-radius:3px;white-space:nowrap
}
.btn:hover{background:rgba(255,255,255,0.2)}
.btn.pr{background:#1a5a9a;border-color:#1a5a9a}
.btn.sv{background:#2a7a2a;border-color:#2a7a2a}
.lbl{font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap}
.kw{display:flex;gap:3px}
.kb{
  font-family:'Noto Serif JP',serif;font-size:11px;padding:4px 9px;
  border:1px solid rgba(255,255,255,0.22);background:transparent;
  color:rgba(255,255,255,0.55);cursor:pointer;border-radius:3px
}
.kb.on{background:#1a5a9a;border-color:#1a5a9a;color:#fff}
.fsel{
  font-family:'Noto Serif JP',serif;font-size:11px;padding:4px 8px;
  border:1px solid rgba(255,255,255,0.22);background:#2a3545;
  color:#fff;cursor:pointer;border-radius:3px;
}

/* プレビューエリア */
.pv{
  padding:64px 24px 40px;
  display:flex;justify-content:center;gap:18px;align-items:flex-start;
  min-height:100vh;
}

/* 封筒本体 */
.env{
  width:360px;height:705px;
  background:#fff;position:relative;flex-shrink:0;
  box-shadow:1px 2px 16px rgba(0,0,0,0.22),0 0 0 0.5px #bbb;
}

/* 郵便番号 — 前3桁・後4桁を個別ブロックに */
.zr3{ position:absolute; top:39px; right:124px; display:flex; align-items:center; gap:2px; }
.zr4{ position:absolute; top:39px; right:24px;  display:flex; align-items:center; gap:2px; }
.zb{
  width:21px;height:21px; border:1.5px solid #c00;
  display:flex;align-items:center;justify-content:center;
  font-size:13px; color:#111;
}
.zs{ color:#c00;font-weight:700;font-size:13px; margin:0 1px; line-height:1; }

/* 住所 — text-orientation:mixed で全角数字・ーが正しく縦表示 */
.aw1{ position:absolute; top:93px;  left:299px; }
.aw2{ position:absolute; top:311px; left:267px; }
.ac{
  writing-mode:vertical-rl; text-orientation:mixed;
  font-size:26px; line-height:1.85;
  color:#111; white-space:nowrap; letter-spacing:0.06em;
}

/* 宛名 — 名前・スペース・敬称を縦書き一列に配置 */
.nb{
  position:absolute; top:156px; left:154px;
  writing-mode:vertical-rl; text-orientation:mixed;
}
.n-name{
  font-size:41px; font-weight:700;
  color:#111; letter-spacing:0.12em; white-space:nowrap;
}
.n-gap{ font-size:15px; } /* 名前と敬称の間の半角スペース相当 */
.n-keisho{
  font-size:44px; font-weight:700;
  color:#111; white-space:nowrap;
}

/* 差出人 */
.sb{ position:absolute; bottom:12px; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:2px; }
.sc{ font-size:13px; color:#111; letter-spacing:0.2em; white-space:nowrap; }
.si{ font-size:8.5px; color:#333; letter-spacing:0.04em; white-space:nowrap; }

.dr{cursor:move}
.dr.sel{outline:2px dashed #1a5a9a;outline-offset:4px}

/* 調整パネル */
.ap{
  width:220px; flex-shrink:0; background:#fff; border-radius:8px; padding:14px;
  box-shadow:0 2px 12px rgba(0,0,0,0.12); display:none;
}
.ap.vis{display:block}
.ah{font-size:12px;font-weight:500;color:#1a2535;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee}
.ar{display:flex;align-items:center;gap:5px;margin-bottom:7px;font-size:11px}
.al{color:#666;width:46px;flex-shrink:0;font-size:10px}
.ai{width:56px;font-size:11px;padding:3px;border:1px solid #ddd;border-radius:2px;text-align:center}

/* 自社情報パネル */
.sp{
  width:264px; background:#fff; border-radius:8px; padding:14px;
  box-shadow:0 2px 12px rgba(0,0,0,0.12); display:none;
  max-height:calc(100vh - 80px); overflow-y:auto;
}
.sp.vis{display:block}
.sp-hd{font-size:12px;font-weight:600;color:#1a2535;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee}
.sp-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.sp-lbl{font-size:10px;color:#555;width:56px;flex-shrink:0}
.spi{flex:1;font-size:11px;padding:4px 7px;border:1px solid #ddd;border-radius:3px}
.sp-div{border-top:1px solid #eee;margin:10px 0 8px}
.sp-frow{display:flex;align-items:center;gap:5px;margin-bottom:6px;font-size:10px;color:#555}
.spkb{
  font-size:10px;padding:3px 8px;
  border:1px solid #bbb;background:transparent;
  color:#555;cursor:pointer;border-radius:2px
}
.spkb.on{background:#1a5a9a;border-color:#1a5a9a;color:#fff}
.spb{width:100%;margin-top:8px;font-size:12px;padding:7px;background:#1a2535;color:#fff;border:none;cursor:pointer;border-radius:4px}

@media print{
  body{background:#fff}
  .ctrl,.ap,.sp{display:none!important}
  .pv{padding:0;background:#fff;display:block}
  .env{
    width:360px;height:705px;
    box-shadow:none;border:none;
    transform-origin:0 0;
    transform:scale(1.2598); /* 360px → 120mm, 705px → 235mm */
  }
  .zb{border:none} /* 封筒印刷済みの赤枠は不要 */
  @page{size:120mm 235mm;margin:0}
}
</style>
</head>
<body>

<div class="ctrl">
  <span class="ct">✉️ 封筒印刷</span>
  <div class="sep"></div>
  <span class="lbl">フォント：</span>
  <select id="fontSel" class="fsel" onchange="setFont(this.value)">
    <option value="f-noto">Noto 明朝</option>
    <option value="f-shippori">しっぽり明朝</option>
    <option value="f-yuji">游字塾 行書</option>
    <option value="f-biz">BIZ 明朝</option>
    <option value="f-zen">旧字明朝</option>
    <option value="f-klee">Klee 楷書</option>
    <option value="f-hina">細明朝</option>
  </select>
  <div class="sep"></div>
  <span class="lbl">敬称：</span>
  <div class="kw">
    <button class="kb on" onclick="setK('様',this)">様</button>
    <button class="kb" onclick="setK('御中',this)">御中</button>
  </div>
  <div class="sep"></div>
  <button class="btn" onclick="tgSP()">🏢 自社情報</button>
  <button class="btn" onclick="tgAP()">⚙ 位置調整</button>
  <button class="btn sv" id="btnSave" onclick="saveSettings()">💾 設定保存</button>
  <button class="btn pr" onclick="window.print()">🖨 印刷</button>
</div>

<div class="pv">
  <div class="env f-noto" id="env">
    <div class="zr3 dr" id="zB3">
      <div class="zb" id="z0"></div><div class="zb" id="z1"></div><div class="zb" id="z2"></div>
    </div>
    <div class="zr4 dr" id="zB4">
      <div class="zb" id="z3"></div><div class="zb" id="z4"></div><div class="zb" id="z5"></div><div class="zb" id="z6"></div>
    </div>
    <div class="aw1 dr" id="aB1">
      <div class="ac" id="a1"></div>
    </div>
    <div class="aw2 dr" id="aB2">
      <div class="ac" id="a2"></div>
    </div>
    <!-- 名前・半角スペース・敬称を縦書き一列に並べる -->
    <div class="nb dr" id="nB">
      <span class="n-name" id="nT"></span><span class="n-gap">　</span><span class="n-keisho" id="kT">様</span>
    </div>
    <div class="sb dr" id="sB"></div>
  </div>

  <div class="ap" id="aPanel">
    <div class="ah" id="aH">⚙ 位置調整</div>
    <div id="aBody">要素を選択してください</div>
  </div>

  <div class="sp" id="spPanel">
    <div class="sp-hd">🏢 自社情報</div>
    <div class="sp-row"><span class="sp-lbl">社名</span><input class="spi" id="spName" placeholder="株式会社○○石材"></div>
    <div class="sp-row"><span class="sp-lbl">郵便番号</span><input class="spi" id="spZip" placeholder="000-0000"></div>
    <div class="sp-row"><span class="sp-lbl">住所</span><input class="spi" id="spAddr" placeholder="東京都..."></div>
    <div class="sp-row"><span class="sp-lbl">電話番号</span><input class="spi" id="spTel" placeholder="00-0000-0000"></div>
    <div class="sp-row"><span class="sp-lbl">FAX</span><input class="spi" id="spFax" placeholder="00-0000-0000"></div>
    <div class="sp-row"><span class="sp-lbl">HP</span><input class="spi" id="spHp" placeholder="https://..."></div>
    <div class="sp-div"></div>
    <div class="sp-frow">
      <span style="width:56px;flex-shrink:0">フォント</span>
      <select id="spFontSel" onchange="setSFont(this.value)" style="flex:1;font-size:11px;padding:3px 5px;border:1px solid #ddd;border-radius:3px">
        <option value="f-noto">Noto 明朝</option>
        <option value="f-shippori">しっぽり明朝</option>
        <option value="f-yuji">游字塾 行書</option>
        <option value="f-biz">BIZ 明朝</option>
        <option value="f-zen">旧字明朝</option>
        <option value="f-klee">Klee 楷書</option>
        <option value="f-hina">細明朝</option>
      </select>
    </div>
    <div class="sp-frow">
      <span style="width:56px;flex-shrink:0">社名サイズ</span>
      <input type="number" class="ai" id="spNSize" value="13" min="6" max="30">
      <span>px</span>
    </div>
    <div class="sp-frow">
      <span style="width:56px;flex-shrink:0">情報サイズ</span>
      <input type="number" class="ai" id="spISize" value="8" min="5" max="20">
      <span>px</span>
    </div>
    <button class="spb" onclick="saveSender()">登録・反映</button>
  </div>
</div>

<script>
var D = {};
try { D = JSON.parse(sessionStorage.getItem('envelopeData') || '{"zip":"1234567","addr1":"東京都杉並区サンプル1-2-3","addr2":"マンション名101","name":"山田 太郎"}'); } catch(e){}

var DEF_SENDER = {
  name: '有限会社 庄司石材店',
  zip: '168-0082',
  addr: '東京都杉並区久我山5-5-12-201',
  tel: '03-3333-8451',
  fax: '03-3333-8452',
  hp: 'www.shojisekizai.jp',
  font: 'f-noto',
  nameSize: 13,
  infoSize: 8
};

var _fontClasses = ['f-noto','f-shippori','f-yuji','f-biz','f-zen','f-klee','f-hina'];
var FONTS = {
  'f-noto':     "'Noto Serif JP', serif",
  'f-shippori': "'Shippori Mincho', serif",
  'f-yuji':     "'Yuji Syuku', serif",
  'f-biz':      "'BIZ UDPMincho', serif",
  'f-zen':      "'Zen Old Mincho', serif",
  'f-klee':     "'Klee One', cursive",
  'f-hina':     "'Hina Mincho', serif"
};
var _sFontCls = 'f-noto';

function setZip(z) {
  var d = (z || '').replace(/[^0-9]/g, '');
  for (var i = 0; i < 7; i++) {
    var e = document.getElementById('z' + i);
    if (e) e.textContent = d[i] || '';
  }
}

/* 半角数字→全角、各種ハイフン→ー（縦書きで縦線に見える） */
function toTate(s) {
  return (s || '')
    .replace(/[0-9]/g, function(m) { return String.fromCharCode(m.charCodeAt(0) + 0xFEE0); })
    .replace(/[-‐‑‒–—－]/g, 'ー');
}

function init() {
  setZip(D.zip || '');
  document.getElementById('a1').textContent = toTate(D.addr1 || '');
  document.getElementById('a2').textContent = toTate(D.addr2 || '');
  document.getElementById('nT').textContent = D.name || '';
  loadSender();
  loadSettings();
}

/* ===== 差出人 ===== */
function loadSender() {
  var raw = {};
  try { raw = JSON.parse(localStorage.getItem('envSender') || '{}'); } catch(e){}
  var s = Object.keys(raw).length ? raw : DEF_SENDER;
  document.getElementById('spName').value  = s.name     || DEF_SENDER.name;
  document.getElementById('spZip').value   = s.zip      || DEF_SENDER.zip;
  document.getElementById('spAddr').value  = s.addr     || DEF_SENDER.addr;
  document.getElementById('spTel').value   = s.tel      || DEF_SENDER.tel;
  document.getElementById('spFax').value   = s.fax      || DEF_SENDER.fax;
  document.getElementById('spHp').value    = s.hp       || DEF_SENDER.hp;
  document.getElementById('spNSize').value = s.nameSize || DEF_SENDER.nameSize;
  document.getElementById('spISize').value = s.infoSize || DEF_SENDER.infoSize;
  _sFontCls = s.font || DEF_SENDER.font;
  document.getElementById('spFontSel').value = _sFontCls;
  renderSender(s);
}

function renderSender(s) {
  var sb = document.getElementById('sB');
  sb.innerHTML = '';
  var ns = parseFloat(s.nameSize) || 13;
  var is = parseFloat(s.infoSize) || 8;
  var ff = FONTS[s.font || 'f-noto'] || FONTS['f-noto'];

  function addLine(text, big) {
    if (!text) return;
    var d = document.createElement('div');
    d.className = big ? 'sc' : 'si';
    d.textContent = text;
    d.style.fontSize = (big ? ns : is) + 'px';
    d.style.fontFamily = ff;
    sb.appendChild(d);
  }
  addLine(s.name, true);
  if (s.zip)  addLine('〒' + s.zip, false);   /* 〒 */
  addLine(s.addr, false);
  if (s.tel)  addLine('TEL ' + s.tel, false);
  if (s.fax)  addLine('FAX ' + s.fax, false);
  addLine(s.hp, false);
}

function saveSender() {
  var s = {
    name:     document.getElementById('spName').value,
    zip:      document.getElementById('spZip').value,
    addr:     document.getElementById('spAddr').value,
    tel:      document.getElementById('spTel').value,
    fax:      document.getElementById('spFax').value,
    hp:       document.getElementById('spHp').value,
    font:     _sFontCls,
    nameSize: parseFloat(document.getElementById('spNSize').value) || 13,
    infoSize: parseFloat(document.getElementById('spISize').value) || 8
  };
  localStorage.setItem('envSender', JSON.stringify(s));
  renderSender(s);
  tgSP();
}

function setSFont(cls) { _sFontCls = cls; }

/* ===== 設定保存・読込 ===== */
function saveSettings() {
  var s = {};
  document.querySelectorAll('.dr').forEach(function(el) {
    if (el.style.left) s[el.id + '_l'] = el.style.left;
    if (el.style.top)  s[el.id + '_t'] = el.style.top;
  });
  ['zB3','zB4'].forEach(function(zid) {
    var zb0 = document.querySelector('#' + zid + ' .zb');
    if (zb0) {
      if (zb0.style.height) s[zid + '_h'] = zb0.style.height;
      if (zb0.style.width)  s[zid + '_w'] = zb0.style.width;
    }
  });
  ['a1','a2'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el && el.style.fontSize) s[id + '_fs'] = el.style.fontSize;
  });
  var nT = document.getElementById('nT'), kT = document.getElementById('kT');
  if (nT && nT.style.fontSize) s['nT_fs'] = nT.style.fontSize;
  if (kT && kT.style.fontSize) s['kT_fs'] = kT.style.fontSize;
  var fontSel = document.getElementById('fontSel');
  s['env_font'] = fontSel ? fontSel.value : 'f-noto';
  localStorage.setItem('envSettings', JSON.stringify(s));

  var btn = document.getElementById('btnSave');
  var orig = btn.textContent;
  btn.textContent = '✓ 保存済';
  setTimeout(function() { btn.textContent = orig; }, 1400);
}

function loadSettings() {
  var s = {};
  try { s = JSON.parse(localStorage.getItem('envSettings') || '{}'); } catch(e) { return; }
  document.querySelectorAll('.dr').forEach(function(el) {
    if (s[el.id + '_l']) { el.style.position = 'absolute'; el.style.left = s[el.id + '_l']; }
    if (s[el.id + '_t']) { el.style.position = 'absolute'; el.style.top  = s[el.id + '_t']; }
  });
  ['zB3','zB4'].forEach(function(zid) {
    var zb0 = document.querySelector('#' + zid + ' .zb');
    if (!zb0) return;
    var zh = parseInt(s[zid + '_h'] || s[zid + '_sz']) || 0;
    var zw = parseInt(s[zid + '_w'] || s[zid + '_sz']) || 0;
    if (zh || zw) {
      document.querySelectorAll('#' + zid + ' .zb').forEach(function(b) {
        if (zh) { b.style.height = zh + 'px'; b.style.fontSize = Math.round(zh * 0.62) + 'px'; }
        if (zw) b.style.width = zw + 'px';
      });
    }
  });
  ['a1','a2'].forEach(function(id) {
    if (s[id + '_fs']) { var el = document.getElementById(id); if (el) el.style.fontSize = s[id + '_fs']; }
  });
  var nT = document.getElementById('nT'), kT = document.getElementById('kT');
  if (nT && s['nT_fs']) nT.style.fontSize = s['nT_fs'];
  if (kT && s['kT_fs']) kT.style.fontSize = s['kT_fs'];
  if (s['env_font']) {
    setFont(s['env_font']);
    var fontSel = document.getElementById('fontSel');
    if (fontSel) fontSel.value = s['env_font'];
  }
}

function tgSP() { document.getElementById('spPanel').classList.toggle('vis'); }
function tgAP() { document.getElementById('aPanel').classList.toggle('vis'); }

function setFont(cls) {
  var env = document.getElementById('env');
  _fontClasses.forEach(function(c) { env.classList.remove(c); });
  env.classList.add(cls);
}

function setK(k, btn) {
  document.getElementById('kT').textContent = k;
  btn.parentNode.querySelectorAll('.kb').forEach(function(b) { b.classList.toggle('on', b === btn); });
}

/* ===== ドラッグ ===== */
var dg = null, sel = null, sx, sy, ox, oy;
document.querySelectorAll('.dr').forEach(function(el) {
  el.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    if (sel) sel.classList.remove('sel');
    sel = el; el.classList.add('sel');
    showAdj(el);
    dg = el; sx = e.clientX; sy = e.clientY;
    var er = document.getElementById('env').getBoundingClientRect();
    var lr = el.getBoundingClientRect();
    ox = lr.left - er.left; oy = lr.top - er.top;
    el.style.position = 'absolute';
    el.style.left = ox + 'px'; el.style.top = oy + 'px';
    e.preventDefault();
  });
});
document.addEventListener('mousemove', function(e) {
  if (!dg) return;
  dg.style.left = (ox + e.clientX - sx) + 'px';
  dg.style.top  = (oy + e.clientY - sy) + 'px';
  updAdj();
});
document.addEventListener('mouseup', function() { dg = null; });

function showAdj(el) {
  document.getElementById('aPanel').classList.add('vis');
  var NM = { zB3:'郵便番号 前3桁', zB4:'郵便番号 後4桁', aB1:'住所１', aB2:'住所２', nB:'宛名', sB:'差出人' };
  document.getElementById('aH').textContent = '⚙ ' + (NM[el.id] || '');
  updAdj();
}

function updAdj() {
  if (!sel) return;
  var l = parseInt(sel.style.left) || 0;
  var t = parseInt(sel.style.top)  || 0;
  var h = '<div class="ar"><span class="al">左(px)</span><input class="ai" type="number" value="'+l+'" oninput="sp(\'left\',this.value)"></div>' +
          '<div class="ar"><span class="al">上(px)</span><input class="ai" type="number" value="'+t+'" oninput="sp(\'top\',this.value)"></div>';

  if (sel.id === 'zB3' || sel.id === 'zB4') {
    var zb0 = sel.querySelector('.zb');
    var zh = zb0 ? (parseInt(zb0.style.height) || 21) : 21;
    var zw = zb0 ? (parseInt(zb0.style.width)  || 21) : 21;
    h += '<div class="ar"><span class="al">高さ(px)</span><input class="ai" type="number" value="'+zh+'" oninput="szvH(this.value)"></div>';
    h += '<div class="ar"><span class="al">幅(px)</span><input class="ai" type="number" value="'+zw+'" oninput="szvW(this.value)"></div>';
  } else if (sel.id === 'nB') {
    var nEl = sel.querySelector('.n-name'),  kEl = sel.querySelector('.n-keisho');
    var nFs = nEl ? Math.round(parseFloat(window.getComputedStyle(nEl).fontSize)) : 30;
    var kFs = kEl ? Math.round(parseFloat(window.getComputedStyle(kEl).fontSize)) : 22;
    h += '<div class="ar"><span class="al">名前px</span><input class="ai" type="number" value="'+nFs+'" oninput="sfn(this.value)"></div>';
    h += '<div class="ar"><span class="al">敬称px</span><input class="ai" type="number" value="'+kFs+'" oninput="sfk(this.value)"></div>';
  } else {
    var inner = sel.querySelector('.ac, .sc, .si');
    var fs = inner ? Math.round(parseFloat(window.getComputedStyle(inner).fontSize)) : 0;
    if (fs > 0) h += '<div class="ar"><span class="al">サイズ</span><input class="ai" type="number" value="'+fs+'" oninput="sfv(this.value)"></div>';
  }
  document.getElementById('aBody').innerHTML = h;
}

function sp(axis, v) { if (sel) sel.style[axis] = v + 'px'; }

function szvH(v) {
  if (!sel) return;
  var h = parseInt(v) || 21;
  sel.querySelectorAll('.zb').forEach(function(b) {
    b.style.height = h + 'px';
    b.style.fontSize = Math.round(h * 0.62) + 'px';
  });
  sel.querySelectorAll('.zs').forEach(function(b) { b.style.fontSize = Math.round(h * 0.62) + 'px'; });
}

function szvW(v) {
  if (!sel) return;
  var w = parseInt(v) || 21;
  sel.querySelectorAll('.zb').forEach(function(b) { b.style.width = w + 'px'; });
}

function sfn(v) { if (sel) { var el = sel.querySelector('.n-name');    if (el) el.style.fontSize = v + 'px'; } }
function sfk(v) { if (sel) { var el = sel.querySelector('.n-keisho'); if (el) el.style.fontSize = v + 'px'; } }
function sfv(v) {
  if (!sel) return;
  sel.querySelectorAll('.ac, .sc, .si').forEach(function(c) { c.style.fontSize = v + 'px'; });
}

init();
</script>
</body>
</html>
