<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>外注管理 — GaiLists</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; color: #1a2535; background: #f0f2f5; }
  body { display: flex; flex-direction: column; }
  .gai-bar { position: sticky; top: 0; z-index: 5; padding: 10px 12px; background: #1a2535; color: #fff; display: flex; gap: 8px 10px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
  .gai-bar .title { font-size: 15px; font-weight: 700; }
  .gai-bar .spacer { flex: 1 1 8px; }
  .gai-bar button, .gai-bar a { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
  .gai-bar2 { display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: center; padding: 8px 12px; background: #eef1f5; border-bottom: 1px solid #e2e5ea; }
  .gai-bar2:empty { display: none; }
  .dc-box { display: inline-flex; align-items: center; gap: 6px; }
  .dc-box label { font-size: 12px; font-weight: 700; color: #46536b; }
  .dc-box select { padding: 5px 8px; border: 1px solid #ccd2dc; border-radius: 6px; font-size: 13px; font-family: inherit; }
  .dc-toggle { padding: 5px 12px; border: 1px solid #c3c9d4; background: #fff; color: #46536b; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .dc-toggle.on { background: #1a2535; color: #fff; border-color: #1a2535; }
  .btn-excel { background: #0a6a3a; color: #fff; }
  .btn-add { background: #d97706; color: #fff; }
  .btn-invoice { background: #6d28d9; color: #fff; }
  .btn-reload { background: #46536b; color: #fff; }
  .filter-box { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.12); padding: 4px 8px; border-radius: 8px; }
  .filter-box label { font-size: 12px; font-weight: 700; }
  .filter-box select { padding: 6px 8px; border-radius: 6px; border: none; font-size: 13px; font-family: inherit; max-width: 200px; }
  #content { flex: 1; overflow: auto; }
  .tbl-wrap { overflow-x: auto; padding: 12px; }
  table.gai { border-collapse: collapse; width: 100%; font-size: 13px; background: #fff; }
  table.gai th, table.gai td { border: 1px solid #e2e5ea; padding: 7px 10px; text-align: left; white-space: nowrap; vertical-align: top; }
  table.gai th { background: #eef1f5; font-weight: 700; position: sticky; top: 0; z-index: 1; }
  table.gai tr:nth-child(even) td { background: #fafbfc; }
  .row-act { display: flex; gap: 6px; }
  .row-act button { padding: 5px 10px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; }
  .act-edit { background: #1a5fb4; color: #fff; }
  .act-del { background: #c0322b; color: #fff; }
  .count { padding: 4px 12px 0; font-size: 12px; color: #666; }
  .msg { padding: 20px; text-align: center; color: #666; font-size: 14px; }
  .msg.err { color: #c0322b; white-space: pre-wrap; text-align: left; }
  /* Modal */
  #modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.45); align-items: center; justify-content: center; padding: 16px; }
  #modal.show { display: flex; }
  .modal-box { background: #fff; border-radius: 12px; width: 100%; max-width: 520px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,.3); }
  .modal-hd { padding: 12px 16px; background: #1a2535; color: #fff; font-size: 15px; font-weight: 700; display: flex; align-items: center; }
  .modal-hd button { margin-left: auto; background: rgba(255,255,255,.2); color: #fff; border: none; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 16px; }
  .modal-body { padding: 14px 16px; overflow-y: auto; }
  .fld { margin-bottom: 12px; }
  .fld label { display: block; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 4px; }
  .fld label .tag { font-weight: 500; color: #999; font-size: 11px; }
  .fld input { width: 100%; padding: 9px 10px; border: 1px solid #ccc; border-radius: 7px; font-size: 14px; font-family: inherit; }
  .modal-ft { padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 8px; }
  .modal-ft button { flex: 1; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
  .btn-cancel { background: #eee; color: #555; }
  .btn-clear { background: #fff3e6; color: #b45309; border: 1px solid #f0c992 !important; }
  .btn-save { background: #1a5a1a; color: #fff; flex: 2; }
  #modal-fields select { width: 100%; padding: 9px 10px; border: 1px solid #ccc; border-radius: 7px; font-size: 14px; font-family: inherit; background: #fff; }
  .ref-pick { display: flex; flex-direction: column; gap: 6px; background: #f5f6f8; border: 1px solid #e2e5ea; border-radius: 8px; padding: 8px; }
  .ref-row { display: flex; align-items: center; gap: 8px; }
  .ref-lbl { flex: 0 0 34px; font-size: 12px; font-weight: 700; color: #46536b; text-align: right; }
  .ref-row select { flex: 1; min-width: 0; }
  .date-hybrid { display: flex; gap: 6px; align-items: stretch; }
  .date-hybrid input[type="text"] { flex: 1; }
  .date-hybrid .cal { flex: 0 0 auto; width: 46px; padding: 9px 2px; }
  .amt-quick { display: flex; gap: 8px; margin-top: 6px; }
  .amt-quick button { flex: 1; padding: 8px; border: 1px solid #1a5a1a; background: #f0f7f0; color: #1a5a1a; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .amt-quick button:active { background: #1a5a1a; color: #fff; }
  .toast { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); background: #1a2535; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.err { background: #c0322b; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,.2); border-top-color: #333; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="gai-bar">
    <span class="title">🏭 外注リスト（GaiLists）</span>
    <span id="filter-wrap"></span>
    <span class="spacer"></span>
    <a id="open-excel" class="btn-excel" target="_blank" rel="noopener">📊 Excelを開いて編集</a>
    <button class="btn-reload" onclick="loadGai()">🔄 更新</button>
    <button class="btn-add" onclick="openForm(-1)">➕ 新規追加</button>
    <button class="btn-invoice" onclick="makeInvoice()" title="選択中の対象者・月の明細を「◯◯請求書」シートの「◯◯」テーブルにコピー">🧾 請求書作成</button>
  </div>
  <div class="gai-bar2" id="date-controls"></div>
  <div id="content"><div class="msg"><span class="spinner"></span> 読み込み中…</div></div>

  <!-- Add/Edit modal -->
  <div id="modal">
    <div class="modal-box">
      <div class="modal-hd"><span id="modal-title">新規追加</span><button onclick="closeForm()">✕</button></div>
      <div class="modal-body" id="modal-fields"></div>
      <div class="modal-ft">
        <button class="btn-cancel" onclick="closeForm()">キャンセル</button>
        <button class="btn-clear" onclick="clearForm()">クリア</button>
        <button class="btn-save" id="modal-save" onclick="saveForm()">✅ 保存</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
var TABLE = (window.opener && window.opener.GAICHU_TABLE_NAME) || 'GaiLists';
var SHARE_URL = (window.opener && window.opener.GAICHU_XLSX_URL) ||
  'https://shojisekizai.sharepoint.com/:x:/s/stoneworks/ER4MrknFBfRJq-Ia7AEhDVQBVQ5I23c3eHbE9hyS1oKw-A?e=FZoeAs';

var COLUMNS = [];      // 列名（順序）
var ROWS = [];         // [{ index, values:[raw], text:[disp], fmt:[numberFormat] }]
var COLTYPE = [];      // 'date' | 'number' | 'text'
var WB = null;         // { base, webUrl }
var editingIndex = -1; // -1: 新規, それ以外: ROWSの添字（=テーブル行index）
var filterValue = '';  // 対象者フィルター（''=すべて）
var sortDir = 'desc';  // 'desc'=新しい順, 'asc'=古い順
var monthFilter = '';  // '' or 'YYYY-MM'
var dateColIndex = -1; // 並び替え・月フィルターの基準日列
var titleColIndex = -1;// 工事名称（件名）列
var amountColIndex = -1;// 委託料（金額）列
var _koujiCache = null;// 工事関連リスト（fields抜粋）のキャッシュ
var _nokCache = null;  // 納骨・戒切リスト（納骨/彫刻候補用）のキャッシュ

// ---------- 共通 ----------
function escapeHtml(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function toast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(t._tm); t._tm = setTimeout(function(){ t.className = 'toast'; }, isErr ? 4500 : 2500);
}
function getToken() {
  if (!window.opener || !window.opener.getGaichuGraphToken) {
    return Promise.reject(new Error('アプリ本体（親ウィンドウ）との接続がありません。\nアプリのタブを開いたまま、トップの「外注管理」ボタンから開いてください。'));
  }
  return window.opener.getGaichuGraphToken();
}
function gfetch(url, opts) {
  opts = opts || {};
  return getToken().then(function (token) {
    var headers = { 'Authorization': 'Bearer ' + token };
    for (var k in (opts.headers || {})) headers[k] = opts.headers[k];
    var body = opts.body;
    if (body && typeof body !== 'string') { body = JSON.stringify(body); headers['Content-Type'] = 'application/json'; }
    return fetch(url, { method: opts.method || 'GET', headers: headers, body: body });
  }).then(function (res) {
    if (!res.ok) {
      return res.text().then(function (t) {
        var detail = t;
        try { var j = JSON.parse(t); if (j.error && j.error.message) detail = j.error.message; } catch (e) {}
        var err = new Error('Graph ' + res.status + ': ' + detail); err.status = res.status; throw err;
      });
    }
    if (res.status === 204) return null;
    var ct = res.headers.get('content-type') || '';
    return ct.indexOf('application/json') >= 0 ? res.json() : res.text();
  });
}
function encodeSharingUrl(u) {
  var b64 = btoa(unescape(encodeURIComponent(u)));
  return 'u!' + b64.replace(/=+$/, '').replace(/\//g, '_').replace(/\+/g, '-');
}
function resolveWorkbook() {
  if (WB) return Promise.resolve(WB);
  var enc = encodeSharingUrl(SHARE_URL);
  return gfetch('https://graph.microsoft.com/v1.0/shares/' + enc + '/driveItem?$select=id,parentReference,webUrl')
    .then(function (di) {
      if (!di || !di.parentReference || !di.parentReference.driveId) throw new Error('Excelファイルを特定できませんでした（共有リンクの解決に失敗）');
      WB = { base: 'https://graph.microsoft.com/v1.0/drives/' + di.parentReference.driveId + '/items/' + di.id + '/workbook', webUrl: di.webUrl };
      return WB;
    });
}
function tblUrl(suffix) { return WB.base + '/tables/' + encodeURIComponent(TABLE) + suffix; }

// 日付書式判定（y/m/d/h/s を含む番号書式は日付・時刻）
function isDateFmt(f) { return /[ymdhs]/i.test(String(f == null ? '' : f)); }
// 表示文字列 → Excelシリアル値（日付列の保存用）
function toExcelSerial(str) {
  if (str == null || String(str).trim() === '') return null;
  var s = String(str).trim().replace(/[年月]/g, '/').replace(/日/g, '').replace(/-/g, '/').replace(/\./g, '/');
  var m = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if (!m) { var d0 = new Date(str); if (isNaN(d0.getTime())) return null; m = [0, d0.getFullYear(), d0.getMonth() + 1, d0.getDate()]; }
  var y = +m[1], mo = +m[2], da = +m[3];
  var utc = Date.UTC(y, mo - 1, da);
  var epoch = Date.UTC(1899, 11, 30);
  var serial = Math.round((utc - epoch) / 86400000);
  return (serial > 0 && !isNaN(serial)) ? serial : null;
}

// ---------- 読み込み ----------
function loadGai() {
  var c = document.getElementById('content');
  c.innerHTML = '<div class="msg"><span class="spinner"></span> 読み込み中…</div>';
  resolveWorkbook()
    .then(function (wb) {
      document.getElementById('open-excel').href = SHARE_URL;
      return Promise.all([
        gfetch(tblUrl('/columns?$select=name,index&$top=200')),
        gfetch(tblUrl('/dataBodyRange?$select=values,text,numberFormat')).catch(function (e) {
          // 空テーブル等でデータ範囲が無い場合は空扱い
          return null;
        })
      ]);
    })
    .then(function (r) {
      var cols = (r[0].value || []).slice().sort(function (a, b) { return a.index - b.index; });
      COLUMNS = cols.map(function (x) { return x.name; });
      var body = r[1] || {};
      var vals = body.values || [];
      var txt = body.text || [];
      var fmt = body.numberFormat || [];
      ROWS = vals.map(function (rowVals, i) {
        return { index: i, values: rowVals || [], text: (txt[i] || []), fmt: (fmt[i] || []) };
      });
      computeColTypes();
      titleColIndex = findCol(['項目', '工事名称', '工事名', '件名', '案件名', '案件', '名称', '内容', '工事', '現場']);
      amountColIndex = findCol(['委託料', '金額', '日当', '単価', '料金']);
      // 件名列が見つからない場合は最初のテキスト列（対象者以外）を仮の書き込み先に
      if (titleColIndex < 0) {
        for (var _ci = 0; _ci < COLUMNS.length; _ci++) {
          if (isSysCol(COLUMNS[_ci])) continue;
          if (COLTYPE[_ci] !== 'text') continue;
          if (_ci === targetColIndex()) continue;
          titleColIndex = _ci; break;
        }
      }
      buildFilter();
      buildDateControls();
      renderGai();
    })
    .catch(function (e) {
      document.getElementById('content').innerHTML = '<div class="msg err">読み込みエラー:\n' + escapeHtml(e.message) + '</div>';
    });
}
function computeColTypes() {
  COLTYPE = COLUMNS.map(function (col, c) {
    var anyDate = false, anyNumber = false, anyText = false;
    for (var i = 0; i < ROWS.length; i++) {
      var f = ROWS[i].fmt[c]; var v = ROWS[i].values[c];
      if (isDateFmt(f)) anyDate = true;
      if (typeof v === 'number') anyNumber = true;
      else if (typeof v === 'string' && v.trim() !== '') anyText = true;
    }
    if (anyDate) return 'date';
    if (anyNumber && !anyText) return 'number';
    return 'text';
  });
}

// ---------- 対象者フィルター ----------
// 表示文字列（text優先・無ければ生値）
function cellStr(row, c) {
  var t = row.text[c];
  if (t != null && String(t) !== '') return String(t);
  var v = row.values[c];
  return (v == null) ? '' : String(v);
}
// 「対象者」列を表記ゆれ込みで探す
function targetColIndex() {
  for (var i = 0; i < COLUMNS.length; i++) { if (String(COLUMNS[i]).replace(/[\s　]/g, '') === '対象者') return i; }
  for (var i = 0; i < COLUMNS.length; i++) { if (String(COLUMNS[i]).indexOf('対象') >= 0) return i; }
  return -1;
}
function buildFilter() {
  var wrap = document.getElementById('filter-wrap');
  var tc = targetColIndex();
  if (tc < 0) { wrap.innerHTML = ''; return; }
  var seen = {}, opts = [];
  ROWS.forEach(function (row) {
    var v = cellStr(row, tc);
    if (v !== '' && !seen[v]) { seen[v] = 1; opts.push(v); }
  });
  opts.sort(function (a, b) { return a.localeCompare(b, 'ja'); });
  if (opts.indexOf(filterValue) < 0) filterValue = ''; // 消えた値はリセット
  var h = '<span class="filter-box"><label>対象者</label><select onchange="onFilterChange(this.value)">';
  h += '<option value=""' + (filterValue === '' ? ' selected' : '') + '>すべて（' + ROWS.length + '件）</option>';
  opts.forEach(function (v) { h += '<option value="' + escapeHtml(v) + '"' + (filterValue === v ? ' selected' : '') + '>' + escapeHtml(v) + '</option>'; });
  h += '</select></span>';
  wrap.innerHTML = h;
}
function onFilterChange(v) { filterValue = v; renderGai(); }

// ---------- 並び順・月フィルター（日付列がある場合のみ） ----------
function buildDateControls() {
  var wrap = document.getElementById('date-controls');
  if (!wrap) return;
  var dcs = dateColumns();
  if (!dcs.length) { wrap.innerHTML = ''; dateColIndex = -1; return; }
  if (dcs.indexOf(dateColIndex) < 0) dateColIndex = dcs[0];
  // 月候補
  var seen = {}, months = [];
  ROWS.forEach(function (row) {
    var ms = rowDateMs(row, dateColIndex);
    if (ms == null) return;
    var ym = ymOf(ms);
    if (!seen[ym]) { seen[ym] = 1; months.push(ym); }
  });
  months.sort();
  if (sortDir === 'desc') months.reverse();
  if (months.indexOf(monthFilter) < 0) monthFilter = '';
  var h = '';
  if (dcs.length > 1) {
    h += '<span class="dc-box"><label>基準日</label><select onchange="onDateColChange(this.value)">';
    dcs.forEach(function (ci) { h += '<option value="' + ci + '"' + (ci === dateColIndex ? ' selected' : '') + '>' + escapeHtml(COLUMNS[ci]) + '</option>'; });
    h += '</select></span>';
  }
  h += '<span class="dc-box"><label>並び順</label>' +
    '<button class="dc-toggle' + (sortDir === 'desc' ? ' on' : '') + '" onclick="setSort(\'desc\')">新しい順</button>' +
    '<button class="dc-toggle' + (sortDir === 'asc' ? ' on' : '') + '" onclick="setSort(\'asc\')">古い順</button></span>';
  h += '<span class="dc-box"><label>月</label><select onchange="onMonthChange(this.value)">';
  h += '<option value=""' + (monthFilter === '' ? ' selected' : '') + '>すべて</option>';
  months.forEach(function (ym) { h += '<option value="' + ym + '"' + (ym === monthFilter ? ' selected' : '') + '>' + ymLabel(ym) + '</option>'; });
  h += '</select></span>';
  wrap.innerHTML = h;
}
function setSort(dir) { sortDir = dir; buildDateControls(); renderGai(); }
function onMonthChange(v) { monthFilter = v; renderGai(); }
function onDateColChange(v) { dateColIndex = parseInt(v, 10); monthFilter = ''; buildDateControls(); renderGai(); }

// システム列（Power Appsが自動管理する __PowerAppsId__ 等）は表示・編集しない
function isSysCol(name) { return /^__.*__$/.test(String(name == null ? '' : name)); }
function genGuid() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
    var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}
// セルの日付を ミリ秒(UTC) で返す（Excelシリアル値 or 表示文字列をパース）。無ければ null
function rowDateMs(row, ci) {
  if (ci == null || ci < 0) return null;
  var v = row.values[ci];
  if (typeof v === 'number' && isFinite(v)) return Date.UTC(1899, 11, 30) + Math.round(v) * 86400000;
  var t = cellStr(row, ci);
  if (!t) return null;
  var m = t.match(/(\d{4})[\/\-.年](\d{1,2})[\/\-.月](\d{1,2})/);
  if (m) return Date.UTC(+m[1], +m[2] - 1, +m[3]);
  var p = Date.parse(t);
  return isNaN(p) ? null : p;
}
function _p2(n) { return (n < 10 ? '0' : '') + n; }
function ymOf(ms) { var d = new Date(ms); return d.getUTCFullYear() + '-' + _p2(d.getUTCMonth() + 1); }
function ymLabel(ym) { var p = ym.split('-'); return p[0] + '年' + p[1] + '月'; }
function msToISO(ms) { var d = new Date(ms); return d.getUTCFullYear() + '-' + _p2(d.getUTCMonth() + 1) + '-' + _p2(d.getUTCDate()); }
function msToSlash(ms) { var d = new Date(ms); return d.getUTCFullYear() + '/' + _p2(d.getUTCMonth() + 1) + '/' + _p2(d.getUTCDate()); }
// カレンダー(type=date)で選んだら、隣のテキスト欄に YYYY/MM/DD で反映
function _dcalPick(cal) {
  if (!cal.value) return;
  var box = cal.parentNode;
  var txt = box ? box.querySelector('input[type="text"]') : null;
  if (txt) { var p = cal.value.split('-'); txt.value = p[0] + '/' + p[1] + '/' + p[2]; }
}
// 直近15か月（新しい順）の 'YYYY-MM' 配列
function recentMonths() {
  var d = new Date(), y = d.getFullYear(), m = d.getMonth(), arr = [];
  for (var i = 0; i < 15; i++) {
    var yy = y, mm = m - i;
    while (mm < 0) { mm += 12; yy -= 1; }
    arr.push(yy + '-' + _p2(mm + 1));
  }
  return arr;
}
// 日付列（システム列以外でCOLTYPE==='date'）のインデックス一覧
function dateColumns() {
  var arr = [];
  COLUMNS.forEach(function (col, ci) { if (!isSysCol(col) && COLTYPE[ci] === 'date') arr.push(ci); });
  return arr;
}
// 列名の候補（完全一致 → 部分一致）で列インデックスを探す
function findCol(cands) {
  for (var i = 0; i < COLUMNS.length; i++) for (var j = 0; j < cands.length; j++) if (COLUMNS[i] === cands[j]) return i;

      if (sheet.charAt(0) === "'" && sheet.charAt(sheet.length - 1) === "'") sheet = sheet.substring(1, sheet.length - 1).replace(/''/g, "'");
      var sheetEsc = encodeURIComponent(sheet.replace(/'/g, "''"));
      return gfetch(WB.base + "/worksheets('" + sheetEsc + "')/range(address='" + local + "')/delete", { method: 'POST', body: { shift: 'Up' } });
    })
    .catch(function () { return null; }); // データ行が無い等は無視
}

    var out = raw;
    if (raw.trim() === '') { out = ''; }
    else if (COLTYPE[ci] === 'date') { var s = toExcelSerial(raw); out = (s != null) ? s : raw; }
    else if (COLTYPE[ci] === 'number') { var n = raw.replace(/,/g, ''); out = /^-?\d+(\.\d+)?$/.test(n) ? Number(n) : raw; }
    arr[ci] = out;
  }
  return arr;
}
function saveForm() {
  var arr = collectForm();
  var wasAdd = (editingIndex < 0);
  var btn = document.getElementById('modal-save');
  btn.disabled = true; btn.textContent = '保存中…';
  var op;
  if (!wasAdd) {
    var idx = ROWS[editingIndex].index;
    op = resolveWorkbook().then(function () { return gfetch(tblUrl('/rows/itemAt(index=' + idx + ')'), { method: 'PATCH', body: { values: [arr] } }); });
  } else {
    op = resolveWorkbook().then(function () { return gfetch(tblUrl('/rows'), { method: 'POST', body: { index: null, values: [arr] } }); });
  }
  op.then(function () {
    if (wasAdd) {
      // 連続登録のためフォームは閉じず、入力値も保持（日付だけ変えて再登録できる）
      toast('追加しました（続けて登録できます。消すには「クリア」）');
      loadGai();
    } else {
      closeForm();
      toast('更新しました');
      loadGai();
    }
  }).catch(function (e) {
    toast('保存エラー: ' + e.message, true);
  }).then(function () {
    btn.disabled = false; btn.textContent = '✅ 保存';
  });
}

// ---------- 削除 ----------
function deleteRow(ri) {
  var row = ROWS[ri];
  if (!row) return;
  var label = (row.text[0] != null && row.text[0] !== '') ? row.text[0] : ('行 ' + (ri + 1));
  if (!confirm('この行を削除します。よろしいですか？\n\n' + label)) return;
  resolveWorkbook()
    .then(function () {
      return gfetch(tblUrl('/rows/itemAt(index=' + row.index + ')/range?$select=address')).then(function (rng) {
        var addr = rng.address || '';
        var bang = addr.lastIndexOf('!');
        var sheet = bang >= 0 ? addr.substring(0, bang) : '';
        var local = bang >= 0 ? addr.substring(bang + 1) : addr;
        if (sheet.charAt(0) === "'" && sheet.charAt(sheet.length - 1) === "'") sheet = sheet.substring(1, sheet.length - 1).replace(/''/g, "'");
        var sheetEsc = encodeURIComponent(sheet.replace(/'/g, "''"));
        return gfetch(WB.base + "/worksheets('" + sheetEsc + "')/range(address='" + local + "')/delete", { method: 'POST', body: { shift: 'Up' } });
      });
    })
    .then(function () { toast('削除しました'); loadGai(); })
    .catch(function (e) { toast('削除エラー: ' + e.message, true); });
}

// ---------- 初期化 ----------
document.getElementById('modal').addEventListener('click', function (e) { if (e.target === this) closeForm(); });
loadGai();
</script>
