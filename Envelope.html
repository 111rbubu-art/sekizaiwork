<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>封筒印刷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f0f0;color:#1a1a1a}

/* ===== コントロールパネル ===== */
.ctrl-panel{
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;
  padding:12px 16px;background:#1a2535;color:#fff;
  position:fixed;top:0;left:0;right:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,0.3)
}
.ctrl-panel h1{font-size:15px;font-weight:500;margin-right:8px;white-space:nowrap}
.ctrl-btn{
  font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:6px 14px;
  border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);
  color:#fff;cursor:pointer;border-radius:4px;white-space:nowrap
}
.ctrl-btn:hover{background:rgba(255,255,255,0.2)}
.ctrl-btn.primary{background:#2a6aaa;border-color:#2a6aaa}
.ctrl-btn.primary:hover{background:#3a7aba}
.ctrl-sep{width:1px;height:24px;background:rgba(255,255,255,0.2);margin:0 4px}
.ctrl-label{font-size:11px;color:rgba(255,255,255,0.6);white-space:nowrap}

/* 敬称選択 */
.keisho-wrap{display:flex;gap:4px}
.keisho-btn{
  font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:5px 10px;
  border:1px solid rgba(255,255,255,0.3);background:transparent;
  color:rgba(255,255,255,0.7);cursor:pointer;border-radius:4px
}
.keisho-btn.active{background:#2a6aaa;border-color:#2a6aaa;color:#fff}

/* ===== プレビューエリア ===== */
.preview-area{
  padding:80px 20px 40px;display:flex;justify-content:center;align-items:flex-start;min-height:100vh
}

/* ===== 封筒本体（長形3号: 120×235mm） ===== */
.envelope{
  /* 長形3号: 120mm × 235mm、画面では3倍で360×705px */
  width:360px;height:705px;
  background:#fff;
  box-shadow:0 4px 24px rgba(0,0,0,0.2),0 1px 4px rgba(0,0,0,0.1);
  position:relative;
  cursor:default;
  border:0.5px solid #ccc;
}

/* ===== 郵便番号枠 ===== */
.zip-block{
  position:absolute;
  top:18px;right:18px;
  display:flex;gap:3px;
  align-items:center;
  cursor:move;
  user-select:none;
}
.zip-box{
  width:22px;height:22px;
  border:1.5px solid #c00;
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif JP',serif;font-size:13px;color:#1a1a1a;
  background:#fff;
}
.zip-sep{color:#c00;font-weight:bold;font-size:14px;margin:0 1px}

/* ===== 住所ブロック ===== */
.address-block{
  position:absolute;
  top:50px;right:50px;
  writing-mode:vertical-rl;
  font-family:'Noto Serif JP',serif;
  font-size:14px;
  line-height:1.8;
  color:#1a1a1a;
  cursor:move;
  user-select:none;
  white-space:nowrap;
}

/* ===== 宛名ブロック ===== */
.name-block{
  position:absolute;
  top:80px;left:50%;transform:translateX(-50%);
  writing-mode:vertical-rl;
  font-family:'Noto Serif JP',serif;
  font-size:22px;
  font-weight:700;
  line-height:1.6;
  color:#1a1a1a;
  cursor:move;
  user-select:none;
  white-space:nowrap;
  text-align:center;
}
.keisho{
  font-size:18px;
  font-weight:400;
  margin-top:4px;
}

/* ===== 自社名ブロック ===== */
.sender-block{
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:move;
  user-select:none;
}
.sender-name{
  font-family:'Noto Serif JP',serif;
  font-size:11px;
  color:#333;
  text-align:center;
  white-space:nowrap;
}
.sender-info{
  font-size:9px;color:#666;text-align:center;white-space:nowrap;
  font-family:'Noto Sans JP',sans-serif;
}

/* ===== 選択ハイライト ===== */
.draggable.selected{
  outline:2px dashed #2a6aaa;
  outline-offset:4px;
}
.draggable:hover{
  outline:1px dashed #aac;
  outline-offset:3px;
}

/* ===== 調整パネル ===== */
.adjust-panel{
  position:fixed;right:16px;top:70px;
  background:#fff;border:1px solid #ddd;
  border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.15);
  padding:14px;width:220px;
  display:none;z-index:200;
}
.adjust-panel.visible{display:block}
.adj-title{font-size:12px;font-weight:500;color:#1a2535;margin-bottom:10px}
.adj-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.adj-label{font-size:11px;color:#666;width:40px;flex-shrink:0}
.adj-input{
  width:60px;font-size:12px;padding:3px 6px;
  border:1px solid #ddd;border-radius:3px;text-align:center
}
.adj-btn{
  font-size:11px;padding:3px 8px;border:1px solid #ddd;
  background:#f5f5f5;cursor:pointer;border-radius:3px
}
.adj-btn:hover{background:#e8e8e8}

/* ===== 自社情報入力エリア ===== */
.sender-edit{
  position:fixed;left:16px;top:70px;
  background:#fff;border:1px solid #ddd;border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,0.15);
  padding:14px;width:240px;
  display:none;z-index:200;
}
.sender-edit.visible{display:block}
.se-title{font-size:12px;font-weight:500;color:#1a2535;margin-bottom:10px}
.se-row{margin-bottom:8px}
.se-label{font-size:11px;color:#666;display:block;margin-bottom:3px}
.se-input{
  width:100%;font-size:12px;padding:5px 8px;
  border:1px solid #ddd;border-radius:3px;
  font-family:'Noto Sans JP',sans-serif
}
.se-btn{
  width:100%;margin-top:8px;font-size:12px;padding:6px;
  background:#1a2535;color:#fff;border:none;cursor:pointer;border-radius:4px;
  font-family:'Noto Sans JP',sans-serif
}

/* ===== 印刷スタイル ===== */
@media print{
  body{background:#fff}
  .ctrl-panel,.adjust-panel,.sender-edit,.print-hint{display:none!important}
  .preview-area{padding:0;min-height:unset;background:#fff}
  .envelope{
    width:120mm;height:235mm;
    box-shadow:none;border:none;
    page-break-after:avoid;
  }
  .zip-box{width:7.3mm;height:7.3mm;font-size:4.5mm}
  .address-block{font-size:4.5mm}
  .name-block{font-size:7mm}
  .keisho{font-size:5.5mm}
  .sender-name{font-size:3.5mm}
  .sender-info{font-size:2.8mm}
  .draggable:hover,.draggable.selected{outline:none}
  @page{
    size:120mm 235mm;
    margin:0;
  }
}

.print-hint{
  margin-top:12px;text-align:center;font-size:11px;color:#888;
}
</style>
</head>
<body>

<!-- コントロールパネル -->
<div class="ctrl-panel">
  <h1>✉️ 封筒印刷</h1>
  <div class="ctrl-sep"></div>
  <span class="ctrl-label">敬称：</span>
  <div class="keisho-wrap">
    <button class="keisho-btn active" data-k="様" onclick="setKeisho('様',this)">様</button>
    <button class="keisho-btn" data-k="御中" onclick="setKeisho('御中',this)">御中</button>
    <button class="keisho-btn" data-k="先生" onclick="setKeisho('先生',this)">先生</button>
    <button class="keisho-btn" data-k="" onclick="setKeisho('',this)">なし</button>
  </div>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn" onclick="toggleSenderEdit()">🏢 自社情報</button>
  <button class="ctrl-btn" onclick="toggleAdjust()">⚙ 位置調整</button>
  <button class="ctrl-btn" onclick="resetPositions()">↩ リセット</button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn primary" onclick="window.print()">🖨 印刷</button>
</div>

<!-- 封筒プレビュー -->
<div class="preview-area">
  <div>
    <div class="envelope" id="envelope">

      <!-- 郵便番号 -->
      <div class="zip-block draggable" id="zipBlock">
        <div class="zip-box" id="z1"></div>
        <div class="zip-box" id="z2"></div>
        <div class="zip-box" id="z3"></div>
        <div class="zip-sep">-</div>
        <div class="zip-box" id="z4"></div>
        <div class="zip-box" id="z5"></div>
        <div class="zip-box" id="z6"></div>
        <div class="zip-box" id="z7"></div>
      </div>

      <!-- 住所 -->
      <div class="address-block draggable" id="addrBlock">
        <span id="addrText"></span>
      </div>

      <!-- 宛名 -->
      <div class="name-block draggable" id="nameBlock">
        <span id="nameText"></span>
        <span class="keisho" id="keishoText">様</span>
      </div>

      <!-- 差出人 -->
      <div class="sender-block draggable" id="senderBlock">
        <div class="sender-name" id="senderName"></div>
        <div class="sender-info" id="senderInfo"></div>
      </div>

    </div>
    <div class="print-hint">※ 実際の封筒に合わせて位置を微調整し、印刷ボタンを押してください</div>
  </div>
</div>

<!-- 位置調整パネル -->
<div class="adjust-panel" id="adjustPanel">
  <div class="adj-title">⚙ 位置調整</div>
  <div id="adjContent">要素をクリックして選択してください</div>
</div>

<!-- 自社情報入力 -->
<div class="sender-edit" id="senderEdit">
  <div class="se-title">🏢 自社情報登録</div>
  <div class="se-row">
    <label class="se-label">会社名</label>
    <input class="se-input" id="seCompany" placeholder="有限会社 庄司石材店">
  </div>
  <div class="se-row">
    <label class="se-label">住所・TEL等</label>
    <textarea class="se-input" id="seInfo" rows="3" placeholder="〒168-0082 東京都杉並区久我山5-5-12-201&#10;TEL 03-3333-8451"></textarea>
  </div>
  <button class="se-btn" onclick="saveSender()">登録・反映</button>
</div>

<script>
// ===== データ受け取り =====
var envData = {};
try {
  var raw = sessionStorage.getItem('envelopeData');
  if (raw) envData = JSON.parse(raw);
} catch(e) {}

// ===== 初期データをセット =====
function initData() {
  // 郵便番号
  var zip = (envData.zip || '').replace(/[^0-9]/g,'');
  var zipBoxes = ['z1','z2','z3','z4','z5','z6','z7'];
  zipBoxes.forEach(function(id, i) {
    var el = document.getElementById(id);
    if (el) el.textContent = zip[i] || '';
  });

  // 住所（住所1 + 住所2）
  var addr = (envData.addr1 || '');
  if (envData.addr2) addr += '\n' + envData.addr2;
  document.getElementById('addrText').innerHTML = addr.replace(/\n/g, '<br>');

  // 宛名
  document.getElementById('nameText').textContent = envData.name || '';

  // 自社情報（localStorage保存）
  loadSender();
}

// ===== 自社情報 =====
function loadSender() {
  var saved = JSON.parse(localStorage.getItem('envelopeSender') || '{}');
  var company = saved.company || '';
  var info = saved.info || '';
  document.getElementById('senderName').textContent = company;
  document.getElementById('senderInfo').innerHTML = info.replace(/\n/g,'<br>');
  document.getElementById('seCompany').value = company;
  document.getElementById('seInfo').value = info;
}

function saveSender() {
  var company = document.getElementById('seCompany').value;
  var info = document.getElementById('seInfo').value;
  localStorage.setItem('envelopeSender', JSON.stringify({company, info}));
  document.getElementById('senderName').textContent = company;
  document.getElementById('senderInfo').innerHTML = info.replace(/\n/g,'<br>');
  toggleSenderEdit();
}

function toggleSenderEdit() {
  document.getElementById('senderEdit').classList.toggle('visible');
}

// ===== 敬称 =====
function setKeisho(k, btn) {
  document.getElementById('keishoText').textContent = k;
  document.querySelectorAll('.keisho-btn').forEach(function(b) {
    b.classList.toggle('active', b === btn);
  });
}

// ===== ドラッグ移動 =====
var dragging = null, startX, startY, origLeft, origTop;
var selected = null;
var positions = {};

function getPos(el) {
  return {
    left: parseInt(el.style.left) || null,
    top: parseInt(el.style.top) || null,
    right: parseInt(el.style.right) || null,
    bottom: parseInt(el.style.bottom) || null
  };
}

document.querySelectorAll('.draggable').forEach(function(el) {
  el.addEventListener('mousedown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
    dragging = el;
    startX = e.clientX;
    startY = e.clientY;
    var rect = el.getBoundingClientRect();
    var envRect = document.getElementById('envelope').getBoundingClientRect();
    origLeft = rect.left - envRect.left;
    origTop = rect.top - envRect.top;
    // 絶対位置に切り替え
    el.style.position = 'absolute';
    el.style.left = origLeft + 'px';
    el.style.top = origTop + 'px';
    el.style.right = '';
    el.style.bottom = '';
    el.style.transform = '';

    // 選択
    if (selected) selected.classList.remove('selected');
    selected = el;
    el.classList.add('selected');
    showAdjust(el);
    e.preventDefault();
  });
});

document.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  var dx = e.clientX - startX;
  var dy = e.clientY - startY;
  dragging.style.left = (origLeft + dx) + 'px';
  dragging.style.top = (origTop + dy) + 'px';
  if (selected === dragging) updateAdjustDisplay();
});

document.addEventListener('mouseup', function() {
  if (dragging) {
    positions[dragging.id] = { left: parseInt(dragging.style.left), top: parseInt(dragging.style.top) };
    dragging = null;
  }
});

// ===== 調整パネル =====
function toggleAdjust() {
  document.getElementById('adjustPanel').classList.toggle('visible');
}

function showAdjust(el) {
  document.getElementById('adjustPanel').classList.add('visible');
  updateAdjustDisplay();
}

function updateAdjustDisplay() {
  if (!selected) return;
  var names = {zipBlock:'郵便番号', addrBlock:'住所', nameBlock:'宛名', senderBlock:'差出人'};
  var left = parseInt(selected.style.left) || 0;
  var top = parseInt(selected.style.top) || 0;
  var html = '<div class="adj-title">⚙ ' + (names[selected.id]||'要素') + ' の位置</div>' +
    '<div class="adj-row"><span class="adj-label">左から</span>' +
    '<button class="adj-btn" onclick="nudge(-5,0)">◀</button>' +
    '<input class="adj-input" id="adjLeft" value="' + left + '" onchange="setPos(\'left\',this.value)">' +
    '<button class="adj-btn" onclick="nudge(5,0)">▶</button>px</div>' +
    '<div class="adj-row"><span class="adj-label">上から</span>' +
    '<button class="adj-btn" onclick="nudge(0,-5)">▲</button>' +
    '<input class="adj-input" id="adjTop" value="' + top + '" onchange="setPos(\'top\',this.value)">' +
    '<button class="adj-btn" onclick="nudge(0,5)">▼</button>px</div>';

  // フォントサイズ調整（住所・宛名のみ）
  if (selected.id === 'addrBlock' || selected.id === 'nameBlock') {
    var fs = parseInt(window.getComputedStyle(selected).fontSize);
    html += '<div class="adj-row"><span class="adj-label">文字</span>' +
      '<button class="adj-btn" onclick="fontSize(-1)">−</button>' +
      '<input class="adj-input" id="adjFs" value="' + fs + '" onchange="setFontSize(this.value)">' +
      '<button class="adj-btn" onclick="fontSize(1)">＋</button>px</div>';
  }
  document.getElementById('adjContent').innerHTML = html;
}

function nudge(dx, dy) {
  if (!selected) return;
  var left = (parseInt(selected.style.left) || 0) + dx;
  var top = (parseInt(selected.style.top) || 0) + dy;
  selected.style.left = left + 'px';
  selected.style.top = top + 'px';
  updateAdjustDisplay();
}

function setPos(axis, val) {
  if (!selected) return;
  selected.style[axis] = parseInt(val) + 'px';
}

function fontSize(delta) {
  if (!selected) return;
  var fs = parseInt(window.getComputedStyle(selected).fontSize) + delta;
  selected.style.fontSize = fs + 'px';
  updateAdjustDisplay();
}

function setFontSize(val) {
  if (!selected) return;
  selected.style.fontSize = parseInt(val) + 'px';
}

function resetPositions() {
  // デフォルト位置に戻す（style属性をクリア）
  document.querySelectorAll('.draggable').forEach(function(el) {
    el.style.cssText = '';
  });
  positions = {};
  if (selected) {
    selected.classList.remove('selected');
    selected = null;
  }
}

// ===== キーボード操作 =====
document.addEventListener('keydown', function(e) {
  if (!selected) return;
  var step = e.shiftKey ? 10 : 1;
  if (e.key === 'ArrowLeft') { nudge(-step, 0); e.preventDefault(); }
  if (e.key === 'ArrowRight') { nudge(step, 0); e.preventDefault(); }
  if (e.key === 'ArrowUp') { nudge(0, -step); e.preventDefault(); }
  if (e.key === 'ArrowDown') { nudge(0, step); e.preventDefault(); }
  if (e.key === 'Escape') {
    if (selected) selected.classList.remove('selected');
    selected = null;
  }
});

// 封筒以外クリックで選択解除
document.addEventListener('click', function(e) {
  if (!e.target.closest('.draggable') && !e.target.closest('.adjust-panel')) {
    if (selected) selected.classList.remove('selected');
    selected = null;
  }
});

// ===== 初期化 =====
initData();
</script>
</body>
</html>
