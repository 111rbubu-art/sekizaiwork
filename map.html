function saveToSP(callback) {
  var token = getSPToken();
  if (!token) {
    showSPStatus('SharePoint未ログイン。ビューアーからマップを開いてください。', 'err');
    return;
  }
  var data = {
    version: '2.0',
    savedAt: new Date().toISOString(),
    plots: PLOTS,
    savedAreas: savedAreas,
    fontScale: _fontScale
  };
  var jsonStr = JSON.stringify(data, null, 2);
  var fileName = 'data_' + _templeId + '.json';
  var url = 'https://graph.microsoft.com/v1.0/drives/' + SP_DRIVE_ID +
            '/root:/' + SP_FOLDER + '/' + encodeURIComponent(fileName) + ':/content';
  showSPStatus('SharePointに保存中...', 'ing');
  fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    },
    body: jsonStr
  })
  .then(function(r) {
    if (r.ok || r.status === 201) {
      showSPStatus('✅ SharePointに保存しました (' + new Date().toLocaleTimeString('ja-JP') + ')', 'ok');
      setSyncBtnState('syncToBtn', 'idle', '📤 SP保存');
      localStorage.setItem(LS_KEY, jsonStr);
      if (callback) callback();
    } else {
      return r.json().then(function(d) {
        throw new Error(r.status + ': ' + (d.error?.message || JSON.stringify(d).substring(0,80)));
      });
    }
  })
  .catch(function(e) {
    showSPStatus('❌ 保存エラー: ' + e.message, 'err');
    localStorage.setItem(LS_KEY, jsonStr);
  });
}

function loadFromSP(callback) {
  var token = getSPToken();
  if (!token) {
    loadFromLocalStorage(callback);
    return;
  }
  var fileName = 'data_' + _templeId + '.json';
  var url = 'https://graph.microsoft.com/v1.0/drives/' + SP_DRIVE_ID +
            '/root:/' + SP_FOLDER + '/' + encodeURIComponent(fileName) + ':/content';
  // 8秒タイムアウト
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, 8000);
  fetch(url, { headers: { 'Authorization': 'Bearer ' + token }, signal: ctrl.signal })
  .then(function(r) {
    clearTimeout(timer);
    if (r.ok) return r.json();
    if (r.status === 404) { setDataSource('github', null); return null; }
    throw new Error(r.status);
  })
  .then(function(data) {
    // plots（小文字）とPLOTS（大文字）の両方に対応
    var rawPlots = (data && (data.plots || data.PLOTS)) || null;
    if (data && rawPlots) {
      data.plots = rawPlots;
      PLOTS = rawPlots;
      savedAreas = data.savedAreas || [];
      if (data.fontScale) {
        _fontScale = data.fontScale;
        var lbl = document.getElementById('fontScaleLabel');
        if (lbl) lbl.textContent = _fontScale.toFixed(1) + '×';
      }
      draw(); updateStats();
      showSPStatus('✅ SharePointから読み込みました (' + (data.savedAt||'').substring(0,16).replace('T',' ') + ')', 'ok');
      setSyncBtnState('syncFromBtn', 'idle', '📥 SP読込');
      setDataSource('sp', data.savedAt || null);
      if (callback) callback();
    } else {
      loadFromLocalStorage(callback);
    }
  })
  .catch(function(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') {
      // タイムアウト → ローカルデータで続行
      console.warn('[loadFromSP] タイムアウト（8秒）');
      showSPStatus('⚠️ SP読込タイムアウト。ローカルデータを使用します', 'err');
    }
    loadFromLocalStorage(callback);
  });
}

function loadFromLocalStorage(callback) {
  try {
    var raw = localStorage.getItem(LS_KEY);
    if (!raw) {
      // ローカルにもSPにもない → GitHubの初期データ
      setDataSource('github', null);
      if (callback) callback();
      return;
    }
    var data = JSON.parse(raw);
    if (data && data.plots) {
      PLOTS = data.plots;
      savedAreas = data.savedAreas || [];
      if (data.fontScale) {
        _fontScale = data.fontScale;
        var lbl = document.getElementById('fontScaleLabel');
        if (lbl) lbl.textContent = _fontScale.toFixed(1) + '×';
      }
      draw(); updateStats();
      setDataSource('local', data.savedAt || null);
    }
    if (callback) callback();
  } catch(e) {}
}

function updateDataSourceBadge() {
  var el = document.getElementById('data-source-badge');
  if (!el) return;
  var label, bg, color, border, title;
  var ts = _currentDataSavedAt
    ? ' (' + String(_currentDataSavedAt).substring(0,16).replace('T',' ') + ')'
    : '';
  switch(_currentDataSource) {
    case 'sp':
      label  = '☁️ SharePoint' + ts;
      bg     = '#d4f0d4'; color = '#1a5a1a'; border = '#2a7a2a';
      title  = 'SharePointから読み込んだデータを表示しています';
      break;
    case 'local':
      label  = '💾 ローカル保存' + ts;
      bg     = '#fff8d4'; color = '#6a4a00'; border = '#c8a000';
      title  = 'ブラウザのローカルストレージから復元したデータを表示しています（SPと差異がある可能性があります）';
      break;
    case 'github':
      label  = '📦 GitHub（初期データ）';
      bg     = '#e8e8f8'; color = '#2a2a8a'; border = '#6a6aaa';
      title  = 'GitHubのdata_*.jsの初期データを表示しています（SPに保存データなし）';
      break;
    default:
      label  = 'データ確認中...';

function showSPStatus(msg, type) {
  var el = document.getElementById('sp-status');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sp-status';
    el.style.cssText = 'position:fixed;bottom:60px;right:12px;z-index:400;font-size:11px;padding:6px 12px;border-radius:4px;max-width:320px;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,0.2);pointer-events:none';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.background = type==='ok' ? '#d4f0d4' : type==='err' ? '#fdd' : '#fffbe6';
  el.style.color = type==='ok' ? '#1a5a1a' : type==='err' ? '#8b0000' : '#6a4a00';
  el.style.border = '1px solid ' + (type==='ok' ? '#2a7a2a' : type==='err' ? '#c00' : '#c8a000');
  clearTimeout(el._timer);
  if (type === 'ok') el._timer = setTimeout(function() { el.style.display='none'; }, 4000);
  else el.style.display = '';
}

let _lastSaveHash = ''; // 前回保存時のハッシュ（変更がある時だけ保存）

function _dataHash() {
  // PLOTSの件数＋先頭末尾のnameを簡易ハッシュとして使用
  const first = PLOTS[0] ? PLOTS[0].mapname : '';
  const last  = PLOTS[PLOTS.length-1] ? PLOTS[PLOTS.length-1].mapname : '';

function offlineSaveData() {
  var today = new Date();
  var dateStr = today.getFullYear().toString() +
    String(today.getMonth()+1).padStart(2,'0') +
    String(today.getDate()).padStart(2,'0');

  // 共通のデータ内容を生成
  function buildOutput(label) {
    return [
      '// ' + MAP_DATA.name + ' オフラインマップデータ',
      '// 生成日: ' + today.toISOString().substring(0,10),
      '// mapname=地図表示用（管理番号+姓）, name=顧客名（手入力）',
      '',
      'var OFFLINE_TEMPLE_NAME = "' + MAP_DATA.name + '";',
      'var OFFLINE_DATA_DATE = "' + dateStr + '";',
      'var OFFLINE_FONT_SCALE = ' + (_fontScale || 1.7) + ';',
      '',
      'var OFFLINE_PLOTS = ' + JSON.stringify(PLOTS, null, 2) + ';',
      '',
      'var OFFLINE_SAVED_AREAS = ' + JSON.stringify(savedAreas, null, 2) + ';'
    ].join('\n');
  }

  function downloadFile(content, fileName) {
    var blob = new Blob([content], {type: 'text/javascript;charset=utf-8'});
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
    URL.revokeObjectURL(link.href);
  }

  var output = buildOutput();

  // ① バックアップファイル（日付付き）
  var backupName = 'data_' + _offlineTemple + '_offline_' + dateStr + '.js';
  downloadFile(output, backupName);

  // ② カレントファイル（固定名・map_config.jsが常にこれを参照）
  setTimeout(function() {
    var currentName = 'data_' + _offlineTemple + '_offline_current.js';
    downloadFile(output, currentName);

    alert('2ファイルをダウンロードしました。\n\n' +
      '① ' + backupName + '（バックアップ）\n' +
      '② ' + currentName + '（カレント）\n\n' +
      '★ 両方を map.html と同じフォルダ（USBドライブ）に保存してください。');
  }, 500);
}

function autoSave() {
  if (_isOfflineMode) return; // オフライン時はlocalStorage保存不要（ダウンロードで管理）
  try {
    const hash = _dataHash();
    if (hash === _lastSaveHash) return; // 変更なしはスキップ
    _lastSaveHash = hash;
    const data = {
      version    : '2.0',
      savedAt    : new Date().toISOString(),
      plots      : PLOTS,
      savedAreas : savedAreas,
      nextAreaId : nextAreaId,
      printCfg   : printCfg
    };
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  } catch(e) {
    console.warn('autoSave失敗:', e.message);
  }
}

// 起動時に自動読込
function autoLoad() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.plots || !Array.isArray(data.plots)) return false;

    // データを復元
    PLOTS.length = 0;
    data.plots.forEach(p => PLOTS.push(p));
    if (data.savedAreas) {
      savedAreas = data.savedAreas;
      nextAreaId = data.nextAreaId || savedAreas.length + 1;
    }
    if (data.printCfg) {
      printCfg = data.printCfg;
      setPaper(printCfg.paper, printCfg.orient);
      const mr = document.getElementById('marginRange');
      if (mr) {
        mr.value = printCfg.margin;
        document.getElementById('marginVal').textContent = printCfg.margin + 'mm';
      }
    }

    // 読込日時をステータスに表示
    const saved = new Date(data.savedAt);
    const label = `${saved.getMonth()+1}/${saved.getDate()} ${saved.getHours()}:${String(saved.getMinutes()).padStart(2,'0')} 保存分を復元`;
    showAutoLoadBadge(label);
    setDataSource('local', data.savedAt || null);
    return true;
  } catch(e) {
    console.warn('autoLoad失敗:', e.message);
    return false;
  }
}

// ===== スマホ対応：キャンバスのピンチズーム（中点固定）=====
(function() {
  var mapWrap = document.querySelector('.map-wrap');
  if (!mapWrap) return;

  var currentScale = 1;
  var baseW = mc.width;
  var baseH = mc.height;
  mc.style.width = baseW + 'px';
  mc.style.height = baseH + 'px';

  function setScaleAt(newScale, focalX, focalY) {
    // focalX/Y: mapWrap内の座標（スクロール考慮済み）
    // ズーム前のスクロール位置に対する割合を保持
    newScale = Math.min(Math.max(newScale, 0.3), 4);
    var ratio = newScale / currentScale;
    currentScale = newScale;
    mc.style.width = Math.round(baseW * currentScale) + 'px';
    mc.style.height = Math.round(baseH * currentScale) + 'px';
    // focalPointがズーム後も同じ画面位置になるようスクロール調整
    mapWrap.scrollLeft = focalX * ratio - (focalX - mapWrap.scrollLeft) * ratio + mapWrap.scrollLeft * (ratio - 1);
    mapWrap.scrollLeft = Math.round(focalX * ratio - (focalX - mapWrap.scrollLeft / ratio));
  }

  function applyScaleAt(newScale, clientMidX, clientMidY) {
    newScale = Math.min(Math.max(newScale, 0.3), 4);
    var ratio = newScale / currentScale;
    // mapWrap上のピンチ中点座標（スクロール込み）
    var wrapRect = mapWrap.getBoundingClientRect();
    var focalX = (clientMidX - wrapRect.left) + mapWrap.scrollLeft;
    var focalY = (clientMidY - wrapRect.top) + mapWrap.scrollTop;
    currentScale = newScale;
    mc.style.width = Math.round(baseW * currentScale) + 'px';
    mc.style.height = Math.round(baseH * currentScale) + 'px';
    // ズーム後のfocalPointが同じ画面位置に来るようスクロール
    mapWrap.scrollLeft = Math.round(focalX * ratio - (clientMidX - wrapRect.left));
    mapWrap.scrollTop = Math.round(focalY * ratio - (clientMidY - wrapRect.top));
  }

  var lastDist = 0;
  var lastMidX = 0, lastMidY = 0;
  var isPinching = false;

  mapWrap.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      isPinching = true;
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      lastDist = Math.sqrt(dx*dx + dy*dy);
      lastMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      lastMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    } else {
      isPinching = false;
    }
  }, { passive: true });

  mapWrap.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2 && isPinching) {
      e.preventDefault();
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(dx*dx + dy*dy);
      var midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      var midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      if (lastDist > 0) {
        var ratio = dist / lastDist;
        // 中点（2本指の間）を固定点としてズーム
        applyScaleAt(currentScale * ratio, midX, midY);
      }
      lastDist = dist;
      lastMidX = midX;
      lastMidY = midY;
    }
  }, { passive: false });

  mapWrap.addEventListener('touchend', function(e) {
    if (e.touches.length < 2) {
      isPinching = false;
      lastDist = 0;
    }
  }, { passive: true });

  // ズームボタン
  var zoomBar = document.createElement('div');
  zoomBar.style.cssText = 'position:fixed;bottom:12px;right:12px;z-index:300;display:flex;flex-direction:column;gap:4px';
  zoomBar.innerHTML =
    '<button onclick="mapZoom(1.5)" style="width:36px;height:36px;background:#1a1a1a;color:#f0ece0;border:none;font-size:18px;cursor:pointer;border-radius:4px;opacity:0.85">＋</button>' +
    '<button onclick="mapZoom(1/1.5)" style="width:36px;height:36px;background:#1a1a1a;color:#f0ece0;border:none;font-size:18px;cursor:pointer;border-radius:4px;opacity:0.85">－</button>' +
    '<button onclick="mapZoomReset()" style="width:36px;height:36px;background:#1a1a1a;color:#f0ece0;border:none;font-size:11px;cursor:pointer;border-radius:4px;opacity:0.85">1:1</button>';
  document.body.appendChild(zoomBar);

  window.mapZoom = function(ratio) {
    // ボタン操作時は画面中央を固定点に
    var wrapRect = mapWrap.getBoundingClientRect();
    applyScaleAt(currentScale * ratio, wrapRect.left + wrapRect.width/2, wrapRect.top + wrapRect.height/2);
  };
  window.mapZoomReset = function() {
    currentScale = 1;
    mc.style.width = baseW + 'px';
    mc.style.height = baseH + 'px';
    mapWrap.scrollLeft = 0;
    mapWrap.scrollTop = 0;
  };
})();
