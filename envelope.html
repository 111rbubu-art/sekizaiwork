<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>封筒印刷 - 敬称下位置版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#d8d8d8}

/* フォントクラス */
.f-serif { font-family: 'Noto Serif JP', serif !important; }
.f-sans  { font-family: 'Noto Sans JP', sans-serif !important; }

/* ===== コントロールバー ===== */
.ctrl{
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  padding:9px 14px;background:#1a2535;color:#fff;
  position:fixed;top:0;left:0;right:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
}
.ct{font-size:14px;font-weight:500;white-space:nowrap}
.sep{width:1px;height:22px;background:rgba(255,255,255,0.2);flex-shrink:0}
.btn{
  font-family:'Noto Sans JP',sans-serif;font-size:11px;padding:5px 11px;
  border:1px solid rgba(255,255,255,0.28);background:rgba(255,255,255,0.08);
  color:#fff;cursor:pointer;border-radius:3px;white-space:nowrap
}
.btn:hover{background:rgba(255,255,255,0.2)}
.btn.pr{background:#1a5a9a;border-color:#1a5a9a}
.lbl{font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap}
.kw{display:flex;gap:3px}
.kb{
  font-family:'Noto Sans JP',sans-serif;font-size:11px;padding:4px 9px;
  border:1px solid rgba(255,255,255,0.22);background:transparent;
  color:rgba(255,255,255,0.55);cursor:pointer;border-radius:3px
}
.kb.on{background:#1a5a9a;border-color:#1a5a9a;color:#fff}

/* ===== プレビューエリア ===== */
.pv{
  padding:64px 24px 40px;
  display:flex;justify-content:center;gap:18px;align-items:flex-start;
  min-height:100vh;
}

/* 封筒本体 (長形3号) */
.env{
  width:360px;height:705px;
  background:#fff;position:relative;flex-shrink:0;
  box-shadow:1px 2px 16px rgba(0,0,0,0.22),0 0 0 0.5px #bbb;
}

/* 郵便番号 */
.zr{ position:absolute; top:39px; right:24px; display:flex; align-items:center; gap:2px; }
.zb{
  width:21px;height:21px; border:1.5px solid #c00;
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif JP',serif; font-size:13px; color:#111;
}
.zs{ color:#c00;font-weight:700;font-size:13px; margin:0 1px; line-height:1; }

/* 住所ブロック */
.aw{ position:absolute; top:50px; right:14px; display:flex; gap:6px; align-items:flex-start; }
.ac{
  writing-mode:vertical-rl; font-size:14px; line-height:1.85;
  color:#111; white-space:nowrap; letter-spacing:0.06em;
}

/* 宛名ブロック（修正：縦方向に並ぶよう変更） */
.nb{
  position:absolute; top:75px; left:112px;
  display:flex;
  flex-direction: column; /* 縦に並べる */
  align-items: center;    /* 中央揃え */
  gap: 15px;              /* 名前と敬称の間隔 */
}
.n-name{
  writing-mode:vertical-rl;
  font-size:32px;
  font-weight:700;
  line-height:1.2;
  color:#111;
  letter-spacing:0.12em;
  white-space:nowrap;
}
.n-sama{
  writing-mode:vertical-rl;
  font-size:24px;
  font-weight:400;
  line-height:1;
  color:#111;
  white-space:nowrap;
}

/* 差出人 */
.sb{ position:absolute; bottom:12px; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:2px; }
.sc{ font-size:13px; color:#111; letter-spacing:0.2em; white-space:nowrap; }
.si{ font-size:8.5px; color:#333; letter-spacing:0.04em; white-space:nowrap; }

.dr{cursor:move}
.dr.sel{outline:2px dashed #1a5a9a;outline-offset:4px}

/* 調整パネル */
.ap{
  width:220px; flex-shrink:0; background:#fff; border-radius:8px; padding:14px;
  box-shadow:0 2px 12px rgba(0,0,0,0.12); display:none;
}
.ap.vis{display:block}
.ah{font-size:12px;font-weight:500;color:#1a2535;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee}
.ar{display:flex;align-items:center;gap:5px;margin-bottom:7px;font-size:11px}
.al{color:#666;width:45px;flex-shrink:0}
.ai{width:70px;font-size:11px;padding:3px;border:1px solid #ddd;border-radius:2px;text-align:center}

/* 自社情報パネル */
.sp{
  width:232px; background:#fff; border-radius:8px; padding:14px;
  box-shadow:0 2px 12px rgba(0,0,0,0.12); display:none;
}
.sp.vis{display:block}
.spi{width:100%;font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:3px;}
.spb{width:100%;margin-top:8px;font-size:12px;padding:7px;background:#1a2535;color:#fff;border:none;cursor:pointer;border-radius:4px}

@media print{
  body{background:#fff}
  .ctrl,.ap,.sp{display:none!important}
  .pv{padding:0;background:#fff;display:block}
  .env{width:120mm;height:235mm;box-shadow:none;border:none}
  .zr{top:13mm;right:8mm}
  .zb{width:7mm;height:7mm;border-width:0.5pt;font-size:4.5mm}
  .aw{top:17mm;right:4.5mm;gap:2mm}
  .nb{top:25mm;left:37mm}
  .sb{bottom:4mm}
  @page{size:120mm 235mm;margin:0}
}
</style>
</head>
<body>

<div class="ctrl">
  <span class="ct">✉️ 封筒印刷</span>
  <div class="sep"></div>
  <span class="lbl">フォント：</span>
  <div class="kw">
    <button class="kb on" id="btnSerif" onclick="setFont('f-serif',this)">明朝</button>
    <button class="kb" id="btnSans" onclick="setFont('f-sans',this)">ゴシック</button>
  </div>
  <div class="sep"></div>
  <span class="lbl">敬称：</span>
  <div class="kw">
    <button class="kb on" onclick="setK('様',this)">様</button>
    <button class="kb" onclick="setK('御中',this)">御中</button>
    <button class="kb" onclick="setK('先生',this)">先生</button>
    <button class="kb" onclick="setK('',this)">なし</button>
  </div>
  <div class="sep"></div>
  <button class="btn" onclick="tgSP()">🏢 自社情報</button>
  <button class="btn" onclick="tgAP()">⚙ 位置調整</button>
  <button class="btn pr" onclick="window.print()">🖨 印刷</button>
</div>

<div class="pv">
  <div class="env f-serif" id="env">
    <div class="zr dr
