<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>封筒印刷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#d8d8d8}

/* ===== コントロールバー ===== */
.ctrl{
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  padding:9px 14px;background:#1a2535;color:#fff;
  position:fixed;top:0;left:0;right:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
}
.ct{font-size:14px;font-weight:500;white-space:nowrap}
.sep{width:1px;height:22px;background:rgba(255,255,255,0.2);flex-shrink:0}
.btn{
  font-family:'Noto Sans JP',sans-serif;font-size:11px;padding:5px 11px;
  border:1px solid rgba(255,255,255,0.28);background:rgba(255,255,255,0.08);
  color:#fff;cursor:pointer;border-radius:3px;white-space:nowrap
}
.btn:hover{background:rgba(255,255,255,0.2)}
.btn.pr{background:#1a5a9a;border-color:#1a5a9a}
.btn.pr:hover{background:#2a6aaa}
.lbl{font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap}
.kw{display:flex;gap:3px}
.kb{
  font-family:'Noto Sans JP',sans-serif;font-size:11px;padding:4px 9px;
  border:1px solid rgba(255,255,255,0.22);background:transparent;
  color:rgba(255,255,255,0.55);cursor:pointer;border-radius:3px
}
.kb.on{background:#1a5a9a;border-color:#1a5a9a;color:#fff}

/* ===== プレビューエリア ===== */
.pv{
  padding:64px 24px 40px;
  display:flex;justify-content:center;gap:18px;align-items:flex-start;
  min-height:100vh;
}

/* ===== 封筒本体 長形3号: 120×235mm ===== */
/* 画面表示: 3倍 → 360×705px */
.env{
  width:360px;height:705px;
  background:#fff;
  position:relative;
  flex-shrink:0;
  box-shadow:1px 2px 16px rgba(0,0,0,0.22),0 0 0 0.5px #bbb;
}

/* ===== 郵便番号 ===== */
/* 実寸: 枠7×7mm、間隔0.5mm → 3倍: 21×21px */
/* 位置: 右端から約8mm内→24px、上から約13mm→39px */
.zr{
  position:absolute;
  top:39px;
  right:24px;
  display:flex;align-items:center;gap:2px;
}
.zb{
  width:21px;height:21px;
  border:1.5px solid #c00;
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif JP',serif;
  font-size:13px;line-height:1;color:#111;
}
.zs{
  color:#c00;font-weight:700;font-size:13px;
  margin:0 1px;font-family:'Noto Sans JP',sans-serif;line-height:1;
}

/* ===== 住所ブロック（縦書き 2列）===== */
/* 住所1・住所2を別縦列に */
/* 画像: 右端から約16px内、上から約50px */
.aw{
  position:absolute;
  top:50px;
  right:14px;
  display:flex;
  gap:6px; /* 列間隔 */
  align-items:flex-start;
}
/* 住所の各縦列 */
.ac{
  writing-mode:vertical-rl;
  font-family:'Noto Serif JP',serif;
  font-size:14px;  /* 実寸~4.7mm */
  line-height:1.85;
  color:#111;
  white-space:nowrap;
  letter-spacing:0.06em;
}

/* ===== 宛名（縦書き）===== */
/* 画像: 封筒左から約110px、上から約75px */
/* 宛名は大きく、「様」は一段落とした右下配置 */
.nb{
  position:absolute;
  top:75px;
  left:112px;
  display:flex;
  gap:0;
  align-items:flex-start;
}
.n-name{
  writing-mode:vertical-rl;
  font-family:'Noto Serif JP',serif;
  font-size:30px; /* 実寸~10mm */
  font-weight:700;
  line-height:1.45;
  color:#111;
  letter-spacing:0.12em;
  white-space:nowrap;
}
.n-sama{
  writing-mode:vertical-rl;
  font-family:'Noto Serif JP',serif;
  font-size:22px; /* 実寸~7.5mm */
  font-weight:400;
  line-height:1.4;
  color:#111;
  letter-spacing:0.06em;
  align-self:flex-end; /* 下揃え */
  padding-bottom:4px;
  white-space:nowrap;
}

/* ===== 差出人（下部中央）===== */
.sb{
  position:absolute;
  bottom:12px;
  left:0;right:0;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.sc{ /* 会社名 */
  font-family:'Noto Serif JP',serif;
  font-size:13px;
  color:#111;
  letter-spacing:0.2em;
  white-space:nowrap;
}
.si{ /* 住所・TEL等 */
  font-family:'Noto Sans JP',sans-serif;
  font-size:8.5px;
  color:#333;
  letter-spacing:0.04em;
  white-space:nowrap;
}

/* ===== ドラッグ操作 ===== */
.dr{cursor:move}
.dr.sel{outline:2px dashed #1a5a9a;outline-offset:4px}
.dr:hover:not(.sel){outline:1px dashed #88acd8;outline-offset:3px}

/* ===== 調整パネル ===== */
.ap{
  width:205px;flex-shrink:0;
  background:#fff;border-radius:8px;padding:14px;
  box-shadow:0 2px 12px rgba(0,0,0,0.12);
  display:none;align-self:flex-start;
}
.ap.vis{display:block}
.ah{font-size:12px;font-weight:500;color:#1a2535;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee}
.ar{display:flex;align-items:center;gap:5px;margin-bottom:7px;font-size:11px}
.al{color:#666;width:32px;flex-shrink:0}
.ab{width:22px;height:22px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer;border-radius:2px;font-size:11px;display:flex;align-items:center;justify-content:center}
.ab:hover{background:#e4e4e4}
.ai{width:50px;font-size:11px;padding:2px 4px;border:1px solid #ddd;border-radius:2px;text-align:center}
.an{font-size:10px;color:#999;margin-top:8px;line-height:1.6}

/* ===== 自社情報パネル ===== */
.sp{
  width:232px;flex-shrink:0;
  background:#fff;border-radius:8px;padding:14px;
  box-shadow:0 2px 12px rgba(0,0,0,0.12);
  display:none;align-self:flex-start;
}
.sp.vis{display:block}
.sph{font-size:12px;font-weight:500;color:#1a2535;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee}
.spr{margin-bottom:8px}
.spl{font-size:11px;color:#666;display:block;margin-bottom:3px}
.spi{width:100%;font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:3px;font-family:'Noto Sans JP',sans-serif}
.spb{width:100%;margin-top:8px;font-size:12px;padding:7px;background:#1a2535;color:#fff;border:none;cursor:pointer;border-radius:4px;font-family:'Noto Sans JP',sans-serif}
.spb:hover{background:#2a3545}

/* ===== 印刷 ===== */
@media print{
  body{background:#fff}
  .ctrl,.ap,.sp{display:none!important}
  .pv{padding:0;background:#fff;display:block}
  .env{width:120mm;height:235mm;box-shadow:none;border:none}
  /* mm換算: 画面px ÷ 3 */
  .zr{top:13mm;right:8mm}
  .zb{width:7mm;height:7mm;border-width:0.5pt;font-size:4.5mm}
  .zs{font-size:4.5mm}
  .aw{top:17mm;right:4.5mm;gap:2mm}
  .ac{font-size:4.7mm;line-height:1.85}
  .nb{top:25mm;left:37mm}
  .n-name{font-size:10mm}
  .n-sama{font-size:7.5mm}
  .sb{bottom:4mm}
  .sc{font-size:4.3mm;letter-spacing:0.2em}
  .si{font-size:2.8mm}
  .dr.sel,.dr:hover{outline:none}
  @page{size:120mm 235mm;margin:0}
}
</style>
</head>
<body>

<!-- コントロールバー -->
<div class="ctrl">
  <span class="ct">✉️ 封筒印刷</span>
  <div class="sep"></div>
  <span class="lbl">敬称：</span>
  <div class="kw">
    <button class="kb on" onclick="setK('様',this)">様</button>
    <button class="kb" onclick="setK('御中',this)">御中</button>
    <button class="kb" onclick="setK('先生',this)">先生</button>
    <button class="kb" onclick="setK('',this)">なし</button>
  </div>
  <div class="sep"></div>
  <button class="btn" onclick="tgSP()">🏢 自社情報</button>
  <button class="btn" onclick="tgAP()">⚙ 位置調整</button>
  <button class="btn" onclick="resetPos()">↩ リセット</button>
  <div class="sep"></div>
  <button class="btn pr" onclick="window.print()">🖨 印刷</button>
</div>

<div class="pv" id="pv">

  <!-- 封筒 -->
  <div class="env" id="env">

    <!-- 郵便番号 -->
    <div class="zr dr" id="zB">
      <div class="zb" id="z0"></div>
      <div class="zb" id="z1"></div>
      <div class="zb" id="z2"></div>
      <div class="zs">-</div>
      <div class="zb" id="z3"></div>
      <div class="zb" id="z4"></div>
      <div class="zb" id="z5"></div>
      <div class="zb" id="z6"></div>
    </div>

    <!-- 住所（住所2が右列、住所1が左列） -->
    <div class="aw dr" id="aB">
      <div class="ac" id="a2"></div><!-- 住所2: 番地（右） -->
      <div class="ac" id="a1"></div><!-- 住所1: 都道府県〜（左） -->
    </div>

    <!-- 宛名 -->
    <div class="nb dr" id="nB">
      <div class="n-name" id="nT"></div>
      <div class="n-sama" id="kT">様</div>
    </div>

    <!-- 差出人 -->
    <div class="sb dr" id="sB">
      <div class="sc" id="sC"></div>
      <div id="sLines"></div>
    </div>

  </div>

  <!-- 調整パネル -->
  <div class="ap" id="aPanel">
    <div class="ah" id="aH">⚙ 位置調整</div>
    <div id="aBody">要素をクリックして選択</div>
    <div class="an">矢印キー：1px移動<br>Shift＋矢印：10px移動</div>
  </div>

  <!-- 自社情報 -->
  <div class="sp" id="spPanel">
    <div class="sph">🏢 自社情報登録</div>
    <div class="spr">
      <label class="spl">会社名</label>
      <input class="spi" id="spC" placeholder="有限会社 庄司石材店">
    </div>
    <div class="spr">
      <label class="spl">住所・連絡先（複数行可）</label>
      <textarea class="spi" id="spI" rows="4" style="resize:vertical"
        placeholder="〒168-0082 東京都杉並区久我山5-5-12-201&#10;TEL 03-3333-8451 fax 03-3333-8452&#10;www.shojisekizai.com"></textarea>
    </div>
    <button class="spb" onclick="saveSender()">登録・反映</button>
  </div>

</div>

<script>
/* ===== データ受け取り ===== */
var D = {};
try { D = JSON.parse(sessionStorage.getItem('envelopeData') || '{}'); } catch(e){}

/* ===== 郵便番号 ===== */
function setZip(z) {
  var d = (z || '').replace(/[^0-9]/g, '');
  for (var i = 0; i < 7; i++) {
    var e = document.getElementById('z' + i);
    if (e) e.textContent = d[i] || '';
  }
}

/* ===== 住所2のハイフンを縦書き縦棒に変換 ===== */
function toTate(s) {
  if (!s) return '';
  // 半角・全角ハイフン → 縦書きで縦棒になるよう「｜」に変換
  // ただし見た目が「-」のまま縦になるよう、縦棒記号を使用
  return s
    .replace(/-/g, '｜')
    .replace(/－/g, '｜')
    .replace(/−/g, '｜');
}

/* ===== 初期化 ===== */
function init() {
  setZip(D.zip || '');
  document.getElementById('a1').textContent = D.addr1 || '';
  document.getElementById('a2').textContent = toTate(D.addr2 || '');
  document.getElementById('nT').textContent = D.name || '';
  loadSender();
}

/* ===== 自社情報 ===== */
function loadSender() {
  var s = JSON.parse(localStorage.getItem('envSender') || '{}');
  renderSender(s.company || '', s.info || '');
  document.getElementById('spC').value = s.company || '';
  document.getElementById('spI').value = s.info || '';
}

function renderSender(company, info) {
  document.getElementById('sC').textContent = company;
  var sl = document.getElementById('sLines');
  sl.innerHTML = '';
  (info || '').split('\n').forEach(function(line) {
    var d = document.createElement('div');
    d.className = 'si';
    d.textContent = line;
    sl.appendChild(d);
  });
}

function saveSender() {
  var c = document.getElementById('spC').value;
  var i = document.getElementById('spI').value;
  localStorage.setItem('envSender', JSON.stringify({ company: c, info: i }));
  renderSender(c, i);
  tgSP();
}

function tgSP() { document.getElementById('spPanel').classList.toggle('vis'); }

/* ===== 敬称 ===== */
function setK(k, btn) {
  document.getElementById('kT').textContent = k;
  document.querySelectorAll('.kb').forEach(function(b) { b.classList.toggle('on', b === btn); });
}

/* ===== ドラッグ移動 ===== */
var dg = null, sel = null, sx, sy, ox, oy;

document.querySelectorAll('.dr').forEach(function(el) {
  el.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    if (sel) sel.classList.remove('sel');
    sel = el; el.classList.add('sel'); showAdj(el);
    dg = el; sx = e.clientX; sy = e.clientY;
    var er = document.getElementById('env').getBoundingClientRect();
    var lr = el.getBoundingClientRect();
    ox = lr.left - er.left; oy = lr.top - er.top;
    el.style.cssText = 'position:absolute;left:' + ox + 'px;top:' + oy + 'px';
    e.preventDefault();
  });
  el.addEventListener('click', function(e) { e.stopPropagation(); });
});

document.addEventListener('mousemove', function(e) {
  if (!dg) return;
  dg.style.left = (ox + e.clientX - sx) + 'px';
  dg.style.top = (oy + e.clientY - sy) + 'px';
  if (sel === dg) updAdj();
});

document.addEventListener('mouseup', function() { dg = null; });

document.addEventListener('click', function(e) {
  if (!e.target.closest('.dr') && !e.target.closest('.ap')) {
    if (sel) sel.classList.remove('sel');
    sel = null;
  }
});

/* ===== 調整パネル ===== */
var NM = { zB: '郵便番号', aB: '住所', nB: '宛名', sB: '差出人' };

function tgAP() { document.getElementById('aPanel').classList.toggle('vis'); }

function showAdj(el) {
  document.getElementById('aPanel').classList.add('vis');
  document.getElementById('aH').textContent = '⚙ ' + (NM[el.id] || '');
  updAdj();
}

function updAdj() {
  if (!sel) return;
  var l = parseInt(sel.style.left) || 0;
  var t = parseInt(sel.style.top) || 0;
  var hasFs = sel.id === 'aB' || sel.id === 'nB';
  var fs = 0;
  if (hasFs) {
    var fc = sel.querySelector('.ac, .n-name');
    if (fc) fs = Math.round(parseFloat(window.getComputedStyle(fc).fontSize));
  }
  var h =
    '<div class="ar"><span class="al">左</span>' +
    '<div class="ab" onclick="mv(-5,0)">◀</div>' +
    '<input class="ai" id="iL" value="' + l + '" onchange="sp(\'left\',this.value)">' +
    '<div class="ab" onclick="mv(5,0)">▶</div>px</div>' +
    '<div class="ar"><span class="al">上</span>' +
    '<div class="ab" onclick="mv(0,-5)">▲</div>' +
    '<input class="ai" id="iT" value="' + t + '" onchange="sp(\'top\',this.value)">' +
    '<div class="ab" onclick="mv(0,5)">▼</div>px</div>';
  if (hasFs) {
    h += '<div class="ar"><span class="al">文字</span>' +
      '<div class="ab" onclick="sfs(-1)">−</div>' +
      '<input class="ai" id="iF" value="' + fs + '" onchange="sfv(this.value)">' +
      '<div class="ab" onclick="sfs(1)">＋</div>px</div>';
  }
  document.getElementById('aBody').innerHTML = h;
}

function mv(dx, dy) {
  if (!sel) return;
  if (!sel.style.left) {
    var er = document.getElementById('env').getBoundingClientRect();
    var sr = sel.getBoundingClientRect();
    sel.style.position = 'absolute';
    sel.style.left = (sr.left - er.left) + 'px';
    sel.style.top = (sr.top - er.top) + 'px';
    sel.style.right = ''; sel.style.bottom = ''; sel.style.transform = '';
  }
  sel.style.left = ((parseInt(sel.style.left) || 0) + dx) + 'px';
  sel.style.top = ((parseInt(sel.style.top) || 0) + dy) + 'px';
  updAdj();
}

function sp(axis, v) { if (sel) sel.style[axis] = parseInt(v) + 'px'; }

function sfs(d) {
  if (!sel) return;
  sel.querySelectorAll('.ac, .n-name, .n-sama').forEach(function(c) {
    c.style.fontSize = (parseFloat(window.getComputedStyle(c).fontSize) + d) + 'px';
  });
  updAdj();
}

function sfv(v) {
  if (!sel) return;
  sel.querySelectorAll('.ac, .n-name, .n-sama').forEach(function(c) {
    c.style.fontSize = parseInt(v) + 'px';
  });
}

function resetPos() {
  document.querySelectorAll('.dr').forEach(function(el) {
    el.removeAttribute('style'); el.classList.remove('sel');
  });
  sel = null;
}

/* ===== キーボード微調整 ===== */
document.addEventListener('keydown', function(e) {
  if (!sel) return;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].indexOf(e.key) < 0) return;
  var step = e.shiftKey ? 10 : 1;
  if (e.key === 'ArrowLeft')  mv(-step, 0);
  else if (e.key === 'ArrowRight') mv(step, 0);
  else if (e.key === 'ArrowUp')    mv(0, -step);
  else mv(0, step);
  e.preventDefault();
});

/* ===== 起動 ===== */
init();
</script>
</body>
</html>
