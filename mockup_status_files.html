<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=360,initial-scale=1">
<title>ステータスファイル表示 — モックアップ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,'Hiragino Sans',sans-serif; background: #f0f2f5; }

/* ===== タブバー（既存） ===== */
.tab-bar {
  display: flex;
  gap: 4px;
  padding: 8px 12px 0;
  background: #1a2535;
}
.tab {
  padding: 7px 12px;
  border-radius: 8px 8px 0 0;
  font-size: 12px;
  color: #ccc;
  cursor: pointer;
  white-space: nowrap;
}
.tab.on { background: #fff; color: #1a2535; font-weight: 600; }

/* ===== タブ本体 ===== */
.tab-body {
  background: #fff;
  padding: 12px;
  min-height: 480px;
}

/* ===== ★ ステータスファイル一覧（新規追加エリア） ===== */
.status-files-section {
  background: #f8fbff;
  border: 1px solid #b5d4f4;
  border-radius: 10px;
  margin-bottom: 14px;
  overflow: hidden;
}
.status-files-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  background: #e0ecff;
  border-bottom: 1px solid #b5d4f4;
  font-size: 12px;
  font-weight: 700;
  color: #1a3a7a;
}
.status-files-header .badge {
  background: #1a3a7a;
  color: #fff;
  border-radius: 10px;
  padding: 1px 8px;
  font-size: 11px;
  font-weight: 600;
  margin-left: auto;
}
.status-file-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 0.5px solid #d8e8f8;
  cursor: pointer;
}
.status-file-row:last-child { border-bottom: none; }
.status-file-row:active { background: #e8f3ff; }

/* ステータスバッジ */
.st-badge {
  flex-shrink: 0;
  border-radius: 10px;
  padding: 2px 9px;
  font-size: 11px;
  font-weight: 700;
  min-width: 44px;
  text-align: center;
}
.st-latest  { background: #e0f0ff; color: #1a5a9a; border: 1px solid #7ab0e0; }
.st-confirmed { background: #e7f5e7; color: #2a6a2a; border: 1px solid #7ab07a; }

/* ファイル情報 */
.file-info {
  flex: 1;
  min-width: 0;
}
.file-name {
  font-size: 13px;
  color: #1a2535;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 500;
}
.file-location {
  font-size: 10px;
  color: #888;
  margin-top: 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.file-open-btn {
  flex-shrink: 0;
  background: none;
  border: 1px solid #b5d4f4;
  border-radius: 6px;
  padding: 3px 9px;
  font-size: 12px;
  cursor: pointer;
  color: #1565c0;
}

/* ===== サブタブ（既存） ===== */
.subtab-bar {
  display: flex;
  gap: 6px;
  border-bottom: 2px solid #ddd;
  padding-top: 2px;
  margin-bottom: 12px;
  align-items: center;
}
.subtab-btn {
  padding: 7px 14px;
  border: none;
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  background: #eee;
  color: #666;
}
.subtab-btn.on { background: #2a4a7a; color: #fff; }
.subtab-right {
  margin-left: auto;
  display: flex;
  gap: 5px;
}
.tool-btn {
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid #ccc;
  background: #eee;
  color: #555;
}
.tool-btn.dark { background: #2a4a7a; color: #fff; border: none; }

/* 写真グリッド（ダミー） */
.cat-tabs {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.cat-tab {
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 11px;
  border: 1px solid #ccc;
  background: #f5f5f5;
  color: #555;
  cursor: pointer;
}
.cat-tab.on { background: #1a2535; color: #fff; border-color: #1a2535; }
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}
.photo-dummy {
  aspect-ratio: 1;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  position: relative;
}
.photo-dummy.blue   { background: #d0e8ff; }
.photo-dummy.green  { background: #d0f0d0; }
.photo-dummy.gray   { background: #e8e8e8; }
.photo-fname {
  font-size: 9px;
  background: rgba(255,255,255,0.9);
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 2px 4px;
  text-overflow: ellipsis;
  overflow: hidden;
  white-space: nowrap;
  border-radius: 0 0 6px 6px;
  color: #333;
}
.st-overlay {
  position: absolute;
  top: 4px;
  left: 4px;
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 9px;
  font-weight: 700;
}
</style>
</head>
<body>

<!-- タブバー（既存） -->
<div class="tab-bar">
  <div class="tab">依頼内容</div>
  <div class="tab">状況</div>
  <div class="tab">仕様</div>
  <div class="tab">資料</div>
  <div class="tab on">📁 データ</div>
  <div class="tab">その他</div>
</div>

<!-- データタブ本体 -->
<div class="tab-body">

  <!-- ★ ステータスファイル一覧（写真・図面タブより上に表示） -->
  <div class="status-files-section">
    <div class="status-files-header">
      📌 ステータス登録ファイル（最新・確定）
      <span class="badge">4件</span>
    </div>

    <!-- 確定ファイル -->
    <div class="status-file-row">
      <span class="st-badge st-confirmed">✅ 確定</span>
      <div class="file-info">
        <div class="file-name">山田家_正面彫刻原案v3.pdf</div>
        <div class="file-location">📂 工事仕様/彫刻資料</div>
      </div>
      <button class="file-open-btn">開く</button>
    </div>

    <div class="status-file-row">
      <span class="st-badge st-confirmed">✅ 確定</span>
      <div class="file-info">
        <div class="file-name">墓石配置図_最終.pdf</div>
        <div class="file-location">📂 工事仕様/図面</div>
      </div>
      <button class="file-open-btn">開く</button>
    </div>

    <!-- 最新ファイル -->
    <div class="status-file-row">
      <span class="st-badge st-latest">🆕 最新</span>
      <div class="file-info">
        <div class="file-name">現場写真_北側_20250601.jpg</div>
        <div class="file-location">📂 工事仕様/現場写真</div>
      </div>
      <button class="file-open-btn">開く</button>
    </div>

    <div class="status-file-row">
      <span class="st-badge st-latest">🆕 最新</span>
      <div class="file-info">
        <div class="file-name">提出資料_完成報告書.pdf</div>
        <div class="file-location">📂 提出資料</div>
      </div>
      <button class="file-open-btn">開く</button>
    </div>
  </div>

  <!-- サブタブ（既存） -->
  <div class="subtab-bar">
    <button class="subtab-btn on">📷 写真・図面</button>
    <button class="subtab-btn">📎 SP添付</button>
    <button class="subtab-btn">📁 フォルダー</button>
    <div class="subtab-right">
      <button class="tool-btn dark">🗂 ファイル整理</button>
      <button class="tool-btn">🔄</button>
    </div>
  </div>

  <!-- カテゴリタブ（既存） -->
  <div class="cat-tabs">
    <div class="cat-tab on">現場写真</div>
    <div class="cat-tab">図面</div>
    <div class="cat-tab">彫刻資料</div>
    <div class="cat-tab">参考画像</div>
    <div class="cat-tab">完成イメージ</div>
    <div class="cat-tab">提出資料</div>
  </div>

  <!-- 写真グリッド（既存・ダミー） -->
  <div class="photo-grid">
    <div class="photo-dummy blue">
      🖼
      <span class="st-overlay st-latest" style="background:#e0f0ff;color:#1a5a9a;border:1px solid #7ab0e0">🆕 最新</span>
      <div class="photo-fname">現場写真_北側_20250601.jpg</div>
    </div>
    <div class="photo-dummy green">
      🖼
      <div class="photo-fname">現場写真_南側.jpg</div>
    </div>
    <div class="photo-dummy gray">
      🖼
      <div class="photo-fname">全景_before.jpg</div>
    </div>
  </div>

</div>

<p style="padding:14px;font-size:11px;color:#888;text-align:center">
  — モックアップ v1 —　青枠部分が新規追加エリア
</p>

</body>
</html>
