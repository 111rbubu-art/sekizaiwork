<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<title>墓地マップ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#f0ece0;color:#1a1a1a;}
.hdr{padding:10px 16px 8px;border-bottom:2px solid #1a1a1a;background:#f0ece0;position:sticky;top:0;z-index:100;}
.title-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
h1{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600;letter-spacing:.06em;}
.stats{font-size:11px;color:#888;}
.sv{font-size:10px;color:#2a7a2a;padding:2px 8px;background:#d4f0d4;border:1px solid #2a7a2a;display:none;}
.tb{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.sep{width:1px;height:20px;background:#ccc;margin:0 2px;}
.btn{font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:500;padding:5px 10px;
  border:1.5px solid #1a1a1a;background:#1a1a1a;color:#f0ece0;cursor:pointer;white-space:nowrap;}
.btn:hover{background:#333;}
.btn.out{background:transparent;color:#1a1a1a;}
.btn.out:hover{background:#1a1a1a;color:#f0ece0;}
.btn.on{background:#1a5a1a;border-color:#1a5a1a;color:white;}
.btn.pon{background:#4a4a9a;border-color:#4a4a9a;color:white;}
.btn:disabled{opacity:.35;cursor:default;}
#si{font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:5px 10px;
  border:1.5px solid #1a1a1a;background:white;width:160px;outline:none;}
#si:focus{border-color:#e05a00;}
#ri{font-size:11px;padding:4px 8px;background:#e8e4d8;border-left:3px solid #ccc;max-width:400px;line-height:1.6;min-height:22px;}
.mhint{padding:5px 16px;font-size:11px;display:none;border-bottom:1px solid;}
.mhint.edit{display:block;background:#e8f4e8;border-color:#a8d4a8;color:#1a5a1a;}
.mhint.add{display:block;background:#e8e8f8;border-color:#a8a8d8;color:#2a2a8a;}
.mhint.print{display:block;background:#f8f0e8;border-color:#d8c8a8;color:#6a4a1a;}
.legend{display:flex;gap:12px;padding:5px 16px;background:#e8e4d8;border-bottom:1px solid #c8c8c8;font-size:11px;flex-wrap:wrap;align-items:center;}
.li{display:flex;align-items:center;gap:4px;}
.lb{width:12px;height:12px;border:1px solid #999;flex-shrink:0;}
.lb.u{background:#d6d0c4;border-color:#9a9488;}
.lb.e{background:#f0ede4;border-color:#ccc;}
.lb.ex{background:#1a1a1a;}
.lb.pt{background:#ffe8cc;border:2px solid #e05a00;}
.lb.b{background:#b8d4a8;border-color:#7aaa62;}
.lb.pr{background:rgba(100,150,255,.15);border:2px dashed #4060c0;}
.map-wrap{overflow:auto;padding:12px 16px;}
.canvas-wrap{position:relative;display:inline-block;}
#mc{display:block;}
#dragBox{position:absolute;top:0;left:0;pointer-events:none;display:none;}

/* ===== 印刷パネル ===== */
#printPanel{display:none;position:fixed;right:16px;top:70px;background:white;
  border:2px solid #4a4a9a;box-shadow:4px 4px 0 #4a4a9a;width:300px;z-index:300;
  max-height:90vh;overflow-y:auto;}
#printPanel.visible{display:block;}
.pp-hdr{background:#4a4a9a;color:white;padding:8px 12px;font-size:12px;font-weight:500;
  display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;}
.pp-close{cursor:pointer;background:none;border:none;color:white;font-size:16px;}
.pp-body{padding:12px;}
.pp-sec{margin-bottom:12px;border-bottom:1px solid #eee;padding-bottom:10px;}
.pp-sec:last-child{border-bottom:none;}
.pp-lbl{font-size:11px;color:#555;font-weight:600;margin-bottom:5px;}
.pp-row{display:flex;gap:5px;flex-wrap:wrap;}
.pp-info{font-size:10px;color:#888;margin-top:4px;background:#f5f5f5;padding:3px 6px;line-height:1.5;}

/* エリアリスト */
.area-list{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto;}
.area-item{display:flex;align-items:center;gap:6px;padding:5px 8px;
  border:1.5px solid #ddd;background:#fafafa;font-size:11px;cursor:pointer;}
.area-item:hover{background:#f0f0f0;}
.area-item.active{border-color:#4a4a9a;background:#f0f0ff;}
.area-num{font-weight:700;color:#4a4a9a;min-width:20px;font-size:13px;}
.area-name{flex:1;}
.area-sz{font-size:10px;color:#aaa;white-space:nowrap;}
.area-btns{display:flex;gap:3px;}
.area-btn{background:none;border:1px solid #ddd;color:#888;cursor:pointer;
  font-size:10px;padding:1px 5px;border-radius:2px;}
.area-btn:hover{border-color:#4a4a9a;color:#4a4a9a;}
.area-btn.del:hover{border-color:#c00;color:#c00;}
.area-empty{font-size:11px;color:#aaa;padding:8px;text-align:center;}

/* 印刷エリア操作バー（Canvas上に重ねて表示） */
#areaActionBar{
  display:none;position:absolute;z-index:200;
  background:white;border:1.5px solid #4a4a9a;box-shadow:2px 2px 0 rgba(0,0,0,.15);
  padding:4px 6px;gap:4px;flex-wrap:wrap;align-items:center;font-size:11px;
}
#areaActionBar.visible{display:flex;}
#areaActionBar .aab-label{color:#4a4a9a;font-weight:500;white-space:nowrap;}
#areaActionBar .btn{padding:3px 8px;font-size:10px;}

/* プレビュー */
.pp-preview{width:100%;height:90px;border:1px solid #ccc;background:#f9f9f9;
  position:relative;overflow:hidden;margin-top:4px;}
.pp-page{position:absolute;background:white;border:1px solid #aaa;box-shadow:1px 1px 2px rgba(0,0,0,.1);}
.pp-thumb{position:absolute;background:#d6d0c4;border:1px solid #aaa;
  display:flex;align-items:center;justify-content:center;font-size:8px;color:#888;}

/* 右クリックメニュー・モーダル・削除確認 */
#ctx{position:fixed;background:white;border:1.5px solid #1a1a1a;
  box-shadow:3px 3px 0 rgba(0,0,0,.12);z-index:500;display:none;min-width:170px;}
.ctx-hdr{background:#1a1a1a;color:white;padding:6px 12px;font-size:11px;font-weight:500;}
.ctx-i{padding:8px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;
  gap:8px;border-bottom:1px solid #f0f0f0;}
.ctx-i:last-child{border-bottom:none;}
.ctx-i:hover{background:#f5f0e0;}
.ctx-i.del{color:#8b0000;}
.ctx-i.del:hover{background:#fff0f0;}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:600;display:none;
  align-items:center;justify-content:center;}
#modal.v{display:flex;}
.mbox{background:white;border:2px solid #1a1a1a;box-shadow:6px 6px 0 #1a1a1a;
  width:310px;max-width:90vw;}
.mhdr2{background:#1a1a1a;color:white;padding:9px 14px;font-size:13px;font-weight:500;
  display:flex;justify-content:space-between;align-items:center;}
.mclose{cursor:pointer;font-size:18px;background:none;border:none;color:white;}
.mbody{padding:14px;}
.mf{margin-bottom:11px;}
.mf label{font-size:11px;color:#666;display:block;margin-bottom:3px;}
.mf input,.mf select{width:100%;font-family:'Noto Sans JP',sans-serif;font-size:13px;
  padding:7px 10px;border:1.5px solid #ccc;outline:none;}
.mf input:focus,.mf select:focus{border-color:#1a1a1a;}
.mf .hint{font-size:10px;color:#aaa;margin-top:3px;}
.mfoot{display:flex;gap:8px;padding:0 14px 14px;}
.mfoot .btn{flex:1;padding:8px;font-size:12px;text-align:center;}
#delDlg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:700;display:none;
  align-items:center;justify-content:center;}
#delDlg.v{display:flex;}
.dbox{background:white;border:2px solid #8b0000;box-shadow:4px 4px 0 #8b0000;
  width:270px;padding:18px;text-align:center;}
.dbox h3{font-size:14px;color:#8b0000;margin-bottom:8px;}
.dbox p{font-size:12px;color:#555;margin-bottom:14px;line-height:1.6;}
.dbtns{display:flex;gap:8px;}
.dbtns .btn{flex:1;padding:8px;font-size:12px;}
.btn.red{background:#8b0000;border-color:#8b0000;color:white;}
.btn.red:hover{background:#a00;}
#tt{position:fixed;background:white;border:1.5px solid #1a1a1a;padding:7px 11px;
  font-size:11px;pointer-events:none;display:none;z-index:400;
  box-shadow:2px 2px 0 rgba(0,0,0,.1);line-height:1.7;max-width:230px;}
@media print{
  .hdr,.legend,.mhint,#ctx,#modal,#delDlg,#tt,#printPanel,#areaActionBar{display:none!important;}
  .map-wrap{padding:0;overflow:visible;}
}
</style>

// ===== ユーティリティ =====
function pk(p){return p.r1+'_'+p.c1;}
function geom(p){return{x:PAD+CP[p.c1],y:PAD+RP[p.r1],w:CP[p.c2+1]-CP[p.c1],h:RP[p.r2+1]-RP[p.r1]};}
function canvasXY(e){
  const r=mc.getBoundingClientRect();
  return{mx:(e.clientX-r.left)*(mc.width/r.width)-PAD,my:(e.clientY-r.top)*(mc.height/r.height)-PAD};
}
function hitTest(mx,my){
  return PLOTS.findIndex(p=>{
    const x=CP[p.c1],y=RP[p.r1],w=CP[p.c2+1]-x,h=RP[p.r2+1]-y;
    return mx>=x&&mx<x+w&&my>=y&&my<y+h;
  });
}
function getActiveArea(){return savedAreas.find(a=>a.id===activeAreaId)||null;}

// 区画のピクセル座標を取得
function getPlotPx(p){
  const x=CP[p.c1], y=RP[p.r1];
  const x2=CP[p.c2+1]??CP[CP.length-1], y2=RP[p.r2+1]??RP[RP.length-1];
  return {x,y,w:x2-x,h:y2-y};
}
// ピクセル座標からグリッド座標に変換
function pxToGrid(px,arr){
  for(let i=0;i<arr.length-1;i++) if(px>=arr[i]&&px<arr[i+1]) return i;
  return arr.length-2;
}
// 選択中区画のハンドルポイント取得
function getPlotHandlePoints(){
  if(plotEditIdx<0||plotEditIdx>=PLOTS.length) return [];
  const p=PLOTS[plotEditIdx];
  const{x,y,w,h}=getPlotPx(p);
  const cx=x+w/2,cy=y+h/2;
  return[
    {id:'nw',x,y},{id:'n',x:cx,y},{id:'ne',x:x+w,y},
    {id:'e',x:x+w,y:cy},{id:'se',x:x+w,y:y+h},{id:'s',x:cx,y:y+h},
    {id:'sw',x,y:y+h},{id:'w',x,y:cy},{id:'move',x:cx,y:cy}
  ];
}
function getPlotHitHandle(mx,my){
  const HS=8;
  for(const hp of getPlotHandlePoints()){
    if(Math.abs(mx-hp.x)<HS&&Math.abs(my-hp.y)<HS) return hp.id;
  }
  return null;
}

// ===== Canvas→画面座標変換 =====
function mapToScreen(mx,my){
  const cr=mc.getBoundingClientRect();
  const sx=cr.width/mc.width, sy=cr.height/mc.height;
  const cwRect=document.getElementById('cw').getBoundingClientRect();
  const mwRect=document.getElementById('mw').getBoundingClientRect();
  return{
    x:(mx+PAD)*sx + (cr.left - mwRect.left + document.getElementById('mw').scrollLeft),
    y:(my+PAD)*sy + (cr.top  - mwRect.top  + document.getElementById('mw').scrollTop)
  };
}

// ===== 描画 =====
function draw(){
  ctx.clearRect(0,0,mc.width,mc.height);
  ctx.fillStyle='#f0ece0'; ctx.fillRect(0,0,mc.width,mc.height);
  PLOTS.forEach((p,i)=>drawPlot(p,i===selIdx||i===plotEditIdx));
  // 選択中区画のリサイズハンドル描画
  if(editMode&&plotEditIdx>=0&&plotEditIdx<PLOTS.length){
    const HS=8;
    ctx.fillStyle='#ffffff';
    ctx.strokeStyle='#1a5a9a';
    ctx.lineWidth=1.5;
    getPlotHandlePoints().forEach(hp=>{
      ctx.beginPath();
      ctx.rect(PAD+hp.x-HS/2,PAD+hp.y-HS/2,HS,HS);
      ctx.fill();ctx.stroke();
    });
  }
  // 印刷設定パネルが開いているときだけ印刷範囲枠を表示
  const _panel=document.getElementById('printPanel');
  if(_panel && _panel.classList.contains('visible')){
    drawAllAreas();
    if(pendingArea) drawPendingArea();
  }
  // 描画のたびにlocalStorageへ自動保存（更新ボタンを押しても最新状態が復元される）
  autoSave();
}
function drawPlot(p,selected){
  const{x,y,w,h}=geom(p);
  const minS=Math.min(w,h),fs=Math.min(10,Math.max(6,minS*0.32));
  const isEx=exactHL.has(pk(p)),isPt=partHL.has(pk(p));
  let bg='#d6d0c4';
  if(selected)bg='#fff3b0';
  else if(isEx)bg='#1a1a1a';
  else if(isPt)bg='#ffe8cc';
  else if(p.status==='building')bg='#b8d4a8';
  else if(p.status==='empty')bg='#f0ede4';
  ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
  if(selected){ctx.strokeStyle='#e0a000';ctx.lineWidth=2.5;ctx.strokeRect(x+1.25,y+1.25,w-2.5,h-2.5);}
  else if(isEx){ctx.strokeStyle='#e05a00';ctx.lineWidth=2;ctx.strokeRect(x+1,y+1,w-2,h-2);}
  else if(isPt){ctx.strokeStyle='#e05a00';ctx.lineWidth=1.5;ctx.strokeRect(x+.75,y+.75,w-1.5,h-1.5);}
  else if(p.status==='building'){ctx.strokeStyle='#7aaa62';ctx.lineWidth=0.8;ctx.strokeRect(x+.4,y+.4,w-.8,h-.8);}
  else if(p.status==='empty'){ctx.strokeStyle='#d0ccc4';ctx.lineWidth=0.5;ctx.strokeRect(x+.25,y+.25,w-.5,h-.5);}
  else{ctx.strokeStyle='#9a9488';ctx.lineWidth=0.5;ctx.strokeRect(x+.25,y+.25,w-.5,h-.5);}
  let tc='#2a2520';
  if(isEx&&!selected)tc='white';
  else if(isPt&&!selected)tc='#6a3000';
  else if(p.status==='building')tc='#2a4a1a';
  else if(p.status==='empty')tc='#bbb';
  else if(selected)tc='#5a4000';
  ctx.fillStyle=tc;
  ctx.font=`${isEx&&!selected?'bold ':''}${fs}px 'Noto Sans JP',sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  if(minS>10)wrapText(p.name||(p.status==='empty'?'空':''),x+w/2,y+h/2,w-4,fs*1.2);
}
function wrapText(text,cx,cy,maxW,lh){
  if(!text)return;
  if(ctx.measureText(text).width<=maxW){ctx.fillText(text,cx,cy);return;}
  const chars=[...text],half=Math.ceil(chars.length/2);
  ctx.fillText(chars.slice(0,half).join(''),cx,cy-lh*.5);
  ctx.fillText(chars.slice(half).join(''),cx,cy+lh*.5);
}
function drawAllAreas(){
  savedAreas.forEach(a=>{
    const isAct=a.id===activeAreaId;
    ctx.save();
    ctx.fillStyle=isAct?'rgba(70,100,220,.07)':'rgba(150,150,200,.04)';
    ctx.fillRect(PAD+a.x,PAD+a.y,a.w,a.h);
    ctx.strokeStyle=isAct?'#3040b0':'#9090c0';
    ctx.lineWidth=isAct?2:1;
    ctx.setLineDash(isAct?[7,4]:[4,4]);
    ctx.strokeRect(PAD+a.x+1,PAD+a.y+1,a.w-2,a.h-2);
    ctx.setLineDash([]);
    // 番号ラベル
    ctx.fillStyle=isAct?'#3040b0':'#9090c0';
    ctx.font="bold 11px 'Noto Sans JP',sans-serif";
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(`[${a.id}]${a.name?' '+a.name:''}`,PAD+a.x+4,PAD+a.y+3);
    // アクティブ時はハンドルを描画
    if(isAct) drawHandles(a);
    ctx.restore();
  });
}
function drawHandles(a){
  const hpts=getHandlePoints(a);
  hpts.forEach(hp=>{
    ctx.fillStyle='white';
    ctx.strokeStyle='#3040b0';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.rect(PAD+hp.x-HANDLE_SIZE/2, PAD+hp.y-HANDLE_SIZE/2, HANDLE_SIZE, HANDLE_SIZE);
    ctx.fill();ctx.stroke();
  });
}
function getHandlePoints(a){
  const {x,y,w,h}=a;
  const cx=x+w/2, cy=y+h/2;
  return[
    {id:'nw',x:x,   y:y   },{id:'n', x:cx,  y:y   },{id:'ne',x:x+w, y:y   },
    {id:'e', x:x+w, y:cy  },{id:'se',x:x+w, y:y+h },{id:'s', x:cx,  y:y+h },
    {id:'sw',x:x,   y:y+h },{id:'w', x:x,   y:cy  },{id:'move',x:cx,y:cy  }
  ];
}
function drawPendingArea(){
  const{x,y,w,h}=pendingArea;
  ctx.save();
  ctx.fillStyle='rgba(80,120,220,.1)';
  ctx.fillRect(PAD+x,PAD+y,w,h);
  ctx.strokeStyle='#2050c0';
  ctx.lineWidth=2;
  ctx.setLineDash([6,3]);
  ctx.strokeRect(PAD+x+1,PAD+y+1,w-2,h-2);
  ctx.setLineDash([]);
  ctx.restore();
}

// ===== 検索 =====
function doSearch(){
  const q=document.getElementById('si').value.trim().replace(/\s/g,'');
  exactHL.clear();partHL.clear();
  const ri=document.getElementById('ri');
  if(!q){ri.innerHTML='';draw();return;}
  const exact=[],part=[];
  PLOTS.forEach(p=>{
    if(!p.name)return;
    const n=p.name.replace(/\s/g,'');
    if(n===q)exact.push(p); else if(n.includes(q))part.push(p);
  });
  exact.forEach(p=>exactHL.add(pk(p)));
  part.forEach(p=>partHL.add(pk(p)));
  let html='';
  if(exact.length)html+=`<b style="font-size:11px;">▶ 完全一致：</b>`+exact.map(p=>`<span style="background:#1a1a1a;color:white;padding:1px 5px;margin:0 2px;font-size:11px;">${p.name}</span>`).join('')+'&nbsp;&nbsp;';
  if(part.length) html+=`<b style="font-size:11px;">▶ 部分一致：</b>`+part.map(p=>`<span style="background:#ffe8cc;border:1px solid #e05a00;padding:1px 5px;margin:0 2px;font-size:11px;">${p.name}</span>`).join('');
  if(!exact.length&&!part.length)html=`<span style="color:#888;font-size:11px;">「${q}」は見つかりません</span>`;
  ri.innerHTML=html;draw();
}
function clearSearch(){
  document.getElementById('si').value='';exactHL.clear();partHL.clear();
  document.getElementById('ri').innerHTML='';draw();
}

// ===== 閲覧モードのマウスオーバー =====
mc.addEventListener('mousemove', e => {
  if(editMode) return;
  const{mx,my}=canvasXY(e);
  const idx=hitTest(mx,my);
  if(idx>=0 && PLOTS[idx].name && PLOTS[idx].status==='used'){
    mc.style.cursor='pointer';
    const tt=document.getElementById('tt');
    tt.style.display='block';
    tt.style.left=(e.clientX+12)+'px';
    tt.style.top=(e.clientY+8)+'px';
    tt.innerHTML='<b style="font-size:12px">' + PLOTS[idx].name + '</b><br><span style="font-size:10px;color:#888">クリックで顧客情報を表示</span>';
  } else {
    mc.style.cursor='default';
    document.getElementById('tt').style.display='none';
  }
});
mc.addEventListener('mouseleave', ()=>{
  if(!editMode) document.getElementById('tt').style.display='none';
});

// ===== 編集モード =====
function toggleEdit(){
  editMode=!editMode;
  const mh=document.getElementById('mhint');
  if(editMode){
    plotEditIdx=-1;
    document.getElementById('eBtn').className='btn on';
    document.getElementById('eBtn').textContent='✏️ 編集中（クリックで終了）';
    document.getElementById('aBtn').disabled=false;
    mc.style.cursor='pointer';
    mh.className='mhint edit';
    mh.innerHTML='✏️ <b>編集モード：</b>区画を<b>左クリックで選択→ドラッグで移動・ハンドルでリサイズ</b> ／ <b>右クリック</b>で編集・削除メニュー';
  }else{
    document.getElementById('eBtn').className='btn out';
    document.getElementById('eBtn').textContent='✏️ 編集モード';
    document.getElementById('aBtn').disabled=true;
    if(addMode)stopAdd();
    mc.style.cursor='pointer';
    mh.className='mhint';selIdx=-1;closeCtx();draw();
  }
}

// ===== クリック（左）=====
mc.addEventListener('click',e=>{
  closeCtx();
  if(areaSelecting||dragMode)return;
  if(addMode)return;
  const{mx,my}=canvasXY(e);
  const idx=hitTest(mx,my);
  if(editMode){
    if(idx>=0){selIdx=idx;draw();openModal(idx,'編集');}
    else{selIdx=-1;draw();}
  } else {
    // 閲覧モード：区画クリックでビューアーへ遷移
    if(idx>=0){
      const p=PLOTS[idx];
      if(p.name && p.status==='used'){
        selIdx=idx;draw();
        openViewerForPlot(p.name);
      }
    }
  }
});

// ===== 右クリック =====
mc.addEventListener('contextmenu',e=>{
  e.preventDefault();
  if(!editMode)return;
  const{mx,my}=canvasXY(e);
  const idx=hitTest(mx,my);
  if(idx<0)return;
  selIdx=idx;draw();
  document.getElementById('ctxTitle').textContent=PLOTS[idx].name||'（空き区画）';
  const menu=document.getElementById('ctx');
  menu.style.left=e.clientX+'px';menu.style.top=e.clientY+'px';menu.style.display='block';
  const r=menu.getBoundingClientRect();
  if(r.right>innerWidth)menu.style.left=(e.clientX-r.width)+'px';
  if(r.bottom>innerHeight)menu.style.top=(e.clientY-r.height)+'px';
});
function closeCtx(){document.getElementById('ctx').style.display='none';}
document.addEventListener('click',e=>{if(!document.getElementById('ctx').contains(e.target)&&e.target!==mc)closeCtx();});
function ctxEdit(){closeCtx();openModal(selIdx,'編集');}
function ctxDel(){
  closeCtx();pendDelIdx=selIdx;
  const p=PLOTS[selIdx];
  document.getElementById('delMsg').innerHTML=`<b>「${p.name||'空き区画'}」</b>を削除しますか？<br><span style="font-size:10px;color:#888;">サイズ：${p.r2-p.r1+1}行×${p.c2-p.c1+1}列</span><br><br>この操作は元に戻せません。`;
  document.getElementById('delDlg').className='v';
}
function closeDelDlg(){document.getElementById('delDlg').className='';pendDelIdx=-1;}
function execDelete(){
  if(pendDelIdx<0)return;
  PLOTS.splice(pendDelIdx,1);selIdx=-1;pendDelIdx=-1;
  closeDelDlg();showSaved();updateStats();draw();
}

// ===== 編集モーダル =====
function openModal(idx,mode){
  modalIdx=idx;const p=PLOTS[idx];
  document.getElementById('mTitle').textContent=mode==='新規'?'新しい区画を追加':`区画を編集：${p.name||'（空き）'}`;
  document.getElementById('mName').value=p.name||'';
  document.getElementById('mStatus').value=p.status||'used';
  document.getElementById('mInfo').textContent=`行${p.r1+1}〜${p.r2+1} 列${p.c1+1}〜${p.c2+1}（${p.r2-p.r1+1}行×${p.c2-p.c1+1}列）`;
  document.getElementById('modal').className='v';
  document.getElementById('mName').focus();
}
function closeModal(){document.getElementById('modal').className='';selIdx=-1;draw();}
function applyModal(){
  if(modalIdx<0||modalIdx>=PLOTS.length)return;
  PLOTS[modalIdx].name=document.getElementById('mName').value.trim();
  PLOTS[modalIdx].status=document.getElementById('mStatus').value;
  if(!PLOTS[modalIdx].name&&PLOTS[modalIdx].status==='used')PLOTS[modalIdx].status='empty';
  closeModal();showSaved();updateStats();draw();
}
// モーダル内の削除ボタンから削除
function deleteFromModal(){
  if(modalIdx<0||modalIdx>=PLOTS.length)return;
  const p=PLOTS[modalIdx];
  if(!confirm(`「${p.name||'空き区画'}」を削除しますか？\nこの操作は元に戻せません。`))return;
  PLOTS.splice(modalIdx,1);
  modalIdx=-1;selIdx=-1;
  closeModal();showSaved();updateStats();draw();
}
document.getElementById('mName').addEventListener('keydown',e=>{
  if(e.key==='Enter')applyModal();if(e.key==='Escape')closeModal();
});

// ===== 印刷パネル =====
function togglePrintPanel(){
  const panel=document.getElementById('printPanel');
  const isOpen=panel.classList.contains('visible');
  if(isOpen){
    panel.className='';
    document.getElementById('pBtn').className='btn out';

    document.getElementById('mhint').className='mhint';
    draw(); // パネルを閉じた後に再描画（破線を消す）

    panel.className='visible';

    document.getElementById('pBtn').textContent='🖨 印刷設定中';

    document.getElementById('mhint').innerHTML='🖨 <b>印刷設定：</b>用紙・向きを選択し、印刷範囲を指定 → 「確定・登録」で保存';
    draw(); // パネルを開いた直後に再描画（破線を表示）

}
function setPaper(p,o){
  printCfg.paper=p;printCfg.orient=o;
  ['bA4L','bA4P','bA3L','bA3P'].forEach(id=>document.getElementById(id).className='btn out');
  const map={A4landscape:'bA4L',A4portrait:'bA4P',A3landscape:'bA3L',A3portrait:'bA3P'};
  if(map[p+o])document.getElementById(map[p+o]).className='btn on';
  updatePreview();
}

// ===== 印刷範囲指定フロー =====
// Step1: ドラッグ開始 → dragMode='area'
// Step2: ドラッグ終了 → pendingArea にセット、アクションバー表示
// Step3: 確定 → savedAreas に追加 / 再指定 → pendingArea クリアして再ドラッグ / キャンセル → 全クリア

function startAreaSelect(){
  // 既存の pending があればクリア
  pendingArea=null;
  hideActionBar();
  areaSelecting=true;
  dragMode='area';
  mc.style.cursor='crosshair';
  document.getElementById('btnSelectArea').className='btn on';
  document.getElementById('mhint').className='mhint print';
  document.getElementById('mhint').innerHTML='📐 <b>ドラッグ中：</b>マップ上でドラッグして印刷エリアを指定 ／ <kbd>Esc</kbd>でキャンセル';
  draw();
}

function stopAreaSelectMode(){
  areaSelecting=false;
  if(dragMode==='area')dragMode=null;
  dragStart=null;dragCur=null;
  hideDragBox();
  mc.style.cursor='crosshair';
  document.getElementById('btnSelectArea').className='btn out';
}

// ドラッグ完了後 → 仮エリア表示 + アクションバー
function onAreaDragEnd(x1,y1,x2,y2){
  const w=x2-x1, h=y2-y1;
  if(w<8||h<8){cancelArea();return;}
  pendingArea={x:x1,y:y1,w,h};
  stopAreaSelectMode();
  draw();
  showActionBar(pendingArea);
  document.getElementById('mhint').className='mhint print';
  document.getElementById('mhint').innerHTML='📐 <b>範囲を指定しました：</b>「確定・登録」で保存 ／「再指定」でやり直し ／「キャンセル」で中止';
}

// アクションバーの表示（エリアの右下付近）
function showActionBar(area){
  const bar=document.getElementById('areaActionBar');
  const cr=mc.getBoundingClientRect();
  const sx=cr.width/mc.width, sy=cr.height/mc.height;
  const cwR=document.getElementById('cw').getBoundingClientRect();
  const mwEl=document.getElementById('mw');
  // エリアの下端
  const bx=(area.x+PAD)*sx;
  const by=(area.y+area.h+PAD)*sy+6;
  bar.style.left=Math.max(0,bx)+'px';
  bar.style.top=by+'px';
  document.getElementById('aabLabel').textContent=`範囲：${Math.round(area.w)}×${Math.round(area.h)}`;
  bar.className='visible';
}
function hideActionBar(){
  document.getElementById('areaActionBar').className='';
}

// 確定
function confirmArea(){
  if(!pendingArea)return;
  const name=prompt(`印刷範囲 No.${nextAreaId} の名前（例：A区、省略可）`,'')||'';
  const area={id:nextAreaId++,name,x:pendingArea.x,y:pendingArea.y,w:pendingArea.w,h:pendingArea.h};
  savedAreas.push(area);
  activeAreaId=area.id;
  pendingArea=null;
  hideActionBar();
  renderAreaList();draw();updatePreview();
  document.getElementById('areaInfo').textContent=`No.${area.id}「${area.name||'名称なし'}」を登録しました`;
  document.getElementById('mhint').className='mhint print';
  document.getElementById('mhint').innerHTML='🖨 <b>印刷設定：</b>範囲を登録しました。続けて指定するか「印刷実行」してください';
}

// 再指定（pendingAreaを破棄してドラッグし直し）
function retryArea(){
  pendingArea=null;
  hideActionBar();
  startAreaSelect();
}

// キャンセル（pendingArea破棄・モードリセット）
function cancelArea(){
  pendingArea=null;
  stopAreaSelectMode();
  hideActionBar();
  dragMode=null;
  draw();
  document.getElementById('mhint').className='mhint print';
  document.getElementById('mhint').innerHTML='🖨 <b>印刷設定：</b>範囲指定をキャンセルしました';
}

// Escキーでキャンセル
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(pendingArea){cancelArea();return;}
    if(areaSelecting){cancelArea();return;}
    if(modalIdx>=0)closeModal();
  }
});

// 全体選択
function selectAllArea(){
  activeAreaId=null;pendingArea=null;
  hideActionBar();stopAreaSelectMode();
  document.getElementById('areaInfo').textContent='全体を印刷します';
  renderAreaList();draw();updatePreview();
}

// ===== エリアリスト =====
function renderAreaList(){
  const list=document.getElementById('areaList');
  if(savedAreas.length===0){
    list.innerHTML='<div class="area-empty">範囲が登録されていません<br><span style="font-size:10px;">「ドラッグで範囲指定」で追加できます</span></div>';
    return;
  }
  list.innerHTML=savedAreas.map(a=>`
    <div class="area-item${a.id===activeAreaId?' active':''}" onclick="selectArea(${a.id})">
      <span class="area-num">${a.id}</span>
      <span class="area-name">${a.name||'（名称なし）'}</span>
      <span class="area-sz">${Math.round(a.w)}×${Math.round(a.h)}</span>
      <span class="area-btns">
        <button class="area-btn" onclick="event.stopPropagation();editAreaName(${a.id})" title="名前変更">✏️</button>
        <button class="area-btn" onclick="event.stopPropagation();reSelectArea(${a.id})" title="範囲を再指定">📐</button>
        <button class="area-btn del" onclick="event.stopPropagation();deleteArea(${a.id})" title="削除">✕</button>
      </span>
    </div>
  `).join('');
}

function selectArea(id){activeAreaId=id;renderAreaList();draw();updatePreview();}

function editAreaName(id){
  const a=savedAreas.find(x=>x.id===id); if(!a)return;
  const name=prompt(`No.${id} の名前を変更`,a.name||'');
  if(name===null)return;
  a.name=name;
  renderAreaList();draw();
}

// 範囲を再指定（既存エリアをpendingAreaに戻してドラッグし直し）
function reSelectArea(id){
  const a=savedAreas.find(x=>x.id===id); if(!a)return;
  // 一旦リストから削除し、同じIDで再登録
  savedAreas=savedAreas.filter(x=>x.id!==id);
  nextAreaId=id; // 同じIDを再利用
  activeAreaId=null;
  pendingArea=null;
  hideActionBar();
  renderAreaList();draw();
  // ドラッグ指定開始
  startAreaSelect();
  document.getElementById('mhint').innerHTML=`📐 <b>No.${id} の範囲を再指定：</b>マップ上でドラッグして新しいエリアを指定してください`;
}

function deleteArea(id){
  savedAreas=savedAreas.filter(a=>a.id!==id);
  if(activeAreaId===id)activeAreaId=savedAreas.length?savedAreas[savedAreas.length-1].id:null;
  renderAreaList();draw();updatePreview();
}

// ===== ハンドル操作（アクティブエリアのリサイズ/移動） =====
function getHitHandle(mx,my){
  if(!activeAreaId)return null;
  const a=savedAreas.find(x=>x.id===activeAreaId);
  if(!a)return null;
  const hpts=getHandlePoints(a);
  const HS=HANDLE_SIZE;
  for(const hp of hpts){
    if(mx>=hp.x-HS&&mx<=hp.x+HS&&my>=hp.y-HS&&my<=hp.y+HS) return hp.id;
  }
  // 内部ヒット → move
  if(mx>=a.x&&mx<=a.x+a.w&&my>=a.y&&my<=a.y+a.h) return 'move';
  return null;
}

function getHandleCursor(handle){
  const map={nw:'nw-resize',n:'n-resize',ne:'ne-resize',e:'e-resize',
    se:'se-resize',s:'s-resize',sw:'sw-resize',w:'w-resize',move:'move'};
  return map[handle]||'crosshair';
}

// ===== マウスイベント =====
mc.addEventListener('mousedown',e=>{
  if(dragMode==='area'&&areaSelecting){
    dragStart=canvasXY(e);dragCur=canvasXY(e);return;
  }
  if(dragMode==='add'){dragStart=canvasXY(e);dragCur=canvasXY(e);return;}

  // 区画移動・リサイズ（編集モード）
  if(editMode&&!addMode){
    const{mx,my}=canvasXY(e);
    // まず選択中区画のハンドルをチェック
    if(plotEditIdx>=0){
      const handle=getPlotHitHandle(mx,my);
      if(handle){
        e.preventDefault();
        plotResizeHandle=handle;
        dragMode='plotresize';
        plotResizeDragStart={mx,my};
        const p=PLOTS[plotEditIdx];
        plotResizeStart={r1:p.r1,r2:p.r2,c1:p.c1,c2:p.c2,...getPlotPx(p)};
        return;
      }
    }
    // 区画選択
    const idx=hitTest(mx,my);
    if(idx>=0){
      plotEditIdx=idx;
      selIdx=idx;
      draw();
      return;
    } else {
      plotEditIdx=-1;
      draw();
    }
  }

  // ハンドル操作（印刷モードでアクティブエリアあり）
  if(document.getElementById('printPanel').classList.contains('visible')&&activeAreaId&&!pendingArea){
    const{mx,my}=canvasXY(e);
    const handle=getHitHandle(mx,my);
    if(handle){
      e.preventDefault();
      resizeHandle=handle;
      dragMode='resize';
      resizeDragStart={mx,my};
      const a=savedAreas.find(x=>x.id===activeAreaId);
      resizeAreaStart={x:a.x,y:a.y,w:a.w,h:a.h};
      return;
    }
  }
});

mc.addEventListener('mousemove',e=>{
  const{mx,my}=canvasXY(e);

  if(dragMode==='area'&&dragStart){
    dragCur={mx,my};
    const x1=Math.min(dragStart.mx,mx),y1=Math.min(dragStart.my,my);
    const x2=Math.max(dragStart.mx,mx),y2=Math.max(dragStart.my,my);
    showDragBoxArea(x1,y1,x2-x1,y2-y1);
    return;
  }
  if(dragMode==='add'&&dragStart){
    dragCur={mx,my};
    const x1=Math.min(dragStart.mx,mx),y1=Math.min(dragStart.my,my);
    const x2=Math.max(dragStart.mx,mx),y2=Math.max(dragStart.my,my);
    showDragBox(dragStart,{mx,my},'#4060c0','rgba(100,140,255,.1)');
    return;
  }
  // 区画移動・リサイズ中
  if(dragMode==='plotresize'&&plotResizeDragStart&&plotEditIdx>=0){
    const p=PLOTS[plotEditIdx];
    const dx=mx-plotResizeDragStart.mx, dy=my-plotResizeDragStart.my;
    const{x,y,w,h,r1:sr1,r2:sr2,c1:sc1,c2:sc2}=plotResizeStart;
    // ドラッグ量をグリッド座標に変換
    switch(plotResizeHandle){
      case 'move':
        p.c1=Math.max(0,pxToGrid(x+dx,CP));
        p.r1=Math.max(0,pxToGrid(y+dy,RP));
        p.c2=Math.min(CP.length-2,p.c1+(sc2-sc1));
        p.r2=Math.min(RP.length-2,p.r1+(sr2-sr1));
        break;
      case 'se': case 'e':
        p.c2=Math.max(p.c1,pxToGrid(x+w+dx,CP));
        if(plotResizeHandle==='se') p.r2=Math.max(p.r1,pxToGrid(y+h+dy,RP));
        break;
      case 's':
        p.r2=Math.max(p.r1,pxToGrid(y+h+dy,RP)); break;
      case 'nw':
        p.c1=Math.min(sc2,pxToGrid(x+dx,CP));
        p.r1=Math.min(sr2,pxToGrid(y+dy,RP)); break;
      case 'n':
        p.r1=Math.min(sr2,pxToGrid(y+dy,RP)); break;
      case 'ne':
        p.r1=Math.min(sr2,pxToGrid(y+dy,RP));
        p.c2=Math.max(p.c1,pxToGrid(x+w+dx,CP)); break;
      case 'sw':
        p.c1=Math.min(sc2,pxToGrid(x+dx,CP));
        p.r2=Math.max(p.r1,pxToGrid(y+h+dy,RP)); break;
      case 'w':
        p.c1=Math.min(sc2,pxToGrid(x+dx,CP)); break;
    }
    draw(); return;
  }

  // カーソル変更（編集モード・区画選択中）
  if(editMode&&plotEditIdx>=0&&!dragMode){
    const handle=getPlotHitHandle(mx,my);
    if(handle){ mc.style.cursor=getHandleCursor(handle); return; }
  }

  if(dragMode==='resize'&&resizeDragStart){
    const dx=mx-resizeDragStart.mx, dy=my-resizeDragStart.my;
    const a=savedAreas.find(x=>x.id===activeAreaId);
    if(!a)return;
    let{x,y,w,h}=resizeAreaStart;
    const MIN=20;
    switch(resizeHandle){
      case 'move': a.x=x+dx;a.y=y+dy;break;
      case 'nw':   a.x=x+dx;a.y=y+dy;a.w=Math.max(MIN,w-dx);a.h=Math.max(MIN,h-dy);break;
      case 'n':    a.y=y+dy;a.h=Math.max(MIN,h-dy);break;
      case 'ne':   a.y=y+dy;a.w=Math.max(MIN,w+dx);a.h=Math.max(MIN,h-dy);break;
      case 'e':    a.w=Math.max(MIN,w+dx);break;
      case 'se':   a.w=Math.max(MIN,w+dx);a.h=Math.max(MIN,h+dy);break;
      case 's':    a.h=Math.max(MIN,h+dy);break;
      case 'sw':   a.x=x+dx;a.w=Math.max(MIN,w-dx);a.h=Math.max(MIN,h+dy);break;
      case 'w':    a.x=x+dx;a.w=Math.max(MIN,w-dx);break;
    }
    draw();updatePreview();
    return;
  }

  // カーソル変更（印刷モード中 ハンドル上）
  if(document.getElementById('printPanel').classList.contains('visible')&&activeAreaId&&!pendingArea&&!dragMode){
    const handle=getHitHandle(mx,my);
    if(handle){mc.style.cursor=getHandleCursor(handle);return;}
  }

  // 通常ツールチップ
  if(editMode||dragMode)return;
  const tt=document.getElementById('tt');
  const idx=hitTest(mx,my);
  if(idx>=0){
    const p=PLOTS[idx];
    tt.style.display='block';
    tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-10)+'px';
    const sl=p.status==='used'?'使用中':p.status==='empty'?'空き':'施設';
    const isE=exactHL.has(pk(p)),isP=partHL.has(pk(p));
    tt.innerHTML=`<b>${p.name||'空き区画'}</b><br>状態：${sl}<br>サイズ：${p.r2-p.r1+1}行×${p.c2-p.c1+1}列`+
      (isE?'<br><span style="background:#1a1a1a;color:white;padding:1px 4px;font-size:10px;">完全一致</span>':'')+
      (isP?'<br><span style="background:#ffe8cc;border:1px solid #e05a00;padding:1px 4px;font-size:10px;">部分一致</span>':'');
    mc.style.cursor='default';
  }else{
    tt.style.display='none';
    if(!dragMode)mc.style.cursor=editMode?'pointer':'crosshair';
  }
});

mc.addEventListener('mouseup',e=>{
  // 区画移動・リサイズ終了
  if(dragMode==='plotresize'){
    dragMode=null;plotResizeHandle=null;plotResizeDragStart=null;plotResizeStart=null;
    autoSave();
    draw();
    mc.style.cursor='pointer';
    return;
  }
  // リサイズ/移動終了
  if(dragMode==='resize'){
    dragMode=null;resizeHandle=null;resizeDragStart=null;resizeAreaStart=null;
    renderAreaList();
    // カーソルを元に戻す
    const{mx,my}=canvasXY(e);
    const handle=getHitHandle(mx,my);
    mc.style.cursor=handle?getHandleCursor(handle):'crosshair';
    return;
  }
  // エリア指定ドラッグ終了
  if(dragMode==='area'&&dragStart){
    const cur=canvasXY(e);
    hideDragBox();
    const x1=Math.min(dragStart.mx,cur.mx),y1=Math.min(dragStart.my,cur.my);
    const x2=Math.max(dragStart.mx,cur.mx),y2=Math.max(dragStart.my,cur.my);
    dragStart=null;dragCur=null;dragMode=null;
    onAreaDragEnd(x1,y1,x2,y2);
    return;
  }
  // 区画追加ドラッグ終了
  if(dragMode==='add'&&dragStart){
    const cur=canvasXY(e);
    hideDragBox();
    const x1=Math.min(dragStart.mx,cur.mx),y1=Math.min(dragStart.my,cur.my);
    const x2=Math.max(dragStart.mx,cur.mx),y2=Math.max(dragStart.my,cur.my);
    const w=x2-x1,h=y2-y1;
    dragStart=null;dragCur=null;
    if(w>4&&h>4){
      const c1=CP.findIndex((v,i)=>v<=x1&&(CP[i+1]??Infinity)>x1);
      const c2=CP.findIndex((v,i)=>v<=x2&&(CP[i+1]??Infinity)>x2);
      const r1=RP.findIndex((v,i)=>v<=y1&&(RP[i+1]??Infinity)>y1);
      const r2=RP.findIndex((v,i)=>v<=y2&&(RP[i+1]??Infinity)>y2);
      if(c1>=0&&r1>=0){
        PLOTS.push({r1,r2:Math.max(r1,r2),c1,c2:Math.max(c1,c2),name:'',status:'empty'});
        selIdx=PLOTS.length-1;draw();stopAdd();openModal(selIdx,'新規');
      }
    }else stopAdd();
    return;
  }
});

mc.addEventListener('mouseleave',()=>{
  document.getElementById('tt').style.display='none';
  if(dragMode==='area'&&dragStart){hideDragBox();dragStart=null;dragCur=null;}
  if(dragMode==='add'&&dragStart){hideDragBox();dragStart=null;dragCur=null;}
});

// ドラッグボックス表示
function showDragBox(start,cur,border,fill){
  const box=document.getElementById('dragBox');
  const cr=mc.getBoundingClientRect();
  const sx=cr.width/mc.width,sy=cr.height/mc.height;
  const x1=Math.min(start.mx,cur.mx),y1=Math.min(start.my,cur.my);
  const x2=Math.max(start.mx,cur.mx),y2=Math.max(start.my,cur.my);
  box.style.cssText=`display:block;left:${(x1+PAD)*sx}px;top:${(y1+PAD)*sy}px;width:${(x2-x1)*sx}px;height:${(y2-y1)*sy}px;border:2px dashed ${border};background:${fill};pointer-events:none;`;
}
function showDragBoxArea(x,y,w,h){
  const box=document.getElementById('dragBox');
  const cr=mc.getBoundingClientRect();
  const sx=cr.width/mc.width,sy=cr.height/mc.height;
  box.style.cssText=`display:block;left:${(x+PAD)*sx}px;top:${(y+PAD)*sy}px;width:${w*sx}px;height:${h*sy}px;border:2px dashed #2050c0;background:rgba(80,120,220,.1);pointer-events:none;`;
}
function hideDragBox(){document.getElementById('dragBox').style.display='none';}

// ===== プレビュー =====
function updatePreview(){
  const margin=printCfg.margin;
  const paperMM={A4:{w:210,h:297},A3:{w:297,h:420}};
  const pm=paperMM[printCfg.paper];
  const pw=printCfg.orient==='landscape'?pm.h:pm.w;
  const ph=printCfg.orient==='landscape'?pm.w:pm.h;
  const prev=document.getElementById('ppPreview');
  const pr=prev.getBoundingClientRect();
  const sc=Math.min((pr.width-12)/pw,(pr.height-12)/ph);
  const vpw=pw*sc,vph=ph*sc;
  const area=getActiveArea();
  const srcW=area?area.w:TW,srcH=area?area.h:TH;
  const iW=(pw-margin*2)*sc,iH=(ph-margin*2)*sc;
  const ms=Math.min(iW/srcW,iH/srcH);
  const mW=Math.min(srcW*ms,iW),mH=Math.min(srcH*ms,iH);
  const page=document.getElementById('ppPage');
  const thumb=document.getElementById('ppThumb');
  page.style.cssText=`width:${vpw}px;height:${vph}px;left:${(pr.width-vpw)/2}px;top:${(pr.height-vph)/2}px;`;
  thumb.style.cssText=`left:${margin*sc}px;top:${margin*sc}px;width:${mW}px;height:${mH}px;`;
  thumb.textContent=area?`No.${area.id}`:'全体';
}
function onMarginChange(){
  printCfg.margin=parseInt(document.getElementById('marginRange').value);
  document.getElementById('marginVal').textContent=printCfg.margin+'mm';
  updatePreview();
}

// ===== 印刷実行 =====
function doPrint(){
  const area=getActiveArea();
  const margin=printCfg.margin;
  const paperMM={A4:{w:210,h:297},A3:{w:297,h:420}};
  const pm=paperMM[printCfg.paper];
  const pw=printCfg.orient==='landscape'?pm.h:pm.w;
  const ph=printCfg.orient==='landscape'?pm.w:pm.h;
  const srcX=area?area.x+PAD:0;
  const srcY=area?area.y+PAD:0;
  const srcW=area?area.w:TW+PAD*2;
  const srcH=area?area.h:TH+PAD*2;
  const DPI=3.7795;
  const innerPxW=(pw-margin*2)*DPI,innerPxH=(ph-margin*2)*DPI;
  const scale=Math.min(innerPxW/srcW,innerPxH/srcH);
  const outW=Math.round(pw*DPI),outH=Math.round(ph*DPI);
  const off=document.createElement('canvas');
  off.width=outW;off.height=outH;
  const oc=off.getContext('2d');
  oc.fillStyle='white';oc.fillRect(0,0,outW,outH);
  oc.drawImage(mc,srcX,srcY,srcW,srcH,margin*DPI,margin*DPI,srcW*scale,srcH*scale);
  const aLabel=area?`印刷範囲 No.${area.id}${area.name?' 「'+area.name+'」':''} `:'';
  const dateStr=new Date().toLocaleDateString('ja-JP');
  oc.fillStyle='#555';
  oc.font=`${9*DPI/3.5}px 'Noto Sans JP',sans-serif`;
  oc.textAlign='right';oc.textBaseline='bottom';
  oc.fillText(`長泉寺 墓地マップ　${aLabel}${dateStr}`,outW-margin*DPI,outH-3*DPI);
  const dataURL=off.toDataURL('image/png');
  const win=window.open('','_blank','width=800,height=600');
  if(!win){alert('ポップアップがブロックされています。許可してください。');return;}
  win.document.write(`<!DOCTYPE html><html><head>
    <title>印刷 - 長泉寺 墓地マップ</title>
    <style>*{margin:0;padding:0;}body{background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
    img{max-width:100%;max-height:100vh;object-fit:contain;}
    .ctrl{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:100;}
    .ctrl button{font-size:13px;padding:6px 14px;border:1.5px solid #333;background:#1a1a1a;color:white;cursor:pointer;font-family:sans-serif;}
    @media print{@page{size:${printCfg.paper} ${printCfg.orient};margin:0;}.ctrl{display:none;}body{display:block;}img{width:100%;height:100%;object-fit:contain;}}</style>
    </head><body>
    <div class="ctrl">
      <button onclick="window.print()">🖨 印刷</button>
      <button onclick="window.close()">✕ 閉じる</button>
    </div>
    <img src="${dataURL}" alt="墓地マップ"/>
    </body></html>`);
  win.document.close();
  setTimeout(()=>win.print(),500);
}

// ===== データ保存・読込 =====
function exportJSON(){
  const now        = new Date();
  const dateStr    = now.toLocaleDateString('ja-JP').replace(/\//g,'');
  const timeStr    = `${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  const dateLabel  = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  // ===== ① バックアップ用JSON保存 =====
  const backupData = {
    version    : '2.0',
    exportDate : now.toISOString(),
    plots      : PLOTS,
    savedAreas : savedAreas,
    nextAreaId : nextAreaId,
    printCfg   : printCfg
  };
  const jsonBlob = new Blob(
    [JSON.stringify(backupData, null, 2)],
    {type: 'application/json'}
  );
  const jsonLink = document.createElement('a');
  jsonLink.href     = URL.createObjectURL(jsonBlob);
  jsonLink.download = `長泉寺_バックアップ_${dateStr}_${timeStr}.json`;
  jsonLink.click();

  // ===== ② HTML自体のデータを最新に書き換えて保存 =====
  // 現在のHTMLソースを取得
  const htmlSource = document.documentElement.outerHTML;

  // PLOTSデータを現在の状態に置換
  const newPlotsJSON      = JSON.stringify(PLOTS);
  const newSavedAreasJSON = JSON.stringify(savedAreas);
  const newNextAreaId     = nextAreaId;
  const newPrintCfg       = `{paper:${JSON.stringify(printCfg.paper)},orient:${JSON.stringify(printCfg.orient)},margin:${printCfg.margin}}`;

  let newHtml = htmlSource;

  // let PLOTS = [...]; を書き換え
  newHtml = newHtml.replace(
    /let PLOTS\s*=\s*\[[\s\S]*?\];/,
    `let PLOTS = ${newPlotsJSON};`
  );

  // let savedAreas = [...]; を書き換え
  newHtml = newHtml.replace(
    /let savedAreas\s*=\s*\[[\s\S]*?\];/,
    `let savedAreas = ${newSavedAreasJSON};`
  );

  // let nextAreaId = N; を書き換え
  newHtml = newHtml.replace(
    /let nextAreaId\s*=\s*\d+;/,
    `let nextAreaId = ${newNextAreaId};`
  );

  // let printCfg = {...}; を書き換え
  newHtml = newHtml.replace(
    /let printCfg\s*=\s*\{[^}]+\};/,
    `let printCfg = ${newPrintCfg};`
  );

  // DOCTYPE宣言を先頭に付与（outerHTMLには含まれない場合がある）
  const finalHtml = newHtml.startsWith('<!DOCTYPE')
    ? newHtml
    : '<!DOCTYPE html>\n' + newHtml;

  const htmlBlob = new Blob([finalHtml], {type: 'text/html;charset=utf-8'});

function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.plots||!Array.isArray(d.plots)){alert('データ形式が正しくありません');return;}
      if(!confirm(`${d.plots.length}件の区画データを読み込みます。現在のデータは上書きされます。`))return;
      // PLOTSを完全置換（length=0+pushではなく直接代入で確実に）
      PLOTS.length=0;
      d.plots.forEach(p=>PLOTS.push(p));
      // 印刷範囲を復元
      if(d.savedAreas){savedAreas=d.savedAreas;nextAreaId=d.nextAreaId||savedAreas.length+1;activeAreaId=null;}
      // 印刷設定を復元
      if(d.printCfg){
        printCfg=d.printCfg;
        setPaper(printCfg.paper,printCfg.orient);
        if(document.getElementById('marginRange')){
          document.getElementById('marginRange').value=printCfg.margin;
          document.getElementById('marginVal').textContent=printCfg.margin+'mm';
        }
      }
      selIdx=-1;clearSearch();updateStats();renderAreaList();draw();
      alert(`読み込み完了：${d.plots.length}件の区画データを復元しました`);
    }catch(err){alert('読み込み失敗: '+err.message);}
  };
  reader.readAsText(file);e.target.value='';
}

// URLパラメータ:
//   temple  : お寺名（将来の多寺院対応用）
//   name    : 検索する契約者名
//   area    : 印刷範囲番号（savedAreasのID）
//   mode    : "export" を指定するとエクスポートモードで起動
//   listid  : SharePointリストアイテムID（結果書き戻し先）
//   siteurl : SharePointサイトURL（結果書き戻し先）
//   listname: SharePointリスト名（結果書き戻し先）
//
// 動作:
//   1. 描画完了後、指定の検索・印刷範囲でCanvasを生成
//   2. PNG(base64)をwindow.__exportResultにセット
//   3. Power AutomateはHTTP GETでこのページを呼び出し、
//      ページ内JSがwindow.__exportResultにPNGをセットするのを待ってから取得
// ============================================================

function getUrlParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    temple  : p.get('temple')   || '',
    name    : p.get('name')     || '',
    area    : parseInt(p.get('area') || '0'),
    mode    : p.get('mode')     || '',
    listid  : p.get('listid')   || '',
    siteurl : p.get('siteurl')  || '',
    listname: p.get('listname') || ''
  };
}

async function runExportMode(params) {
  // エクスポートモード用オーバーレイ表示
  const overlay = document.createElement('div');
  overlay.id = 'exportOverlay';
  overlay.style.cssText = [
    'position:fixed;inset:0;background:rgba(255,255,255,.92)',

    'align-items:center;justify-content:center;gap:12px',
    'font-family:"Noto Sans JP",sans-serif;font-size:14px;color:#333'
  ].join(';');
  overlay.innerHTML = `
    <div style="font-size:28px;">⏳</div>
    <div id="exportStatus" style="font-weight:500;">エクスポート処理中...</div>
    <div id="exportDetail" style="font-size:12px;color:#888;"></div>
    <div style="width:200px;height:4px;background:#eee;border-radius:2px;margin-top:4px;">
      <div id="exportBar" style="width:0%;height:100%;background:#4a4a9a;border-radius:2px;transition:width .3s;"></div>
    </div>`;
  document.body.appendChild(overlay);

  const setStatus = (msg, detail='', pct=0) => {
    document.getElementById('exportStatus').textContent = msg;
    document.getElementById('exportDetail').textContent = detail;
    document.getElementById('exportBar').style.width = pct + '%';
  };

  try {
    // Step1: 検索ワードを適用
    setStatus('検索中...', `契約者名：${params.name}`, 10);
    await new Promise(r => setTimeout(r, 100));

    if (params.name) {
      document.getElementById('si').value = params.name;
      doSearch();
    }

    // Step2: 印刷範囲を選択
    setStatus('印刷範囲を設定中...', `エリアNo.${params.area}`, 30);
    await new Promise(r => setTimeout(r, 100));

    if (params.area > 0) {
      const found = savedAreas.find(a => a.id === params.area);
      if (found) {
        activeAreaId = found.id;
      } else {
        setStatus('⚠️ 指定の印刷範囲が見つかりません', `area=${params.area}`, 30);
        window.__exportError = `印刷範囲 No.${params.area} が見つかりません`;
        return;
      }
    } else {
      activeAreaId = null; // 全体
    }

    // Step3: 描画
    setStatus('マップを描画中...', '', 50);
    await new Promise(r => setTimeout(r, 200));

    // 印刷パネルを一時的にvisibleにしてエリア枠も描画
    const panel = document.getElementById('printPanel');
    const wasVisible = panel.classList.contains('visible');
    if (params.area > 0) panel.classList.add('visible');
    draw();
    if (!wasVisible) panel.classList.remove('visible');

    // Step4: Canvas → PNG (base64)
    setStatus('PNG画像を生成中...', '', 70);
    await new Promise(r => setTimeout(r, 100));

    const pngBase64 = await generateExportPNG(params);

    // Step5: 結果をwindow変数にセット（Power Automateが読み取る）
    setStatus('SharePointに結果を書き込み中...', '', 90);
    await new Promise(r => setTimeout(r, 100));

    window.__exportResult = {
      status    : 'ok',
      temple    : params.temple,
      name      : params.name,
      area      : params.area,
      listid    : params.listid,
      timestamp : new Date().toISOString(),
      pngBase64 : pngBase64,
      pngSize   : pngBase64.length,
      filename  : generateFilename(params)
    };

    // SharePoint REST API で結果を書き戻す
    if (params.siteurl && params.listname && params.listid) {
      try {
        setStatus('SharePointに結果を書き込み中...', 'REST API呼び出し', 92);
        const digest = await getFormDigest(params.siteurl);
        const half   = Math.floor(pngBase64.length / 2);
        await fetch(
          `${params.siteurl}/_api/lists/getbytitle('${encodeURIComponent(params.listname)}')/items(${params.listid})`,
          {
            method : 'POST',
            headers: {
              'Content-Type'   : 'application/json;odata=verbose',
              'X-HTTP-Method'  : 'MERGE',
              'IF-MATCH'       : '*',
              'X-RequestDigest': digest
            },
            body: JSON.stringify({
              '__metadata'       : {'type': 'SP.ListItem'},
              'ExportStatus'     : 'PNG生成完了',
              'ExportPNGBase64'  : pngBase64.substring(0, half),
              'ExportPNGBase64_2': pngBase64.substring(half),
              'ExportFileName'   : generateFilename(params)
            })
          }
        );
        setStatus('SharePoint書き込み完了', '', 96);
      } catch(spErr) {
        console.warn('[EXPORT] SharePoint書き込み失敗（継続）:', spErr.message);
      }
    }

    // Step6: 画面表示
    setStatus('✅ エクスポート完了', `${params.name} / ${generateFilename(params)}`, 100);
    overlay.style.background = 'rgba(230,255,230,.95)';

    // デバッグ用：結果サマリーをコンソールに出力
    console.log('[EXPORT_RESULT]', JSON.stringify({
      status   : window.__exportResult.status,
      temple   : window.__exportResult.temple,
      name     : window.__exportResult.name,
      area     : window.__exportResult.area,
      listid   : window.__exportResult.listid,
      timestamp: window.__exportResult.timestamp,
      filename : window.__exportResult.filename,
      pngSize  : window.__exportResult.pngSize
    }));

    // Power Automate用：ページタイトルに完了フラグをセット
    document.title = 'EXPORT_DONE:' + window.__exportResult.filename;

  } catch(err) {
    setStatus('❌ エラー', err.message, 0);
    overlay.style.background = 'rgba(255,230,230,.95)';
    window.__exportError = err.message;
    console.error('[EXPORT_ERROR]', err.message);
    document.title = 'EXPORT_ERROR:' + err.message;
  }
}

// PNG生成（印刷用Canvasと同じロジック）
function generateExportPNG(params) {
  return new Promise((resolve, reject) => {
    try {
      const area     = getActiveArea();
      const margin   = printCfg.margin;
      const paperMM  = {A4:{w:210,h:297}, A3:{w:297,h:420}};
      const pm       = paperMM[printCfg.paper];
      const pw       = printCfg.orient === 'landscape' ? pm.h : pm.w;
      const ph       = printCfg.orient === 'landscape' ? pm.w : pm.h;

      const srcX = area ? area.x + PAD : 0;
      const srcY = area ? area.y + PAD : 0;
      const srcW = area ? area.w       : TW + PAD * 2;
      const srcH = area ? area.h       : TH + PAD * 2;

      // 高解像度（150dpi相当）
      const DPI   = 5.905; // 150dpi: 1mm = 150/25.4 px
      const outW  = Math.round(pw * DPI);
      const outH  = Math.round(ph * DPI);
      const innerW = (pw - margin * 2) * DPI;
      const innerH = (ph - margin * 2) * DPI;
      const scale  = Math.min(innerW / srcW, innerH / srcH);

      const off = document.createElement('canvas');
      off.width  = outW;
      off.height = outH;
      const oc = off.getContext('2d');

      // 白背景
      oc.fillStyle = 'white';
      oc.fillRect(0, 0, outW, outH);

      // マップ描画
      oc.drawImage(mc, srcX, srcY, srcW, srcH,
        margin * DPI, margin * DPI, srcW * scale, srcH * scale);

      // フッターラベル
      const aLabel   = area ? `印刷範囲 No.${area.id}${area.name ? ' 「'+area.name+'」' : ''} ` : '';
      const nameLabel= params.name ? `検索：${params.name}　` : '';
      const dateStr  = new Date().toLocaleDateString('ja-JP');
      oc.fillStyle   = '#555';
      oc.font        = `${9 * DPI / 3.5}px 'Noto Sans JP',sans-serif`;
      oc.textAlign   = 'right';
      oc.textBaseline= 'bottom';
      oc.fillText(
        `長泉寺 墓地マップ　${aLabel}${nameLabel}${dateStr}`,
        outW - margin * DPI, outH - 3 * DPI
      );

      // base64 PNG（data:image/png;base64,... のプレフィックスを除去）
      const dataURL = off.toDataURL('image/png');
      const base64  = dataURL.split(',')[1];
      resolve(base64);

    } catch(e) {
      reject(e);
    }
  });
}

async function getFormDigest(siteUrl) {

// ===== SharePoint保存・読込（Graph API方式）=====
var SP_DRIVE_ID = 'b!Kd6bySbVVkOYNZHZNe9p3GY8hGjGqNZAjqUCUF3IbAPj8QAq2YQCTJvsL-ml_Vkp';
var SP_FOLDER   = '%E6%A5%AD%E5%8B%99%E3%82%A2%E3%83%97%E3%83%AA'; // 業務アプリ

function getSPToken() {
  // MSALがlocalStorageに保存したGraph APIトークンを取得
  var now = Date.now() / 1000;
  var storages = [localStorage, sessionStorage];
  for (var si = 0; si < storages.length; si++) {
    var st = storages[si];
    try {
      var keys = Object.keys(st);
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        if (k.indexOf('accesstoken') < 0) continue;
        var item = JSON.parse(st.getItem(k));
        if (!item || !item.secret) continue;
        var exp = item.expiresOn || item.extended_expires_on || '0';
        var expTime = isNaN(exp) ? new Date(exp).getTime() / 1000 : Number(exp);
        if (expTime > now + 60) return item.secret;
      }
    } catch(e) {}
  }
  return null;
}

function saveToSP(callback) {
  var token = getSPToken();
  if (!token) {
    showSPStatus('SharePoint未ログイン。ビューアーからマップを開いてください。', 'err');
    return;
  }
  var data = {
    version: '2.0',
    savedAt: new Date().toISOString(),
    plots: PLOTS,
    savedAreas: savedAreas
  };
  var jsonStr = JSON.stringify(data, null, 2);
  var fileName = 'data_' + _templeId + '.json';
  var url = 'https://graph.microsoft.com/v1.0/drives/' + SP_DRIVE_ID +
            '/root:/' + SP_FOLDER + '/' + encodeURIComponent(fileName) + ':/content';
  showSPStatus('SharePointに保存中...', 'ing');
  fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    },
    body: jsonStr
  })
  .then(function(r) {
    if (r.ok || r.status === 201) {
      showSPStatus('✅ 保存しました (' + new Date().toLocaleTimeString('ja-JP') + ')', 'ok');
      localStorage.setItem(LS_KEY, jsonStr);
      if (callback) callback();
    } else {
      return r.json().then(function(d) {
        throw new Error(r.status + ': ' + (d.error?.message || JSON.stringify(d).substring(0,80)));
      });
    }
  })
  .catch(function(e) {
    showSPStatus('❌ 保存エラー: ' + e.message, 'err');
    localStorage.setItem(LS_KEY, jsonStr);
  });
}

function loadFromSP(callback) {
  var token = getSPToken();
  if (!token) {
    loadFromLocalStorage(callback);
    return;
  }
  var fileName = 'data_' + _templeId + '.json';
  var url = 'https://graph.microsoft.com/v1.0/drives/' + SP_DRIVE_ID +
            '/root:/' + SP_FOLDER + '/' + encodeURIComponent(fileName) + ':/content';
  fetch(url, { headers: { 'Authorization': 'Bearer ' + token } })
  .then(function(r) {
    if (r.ok) return r.json();
    if (r.status === 404) return null;
    throw new Error(r.status);
  })
  .then(function(data) {
    if (data && data.plots) {
      PLOTS = data.plots;
      savedAreas = data.savedAreas || [];
      draw(); updateStats();
      showSPStatus('✅ SharePointから読み込みました (' + (data.savedAt||'').substring(0,16).replace('T',' ') + ')', 'ok');
      if (callback) callback();
    } else {
      loadFromLocalStorage(callback);
    }
  })
  .catch(function(e) {
    loadFromLocalStorage(callback);
  });
}

function loadFromLocalStorage(callback) {
  try {
    var raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data && data.plots) {
      PLOTS = data.plots;
      savedAreas = data.savedAreas || [];
      draw(); updateStats();
    }
    if (callback) callback();
  } catch(e) {}
}

let _lastSaveHash = ''; // 前回保存時のハッシュ（変更がある時だけ保存）

function _dataHash() {
  // PLOTSの件数＋先頭末尾のnameを簡易ハッシュとして使用
  const first = PLOTS[0] ? PLOTS[0].name : '';
  const last  = PLOTS[PLOTS.length-1] ? PLOTS[PLOTS.length-1].name : '';
  return `${PLOTS.length}:${first}:${last}:${savedAreas.length}`;
}

// 変更があるたびに自動保存
function autoSave() {
  try {
    const hash = _dataHash();
    if (hash === _lastSaveHash) return; // 変更なしはスキップ
    _lastSaveHash = hash;
    const data = {
      version    : '2.0',
      savedAt    : new Date().toISOString(),
      plots      : PLOTS,
      savedAreas : savedAreas,
      nextAreaId : nextAreaId,
      printCfg   : printCfg
    };
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  } catch(e) {
    console.warn('autoSave失敗:', e.message);
  }
}

// 起動時に自動読込
function autoLoad() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.plots || !Array.isArray(data.plots)) return false;

    // データを復元
    PLOTS.length = 0;
    data.plots.forEach(p => PLOTS.push(p));
    if (data.savedAreas) {
      savedAreas = data.savedAreas;
      nextAreaId = data.nextAreaId || savedAreas.length + 1;
    }
    if (data.printCfg) {
      printCfg = data.printCfg;
      setPaper(printCfg.paper, printCfg.orient);
      const mr = document.getElementById('marginRange');
      if (mr) {
        mr.value = printCfg.margin;
        document.getElementById('marginVal').textContent = printCfg.margin + 'mm';
      }
    }

    // 読込日時をステータスに表示
    const saved = new Date(data.savedAt);
    const label = `${saved.getMonth()+1}/${saved.getDate()} ${saved.getHours()}:${String(saved.getMinutes()).padStart(2,'0')} 保存分を復元`;
    showAutoLoadBadge(label);
    return true;
  } catch(e) {
    console.warn('autoLoad失敗:', e.message);
    return false;
  }
}

  var baseH = mc.height;
  mc.style.width = baseW + 'px';
  mc.style.height = baseH + 'px';

  function setScaleAt(newScale, focalX, focalY) {
    // focalX/Y: mapWrap内の座標（スクロール考慮済み）
    // ズーム前のスクロール位置に対する割合を保持
    newScale = Math.min(Math.max(newScale, 0.3), 4);
    var ratio = newScale / currentScale;
    currentScale = newScale;
    mc.style.width = Math.round(baseW * currentScale) + 'px';
    mc.style.height = Math.round(baseH * currentScale) + 'px';
    // focalPointがズーム後も同じ画面位置になるようスクロール調整
    mapWrap.scrollLeft = focalX * ratio - (focalX - mapWrap.scrollLeft) * ratio + mapWrap.scrollLeft * (ratio - 1);
    mapWrap.scrollLeft = Math.round(focalX * ratio - (focalX - mapWrap.scrollLeft / ratio));
  }

  function applyScaleAt(newScale, clientMidX, clientMidY) {
    newScale = Math.min(Math.max(newScale, 0.3), 4);
    var ratio = newScale / currentScale;
    // mapWrap上のピンチ中点座標（スクロール込み）
    var wrapRect = mapWrap.getBoundingClientRect();
    var focalX = (clientMidX - wrapRect.left) + mapWrap.scrollLeft;
    var focalY = (clientMidY - wrapRect.top) + mapWrap.scrollTop;
    currentScale = newScale;
    mc.style.width = Math.round(baseW * currentScale) + 'px';
    mc.style.height = Math.round(baseH * currentScale) + 'px';
    // ズーム後のfocalPointが同じ画面位置に来るようスクロール
    mapWrap.scrollLeft = Math.round(focalX * ratio - (clientMidX - wrapRect.left));
    mapWrap.scrollTop = Math.round(focalY * ratio - (clientMidY - wrapRect.top));
  }

  var lastDist = 0;
  var lastMidX = 0, lastMidY = 0;
  var isPinching = false;

  mapWrap.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      isPinching = true;
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      lastDist = Math.sqrt(dx*dx + dy*dy);
      lastMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      lastMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    } else {
      isPinching = false;
    }
  }, { passive: true });

  mapWrap.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2 && isPinching) {
      e.preventDefault();
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(dx*dx + dy*dy);
      var midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      var midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      if (lastDist > 0) {
        var ratio = dist / lastDist;
        // 中点（2本指の間）を固定点としてズーム
        applyScaleAt(currentScale * ratio, midX, midY);
      }
      lastDist = dist;
      lastMidX = midX;
      lastMidY = midY;
    }
  }, { passive: false });

  mapWrap.addEventListener('touchend', function(e) {
    if (e.touches.length < 2) {
      isPinching = false;
      lastDist = 0;
    }
  }, { passive: true });

  // ズームボタン
  var zoomBar = document.createElement('div');
  zoomBar.style.cssText = 'position:fixed;bottom:12px;right:12px;z-index:300;display:flex;flex-direction:column;gap:4px';
  zoomBar.innerHTML =
    '<button onclick="mapZoom(1.5)" style="width:36px;height:36px;background:#1a1a1a;color:#f0ece0;border:none;font-size:18px;cursor:pointer;border-radius:4px;opacity:0.85">＋</button>' +
    '<button onclick="mapZoom(1/1.5)" style="width:36px;height:36px;background:#1a1a1a;color:#f0ece0;border:none;font-size:18px;cursor:pointer;border-radius:4px;opacity:0.85">－</button>' +
    '<button onclick="mapZoomReset()" style="width:36px;height:36px;background:#1a1a1a;color:#f0ece0;border:none;font-size:11px;cursor:pointer;border-radius:4px;opacity:0.85">1:1</button>';
  document.body.appendChild(zoomBar);

  window.mapZoom = function(ratio) {
    // ボタン操作時は画面中央を固定点に
    var wrapRect = mapWrap.getBoundingClientRect();
    applyScaleAt(currentScale * ratio, wrapRect.left + wrapRect.width/2, wrapRect.top + wrapRect.height/2);
  };
  window.mapZoomReset = function() {
    currentScale = 1;
    mc.style.width = baseW + 'px';
    mc.style.height = baseH + 'px';
    mapWrap.scrollLeft = 0;
    mapWrap.scrollTop = 0;
  };
})();

// ===== highlightパラメーター処理 =====
(function() {
  var params = new URLSearchParams(location.search);
  var hlName = params.get('highlight');
  if (!hlName) return;
  setTimeout(function() {
    var si = document.getElementById('si');
    if (si) {
      si.value = hlName;
      doSearch();
      var found = PLOTS.find(function(p) { return p.name === hlName; });
      if (found) {
        selIdx = PLOTS.indexOf(found);
        draw();
        var mapWrap = document.querySelector('.map-wrap');
        if (mapWrap) mapWrap.scrollIntoView({ behavior: 'smooth' });
      }
    }
  }, 200);
})();
</script>
</body>
