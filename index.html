<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>石材業務ビューアー</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px;overscroll-behavior:none}
.hidden{display:none!important}
.menu-card{width:100%;background:#fff;border:1px solid #e8e8e8;border-radius:16px;padding:20px;display:flex;align-items:center;gap:16px;cursor:pointer;font-family:inherit;text-align:left}

/* ログイン画面 */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#1a2535}
.login-logo{font-size:48px;margin-bottom:16px}
.login-title{color:#fff;font-size:22px;font-weight:500;margin-bottom:40px;text-align:center}
.login-btn{background:#fff;color:#1a2535;border:none;padding:14px 40px;border-radius:28px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit}

/* アプリ本体 */
#app{display:flex;flex-direction:column;height:100vh;width:100%;max-width:480px;position:fixed;left:50%;transform:translateX(-50%);overflow:hidden}
.hdr{background:#1a2535;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;min-height:52px;flex-shrink:0}
.hdr-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0 8px 0 0}
.hdr-title{font-size:16px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-user{background:rgba(255,255,255,0.15);border:none;color:#fff;padding:5px 12px;border-radius:14px;font-size:12px;cursor:pointer}

.filter-bar{background:#fff;padding:10px 12px;display:flex;gap:6px;border-bottom:1px solid #e8e8e8}
.fpill{padding:7px 16px;border-radius:20px;border:1px solid #ddd;background:#f5f5f5;font-size:13px;cursor:pointer}
.fpill.on{background:#1a2535;color:#fff;border-color:#1a2535}
.search-wrap{padding:10px 12px;background:#fff;border-bottom:1px solid #e8e8e8}
.srch-text{width:100%;padding:9px 14px;border:1px solid #ddd;border-radius:22px;font-size:14px;background:#f8f8f8}

/* カードデザイン */
.list-area{flex:1;overflow-y:auto;padding:10px 12px 80px}
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:14px;overflow:hidden;cursor:pointer; padding-top:8px}
.card-main{display:flex;align-items:center;padding:10px;gap:6px}
.card-name-wrap{flex:1;min-width:0}

/* 追加: お寺の1文字目アイコン */
.temple-icon {
  width: 32px;
  height: 32px;
  background: #8a5c00;
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: bold;
  margin-right: 6px;
  flex-shrink: 0;
}
/* 追加: 家名（明朝体） */
.family-name-text {
  font-family: "Hiragino Mincho ProN", "MS PMincho", serif;
  font-size: 17px;
  font-weight: bold;
  margin-right: 8px;
  color: #1a1a1a;
}
/* 追加: 個人名（ゴシック体） */
.personal-name-text {
  font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
  font-size: 17px;
  font-weight: 500;
  color: #1a1a1a;
}

.card-ctemple{font-size:11px;color:#888;margin-top:1px}
.card-meta{text-align:right;flex-shrink:0}
.card-mdate{font-size:11px;color:#555;white-space:nowrap}
.card-mtanto{font-size:11px;color:#888;margin-top:1px}
.tag-group{display:flex;flex-wrap:wrap;gap:3px;padding:0 10px}
.tag-pill{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;white-space:nowrap}
.tag-done{background:#d4edda;color:#155724}
.tag-yet{background:#fff3cd;color:#856404}

#det-screen, #menu-screen{display:flex;flex-direction:column;height:100vh;width:100%;max-width:480px;position:fixed;left:50%;transform:translateX(-50%);overflow:hidden;background:#f0f2f5}
.det-body{flex:1;overflow-y:auto;padding:12px 14px 90px}
.loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:12px;color:#888}
.spinner{width:32px;height:32px;border:3px solid #e8e8e8;border-top-color:#1a2535;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">🪨</div>
  <div class="login-title">石材業務ビューアー</div>
  <button class="login-btn" id="login-btn">ログイン</button>
  <div id="ver-badge" style="color:rgba(255,255,255,0.4);margin-top:20px;font-size:10px"></div>
</div>

<div id="menu-screen" class="hidden">
  <div class="hdr"><span class="hdr-title">メニュー</span></div>
  <div style="padding:20px; display:flex; flex-direction:column; gap:16px;">
    <div id="menu-user-name" style="text-align:center; color:#666; font-size:12px"></div>
    <button class="menu-card" onclick="selectMenu()">
      <div style="font-size:32px; margin-right:15px">⛩️</div>
      <div><div style="font-size:17px; font-weight:500">納骨・戒切 一覧</div></div>
    </button>
    <button class="hdr-user" onclick="msalApp.logoutRedirect()" style="margin-top:20px; background:#888">ログアウト</button>
  </div>
</div>

<div id="app" class="hidden">
  <div id="list-screen" style="width:100%; display:flex; flex-direction:column; height:100vh;">
    <div class="hdr">
      <button class="hdr-back" onclick="handleBackBtn()">☰</button>
      <span class="hdr-title">納骨・戒切</span>
    </div>
    <div class="filter-bar">
      <button class="fpill on" id="filter-micom">未完了</button>
      <button class="fpill" id="filter-all">すべて</button>
    </div>
    <div class="search-wrap">
      <input class="srch-text" id="srch" placeholder="顧客名で検索...">
    </div>
    <div class="list-area" id="list-content">
       <div class="loading"><div class="spinner"></div><span>読み込み中...</span></div>
    </div>
  </div>

  <div id="det-screen" class="hidden">
    <div class="hdr">
      <button class="hdr-back" onclick="closeDetail()">←</button>
      <span class="hdr-title" id="det-title">詳細</span>
    </div>
    <div class="det-body" id="det-body"></div>
  </div>
</div>

<script>
var TENANT_ID = 'c78b3598-1933-4363-91f1-744a380bd9c9';
var CLIENT_ID = 'd0a0acaa-fa54-4afa-988e-7cc24db300b2';
var SP_HOST   = 'shojisekizai.sharepoint.com';
var SP_SITE   = 'stoneworks';
var LIST_NAME = '納骨・戒切';
var APP_VERSION = 'v1.8.60';

document.getElementById('ver-badge').textContent = APP_VERSION;

var msalConfig = {
  auth: { clientId: CLIENT_ID, authority: 'https://login.microsoftonline.com/' + TENANT_ID, redirectUri: window.location.origin + '/sekizaiwork/' },
  cache: { cacheLocation: 'localStorage' }
};

var msalApp = new msal.PublicClientApplication(msalConfig);
var SCOPES = ['https://graph.microsoft.com/Sites.Read.All'];

var allItems = [];
var currentFilter = 'micom';

// ページ読み込み時の処理
window.onload = function() {
  msalApp.handleRedirectPromise().then(function(resp) {
    if (resp) msalApp.setActiveAccount(resp.account);
    var accounts = msalApp.getAllAccounts();
    if (accounts.length > 0) {
      msalApp.setActiveAccount(accounts[0]);
      startApp();
    }
  }).catch(function(err) {
    console.error(err);
  });
};

document.getElementById('login-btn').onclick = function() {
  msalApp.loginRedirect({ scopes: SCOPES });
};

function startApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
  var acct = msalApp.getActiveAccount();
  if(acct) {
    document.getElementById('menu-user-name').textContent = 'ログイン：' + (acct.name || acct.username);
  }
  loadItems();
}
